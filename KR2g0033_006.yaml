body:
  text: 元名臣事略卷六元蘇天爵撰總帥汪義武王王名世顯字仲眀鞏昌人金季以戰功擢千夫長纍遷鞏昌府便宜總帥金亡踰年始屬國朝職仍舊尋賜金符伐蜀有功癸卯嵗卒年四十九公系出汪巨族貞佑二年西北杌陧階戰功起家為千夫長八轉領同知平凉府事正大四年領隴州防禦使進征行便宜分治陜西西路行六部郎中西南調度窘迫公發家資率豪右助邊鄰郡效之軍餉以之不絶六年以鞏州衝要之地升鞏昌府改兼治中轉同知兼參議帥府機務是時所在殘滅飢疫薦臻公與便宜總帥完顔仲德擁將士吏民出保石門九年仲德勤王東下公拜便宜總帥制㫖大約屬以社稷為念公感且憤至于糧械莫不精贍明年京城變郡縣風靡公獨為之堅守越三年猶安堵如故而戰攻不弛謂其衆曰宗祀已矣吾何愛一死千萬人之命懸于吾手平居享髙爵厚祿死其分也餘者奚罪與其自經於溝瀆姑殉一時之節孰若屈已紓斯人之禍㑹頓兵城下率僚佐耆老持牛羊酒幣迎謁焉曰吾征討有年所至皆下汝獨爾耳何也對曰有君在上賣國市恩之人諒所不取王大悅敕其下絲髮無所犯蓋乙未冬十月四日也旦詣行帳寵之以章服職仍故即日南征鳩士馬截嘉陵蹴大安未幾凱旋叠承奬賫楊文憲公撰神道碑朔又蜀郡靈公文集云國家龍興漠威行萬方金源日蹙志士守者或降死死且盡不能成軍山東西之間豪傑並起據保城壁大抵非金署置之舊鞏昌汪氏據髙制逺統郡縣數十勝兵數萬號曰便宜都總帥柵石門為金守者三年及我兵攻鞏昌則金亡十三嵗矣汪氏猶為金發喪登陴哭三日因王子間端以自歸太宗察其誠仍以便宜都總帥鎮故地取蜀之役資糧甲兵之賦終始畢給功多之紀他將鮮嫓焉此諱世顯者所以封隴右王也王有子七人孫十有九人多歷將相官封公者九人傳五世兄弟子孫百八十餘人總軍鞏昌者既世其職餘多大官丙申備前鋒進攻大理安南田楊諸蠻結陳來拒公麾輕騎五百撓之衆亂首尾不相顧潰圍出與南將曹將軍潜兵作犄角計公單騎往突之格殺數十人黎明軍合殪其主將王嘉歎之賜名馬佩刀公退語所部曰吾已撤彼之藩籬行寢其堂奧矣神道碑丁酉春變缺武信城燈缺全獲府庫遂蹂資普神道碑戊戌軍葭萌之南缺依山為柵公選數百騎奪山而入多所俘殺得其輜重乘勝赴資州壁山間識公旌旗驚怖奔逸抄嘉定峨嵋以歸神道碑己亥秋俾𨽻塔海公節制道險霖雨阻潦攀木緣磴破開州聞蜀軍列萬州南岸公伺夜伏兵上流舟北岸以疑之既而密由上流鼓革舟而下襲破之追奔逐北直抵夔峽公返而蹂之幾無噍類拔巫山與援軍還復𠞰三千餘級比春分掖江引還及涪州修浮梁信宿而辦濟南道之師環攻崇慶守者開門延敵他將莫能支公提戈首出人服其膽勇漸併力以拔其城天大暑乃罷秋覲帝數其功賜金符公拜謝曰實陛下威德所致臣何預焉上樂其知禮首肯者再四神道碑辛丑蜀帥陳隆之自稱百萬衆馳書索戰十月五日公略地成都傅城而陳彼屢戰屢却堅壁不出公曉以禍福十二日夜田顯縋城投款覺之公曰事急矣叱梯城入救軍民從顯而出者七十餘口獲陳隆之斬之五日公領精鋭五百搗漢州州兵三千出戰城閉盡陷三日軍薄城又三日克之露布以聞王擊節嘆賞仍賜田顯錢物神道碑癸卯春公且疾忽被召即戒首途既見賜虎符擢便宜總帥手札付秦鞏定西金蘭洮㑹環隴慶陽平凉順德鎮戎原階成岷亹西資等二十餘州事無巨細惟公决裁以憂深責重疾再作竟不起神道碑公器局宏逺資仁孝奉養太夫人斯須靡忘征南得㫖酒不逺數千里載歸以備􅎵瀡處喪不御酒食劬勞之日必致齊薦祭喜儒術聞介然之善應接無少倦罷羈人寒士至解衣推食生館死殯各得其所還自蜀輦書數千卷缺圖畫缺士卒必與同甘苦如父兄之於子弟然臨陳整肅無敢干者憫新民未輯刑清役寡縱所不免猶度力緩期不至急暴上下相安不聞告訐或有牽連議縱寬釋同屬異主者多盡力購聚之每事先立規程而後處之以及訟庭驛舍則靜若隆平時休沐對客命觴雅歌投壺而巳燕居逸逰若不勝衣遇敵先登搴旗斬將勇壓三軍雖古名將無以加矣神道碑萬户嚴武惠公公名實字武叔泰安長清人金季據東土嵗庚辰籍所部州民來歸太師國王承制授金紫光祿大夫行尚書省事甲午朝于和林授東平行軍萬户庚子薨年五十九公初警悟略知讀書及長志節豪宕不治生産為人美儀觀喜交結好施與落魄里社間屢以事被繫俠少輩愛慕之多為出死力以故得脫去遺山元公撰神道碑癸酉秋國兵破中夏已而北歸東平行臺調民為兵以公為衆所伏署百夫長明年春泰安張汝楫據靈巖遣别將攻長清公破走之以功授長清尉戊寅六月攝長清令八月宋人取益都乘勝而西行臺檄公備芻糧為守禦計公出督租比還而長清陷尋以兵復之有譖于行臺者謂公與宋有謀行臺疑公以兵圍之公挈老幼壁青岩依益都主將以避之宋因以公為濟南治中分兵四出所至無不下於是太行之東皆公所節制矣神道碑庚辰三月河南軍攻彰德守將單仲力不支數求公救公請於主將主將逗留不行公獨以兵赴之比至而仲被擒公知宋不足恃七月謁先太師國王於軍門挈所部彰德大名磁洺恩博滑濬等州户三十萬以獻太師承制拜公金紫光祿大夫行尚書省事其年進攻曹濮單三州皆下之神道碑偏將李信留鎮青崖嘗有罪懼誅乘公出征叛降於宋公兄及夫人杜氏皆遇害辛巳公以兵復青崖擒信誅之進攻東平守將和立剛棄城走公入居之神道碑壬午宋將彭義斌說青崖朝海叛公之家人復被略去義斌軍西下郡縣多為所脅乙酉四月遂圍東平公間遣人㑹大將博囉罕軍軍又不至城中食且盡乃與義斌連和義斌亦欲藉兵取河朔而後圖之請以兄事公時麾下衆尚數千義斌不之奪而青崖所掠則留不遣七月義斌下真定道西山與博囉罕等軍相望分公以帳下兵陽助而隂伺之公知勢之迫即連趣博囉罕軍而與之合戰始交宋兵崩潰乃擒義斌不一月先所失部分盡復之是冬郡王岱遜取彰德明年取濮東平又明年太師攻益都凡公之功所在皆為諸道之冠神道碑庚寅四月朝於牛心之帳殿天子賜之坐宴享終日錫公虎符寵以不名又數數目公顧謂侍臣言若嚴公者真福人矣神道碑甲午朝於和林城授東路行軍萬户偏裨賜金符者八人初公之所統有全魏十分齊之三魯之九及是畫境之制行公之地於魏則别為大名又别名彭德齊與魯則復以德兖濟鄆歸於我神道碑丁酉九月詔命公毋出征伐當其時公以百城長東諸侯者十五年矣始於披荆棘扞豺虎敝衣糲食暴露風日挈溝壑轉徙之民而置之袵席之上以勸耕稼以豐委積公帑所積盡於交聘燕享祭祀賔客之奉而未嘗私貯之辟置俊良汰逐貪墨顧指所及竭蹶奉命不三四年由武城而南新泰而西行於野則知其為樂嵗出於塗則知其為善俗觀於俗則知其為太平官府而公之心力亦以盡矣上亦雅知公不便鞭馬念其功而憫其勞優恤如此神道碑公病風疸久人有勸迎良醫者笑曰人豈不死耶得無疾痛以沒足矣神道碑公既握兵柄顓生殺時年已長經涉世故乃更折節自厲間亦延致儒士道古今成敗至前人良法美意所以仁民愛物者輒欣然慕之故雖起行伍間嚴厲不可犯至於仁心為質者亦要其終而後見也神道碑初彰德既亡又破永柵郡王怒其反覆驅老幼數萬欲屠之公曰此國家舊民吾兵力不能及為所脅從果何罪耶王從公言釋不誅繼破濮州復欲屠之公言百姓未嘗敵我豈可與兵人併戮之不若留農種以給芻秣濮人免者又數萬後於曹於定陶於楚丘於上黨蓋未有不然者大兵由武休出襄鄧公時在徐邳間以為河南破屠戮必多乃載金繒往贖之且約諸將毋敢妄殺有所鹵獲必使之骨肉完保靈壁一縣當廢者五分人公悉救之兵人既素服公言重為金幣所誘故皆全濟中有求還鄉里者悉縱遣之是冬大饑缺北渡者多饑死又藏亡法嚴犯者保社皆坐逋亡無所於託僵尸蔽野公命作糜粥盛置道旁人得恣食之所生者不知幾何人矣神道碑初公之部曲有亡歸益都者數十人益都兵皆獲之人以為必殺公一切不問王義深義斌之别將聞義斌敗將奔河南凡公族屬之在東平者皆為所害河南破公獲義深妻子厚為賙恤之送還鄉里終不以舊事為嫌其行人之所難能又如此神道碑東州既為樂土四外之人託公以為命者相踵也公為之合散亡業單貧舉喪葬助婚嫁多求而不靳屢至而不厭骨肉之賜蓋有不勝書者故聞公之訃逺近悲悼野哭巷祭旬月不能罷古所為愛如父母敬如神眀者於公見之神道碑帝王之興天將舉全所覆者而升之時則有魁偉宏傑之士為之倡大義建大事一六合之同異定羣心之去就初貞祐南渡豪傑乘亂而起四方之人無所歸命公據上流握徑兵威望之著隱若敵國人心之所以為楚為漢者皆倚之以為重至是曉然知天命所在莫敢有異志國家亦藉之以成包舉之勢非天使之倡大義建大事以應興王之迹其能若是乎神道碑萬户張忠武王王名柔字德剛易州定興人金季纍遷中都留守行元帥府事國兵至被執授河北東西等路都元帥金亡入覲乃遷萬户將兵伐宋中統三年以年老乞致仕封安肅公至元三年城大都起判行工部事進封蔡國公五年薨年七十九公少倜儻不羈讀書略通大意工騎射尚氣節喜遊俠金貞祐間河朔擾攘土冦蜂起公聚族黨數千家壁西山東流堝選壯士團結隊伍以自衛逺近憚之莫敢犯以功授定興令纍遷青州防禦使中都路經略使苗道潤表其材加昭勇大將軍遙領永定軍節度使權元帥右都監行元帥府事興定初道潤為其副賈瑀所害瑀不自安遣使者以好辭告公曰吾得除道潤以君正直不以兵力黨惡人故也公怒叱使者還白瑀曰汝賊吾所事不即送死乃敢以此言相戲耶遂檄召道潤部曲㑹易水之軍市川告以復仇之意衆因羅拜推公為長者事聞遷中京留守兼知大興府事時戊寅夏五月也公年二十九王文忠公撰神道碑與又陵川文集云初中都經略使苗道潤其副賈瑀有隙一日從數騎出瑀伏甲射之顛于道左從者駭散有缺伯祥者獨下掖之道潤憊絶不能乘伏發前突伯祥奮槍大呼殺數人賊乃遁去遂取道潤所佩金虎符節以出令疾走間道聞諸朝乃命缺公靖安民代道潤伯祥因事之是嵗安定元年也明年靖公卒伯祥以符節歸公方㑹兵討瑀而國朝大軍出紫荆關遂率所部戰于狼牙嶺馬跌被執見主帥立而不跪左右强之公叱曰彼帥也吾亦帥也大丈夫死即死終不偷生為他人屈帥壯而釋之其散卒稍稍來集主帥恐公為變質二親于燕公嘆曰吾受國厚恩不意猖獗至此顧忠孝不兩立姑為二親屈遂委質焉未幾復舊職建斾而南下雄易安保諸州然猶不忘道潤之寃必欲誅瑀而瑀據孔山臺拒命自若遂攻之臺無井泉汲山下公先斷其汲道瑀乃降公縳瑀剖心以祭道潤時人義之王文康公撰墓志戊寅冬徙治滿城城小而缺真定帥武仙㑹鎮定深冀兵數萬來攻適令軍出帳下才數百人公以老弱婦女乘城帥壯士突出敵後毁其攻具且䇿其師老而怠從數騎䇿馬挾槊大呼入圍敵皆披靡復使緣山張旗幟聲言救至曳柴揚塵鼓譟以進敵大潰追擊遺尸數十里乘勝攻完州下之州守慷慨就戮公義而釋之升為守祁陽曲縣等帥皆來降遂圍中山先遣其將葛鐵槍來救戰于新樂蜚矢中公頷落其二齒公拔矢以戰大破之斬首數千級仙猶畜憾遣藁城令劉成將兵來侵公來獲成而復縱之墓志己卯秋八月南掠地至鼓城單騎入城諭以禍福鼓遂降進攻深澤寧晉諸縣皆下之由是深冀以北鎮定以東三十餘城莫不聽命緣山反側鹿兒和缺野貍狼山諸寨相繼望風納款公之威名震河朔矣墓志初公在鄉里聞賈瑀以軍三千掠其境當饋而起潜入行間伺其行及半奮踊大呼多所殺傷衆疑其有伏委仗而遁信安張甫亦嘗以數千人圍之時全軍悉出所留無幾公三分之更畨摟戰甫與公相聞而不識也因問張君安在公紿應曰適出且還我曹卒𨽻耳甫懼乃退保定王子昌阻水為固它將莫敢近公冒險徑渡出不意生擒之以歸其勇略類如此滹南王公撰勳德碑鄰境帥布薩彰格者素與公不相能既而為麾下所殺公聞之曰彼雖有過然長上也奈何擅殺之卒窮其主名斬首以聞神道碑丁亥春以滿城地隘不能容衆乃移鎮于保保當南北之衝亂後荒空者十餘年公乃剗荆榛立市井通商販招流亡不數年官府第舍奐然一新向者井泉鹹鹵不可飲食遂引雞距一畝二泉鑿城門而入疏為長河以流穢濁樓觀相望陂池映帶若圖畫然遂為燕南一大都㑹墓志初州之廟學在保寨故堙之北逮公開府則夾兩闤闠囂然坌閧殆非清廟居神之所遂於東南得爽塏地謀遷神居鳩工賦役殿廡一新講肆之舍庖藏之所以次具舉髙廣其制幾于倍蓰又為奎文樓于南鑿壁水于西嵗戊午春告成安神于廟釋奠以落之凌川文集壬辰天兵渡河眀年汴降諸將爭取金繒公獨入史館收金實録祕府圖書仍訪求鄉曲耆舊望族十餘家若髙户部李都運時立趙禮部三子贄克剛克慕楊翰子子恕壻賈庭揚護送北歸其薄汴梁蹙歸德陷汝南攻徐邳公莫不身先士卒橫槊轉鬭大小數十戰未嘗敗衄墓志接又遺山元公撰功德第二碑日汴城之役守者屢出戰我軍不能前公躍馬橫戈而出大帥諸帥即馳入陳中呼聲所及無不披靡汝南之役金兵軍于南門外决死戰宋兵瞻望不進公率士卒二十餘涉水入陳莫有當其鋒者徐州之役攻久不下宋人出戰公率死士五十人逆擊之敵退走明日急攻城隨陷論功第一邳州之役諸軍築壘環其外城中危迫潰圍而出望見公旗幟乃犯别帥軍公率兵救之又犯一軍公復救之敵竟敗而諸軍賴之以全甲午入覲上勞之歷數戰勳曰某軍之勝汝之功也某州之拔汝之功也如親見之乃論功行賞升萬户易金虎符公于江淮遇戰輒頴脫深入斬將刈旗折馘執俘而出墓志啓又勳德碑云棗陽之役公奪外城據之城中人南門出諸帥為木柵禦之公繞出其後敵大潰曺武之役公出其不意度九里關宋兵竟出西山翼而下我軍方休息為所敗公率騎突圍而出遂屯曹武北長封嶺緣山保聚皆攻下之斬宋制官十三人黃州之役州西有大湖與江通流公攻下之戰艦萬艘順流而下沿江接戰十日乃至城下宋水陸並進我軍令攻之不戰而潰東門禦備甚堅公率死士奮戈而入守者請和乃班師滁州之役公率死士先登城遂拔己亥詔公以本官節制河南路兵馬初乙未丙申間諸道所統仍金之舊保居燕趙之交分𨽻無幾辛丑特詔還之升州為府錫名順天别作一道賜御衣數襲尚廏馬百所乘大宛名馬二墓志大河自汴已失隄障南放分流為三杞為中潭南接渦涣東連淮海浩瀚無際宋人恃水程之利駐亳泗犯汴洛以窺河南太師察罕以公威名素為敵人所畏奏公總諸軍鎮杞公乃相地形以殺水勢築為連城分戍戰士結浮梁以通往來逺斥候以防衝突津要既固奸謀坐折瀕河居民始得安矣久之移鎮亳社亳去杞又五百里四面皆黃流非舟楫莫能至公至之日葺民居建府第城壁悉甃以甓又為橋梁以通歸德人民坌集商旅舟車往來如承平時宋人睨視不敢犯墓志己未扈從渡江十一月奉㫖總領䝉古漢軍城北鹿磯遣將掠地千里南至潭州庚申二月還自江上墓志公氣貌雄毅御軍嚴整號令所入將士凛然恩信素厚賞罰分眀旌旄所指士爭先死敵莫敢反顧故所向有功神道碑公將南渡也語于衆曰吾戰爭二十年殺人多矣寧無罪乎自今非對壘不復殺卒如其言遇他將俘囚將被戮者亦曲為勸諭而使之活降人親屬散落他所則百方購求必得而後已或求于我未嘗不與也勳德碑軍興以來貧人或有所假貸勢家出子錢要利如羊生羔嵗輒倍之往往賣田宅鬻妻子不能償公與真定使候奏乞民用子錢至倍而止不得展轉滋息朝廷從之神道碑公性喜宴客每閒暇輒與士大夫談論終日不倦嵗時贍給或隨其器能任使之神道碑公嘗以家人數千口出為齊民髙陽公張甫元帥牛顯雲皆嘗與公為敵既沒其妻子流離不能自存公皆厚加恤其周急濟困之義皆毅然為之墓志元帥張獻武王王名𢎞範字仲疇萬户忠武王第九子初代其兄攝順天府事中統三年授行軍總管從征李璮至元改元授順天路總管移守大名六年兵圍襄陽授益都行軍萬户改亳州萬户宋亡拜江東道宣慰使請逐益衛兩王遂拜䝉古漢軍都元帥十六年冬嶺海平入覲十七年卒年四十三王年二十餘其兄順天府總管𢎞略上計行朝留攝其府事吏民服其明决時內附甫定蒙古軍所過輒為暴王曰國朝自有法制我奉行之執暴者决以杖入其境無敢犯者順天者故保州以忠武故升府名後有所避又改今名曰保定云蜀郡虞公撰廟堂碑中統三年李璮叛濟南親王哈必齊丞相史天澤帥諸軍討之以王為行軍總管且行請氊帳於忠武忠武曰汝欲即安耶不與乃命之曰璮違天必敗汝勉之雖然璮劇賊也圍城勿避險地險則已無懈心兵必致死主者慮其險茍有來犯必赴救可以得功汝必勉之及圍城王軍城西璮出軍突諸將獨不向王軍王曰吾固受教矣我易受攻而彼不至謂我勿備也乃築長壘內伏甲而外為壕開東門以待夜襲其壕加廣璮不知也眀日果擁飛橋來攻橋不足踰壕軍陷其得陵壕者突入壘門遇伏皆死降兩賊將璮讋遂敗死論功王最多忠武聞之曰真吾子也或言于朝曰璮所以得為亂者盡專兵民之雄故也以此間諸侯諸侯果不自安遂罷其子弟之在官者王亦例解總管廟堂碑至元二年移守大名未上微服行民間察其所患苦見倉吏收民租視所當輸倍蓰怨言載道明日視事首取而治之民大悅是嵗大水廬舍且盡租稅無從出王輒免之計臣以專擅罪二王請入見奏曰臣以為朝廷儲小倉不若儲之太倉非擅免也上曰何說也王曰嵗以水不收而必責之民府倉雖實而民死亡盡明年租將安出活其民使均足其家嵗取有恆非陛下府庫乎此所謂太倉也上曰知體其勿問廟堂碑六年大括諸兵益圍宋襄陽益都兵璮所教也號勇道悍難制度諸帥無足統之者乃以王為益都淄萊等路行軍萬户丞相巴延命王軍鹿門斷糧道絶郢漢之援主者曰鹿門有張九漢水以東無慮矣於是王言於丞相曰今規取襄陽周于圍而緩于攻者計待其自斃乎然而夏貴乘江漲送衣糧入城我無禦之者而江陵歸缺行旅缺卒道出襄陽南者相繼也寧有自斃之時乎若築萬山以斷其西立柵灌子灘以絶其東則庶幾斃之之道也奏用其言因移王軍分山令嚴恆無懈意二日出東門與諸將較射大出敵兵猝薄城諸將曰彼衆我寡請嬰城自守王曰嘻我與諸君在此何事敵至將不戰耶敢言退者死即披甲上馬橫戈立遣偏將李庭當其前他將將六百人攻其後親率二百騎為長陳敵之步騎間乘而待王下令曰聞鼓皆進擊未鼓勿動敵麾衆入陳我不為動至再且却王曰彼再進再却氣衰矣鼓之前後奮擊宋師大敗得奔還者無幾廟堂碑八年築一字城進逼襄陽破樊城外郛九年攻樊城流矢中王肘王束創見主帥曰襄在江南樊在江北我陸攻樊則襄出舟師來救終不可取若截江道斷救兵水陸夾攻之則樊必破而襄亦下矣從之明日復出率鋭卒先登遂拔樊襄陽降以宋將吕文焕入覲上嘉之有錦衣白金寶鞍之賜將校行賞有差廟堂碑十一年丞相巴延帥師伐宋命王率左部諸軍循漢江東略郢而南十二月攻武磯堡取之天兵渡江王為先驅宋相賈似道以其師軍蕪湖其帥孫虎臣軍丁家洲轉戰而前大兵繼之賈似道師潰王前行宣布威德所過降下師次建康上遣使諭丞相毋輕敵貪進其少駐以待王進說曰聖恩待士卒誠厚今敵已奪氣亡在旦夕過自遷緩資敵得為計非䇿也將軍治閫外急緩之宜難制以虞度乘破竹之勢取之無遺䇿矣丞相然之即日自馳驛至上前面論形勢得㫖進師廟堂碑十三年師次瓜州分兵立柵奪其要害守之揚州都統姜才者宋之名將也所統士有部落種人自為一軍徑悍善戰至是以二萬人出揚子橋都元帥阿珠與王當之兩軍夾水而陳王以十三騎徑渡衝之陳堅不動王引却以誘之其驍將本回紇人鎧仗甚異躍馬出衆奮大刀直前趨王王反轡還迎刺人應手頓殪馬下立陳者同口喊叫震動天地而敵人亦不覺失聲遂潰走追殺轉至南城門斬首萬餘級其自相蹂踐與陷壕水溺死幾盡比得入城十無一矣王素善槊此戰衆尤服其竒焉於是宋將張世傑孫虎臣悉其國力率水軍陳於焦山南而時致死於我我師合擊之兵交王之一軍橫衝其旁宋師大敗宋自是不復能軍矣追奔于圖山之東王奪其戰艦八十俘馘以千數上功改亳州萬户賜名巴圖云廟堂碑是年冬丞相巴延次臨安之長安鎮中書左丞董公文炳左出京口由海道㑹之王亦將兵而左時以宋之丞相遣使約降徒以宋主幼其大臣難於削號稱臣請以伯姪為禮往返未决王將命入城數其柄臣之罪而責之遂屈服竟取降表來上廟堂碑宋亡其主既歸朝而十三年浙東又叛王力疾討之師次台州遣人持書往諭守將殺使焚書我師怒拔之衆請屠城王不許誅其首禍者而已台民至於今感之廟堂碑十四年拜江東宣慰使其民新脫鋒鏑王撫安之朞月境內稱治廟堂碑十五年王入覲請于上曰宋主既降而其將張世傑奉其庶兄益王是與弟廣王昺南奔既立是於閩而卒又立昺於海上宜致討焉乃拜䝉古漢軍都元帥以行陛辭奏曰國朝之制無漢人典䝉古軍者臣漢人恐乖禮節度猝難成願得親信䝉古大臣與俱行上曰爾憶而父與察罕之事乎其破安邑也汝父欲留兵守之察罕不肯師既南而城復為宋有進退幾失據汝之父不勝其悔恨也由委任不專今豈可使汝復有汝父之悔乎尚能以汝父宣力國家之心為心則豫汝嘉今付汝大事朂之哉面賜錦衣玉帶又辭曰遺爝未息延命海渚奉詞進征無所事于衣帶也茍以甲劍為賜使臣也得以仗國威靈率不聽命者則臣得其職矣上壯之出尚方寶劍名甲聽其自擇善者既拜賜又諭之曰劍汝副也有不用命者以此處之且行薦李恆為已二從之至揚州選將校發水陸之師二萬分道南征以弟𢎞正為先鋒戒之曰汝以驍勇見選非私汝也軍法重我不敢以私撓公汝慎之𢎞正所向克捷王進攻三江寨寨據隘乘髙不可近乃連兵環之寨中人懼持滿以待王下令下馬治朝食若將持久者持滿者疑不敢動而他寨不虞也忽麾軍連拔寨回搗三江盡拔之至漳州親攻其東門命將佐攻南門西門敵應之乃乘虛入其北門破之鮑浦寨南瀕海王曰陸攻之必走海令𢎞正圍以騎他將攻其南門又拔之海瀕之郡若潮若惠皆團結盤互王威聲所至恩信濟之無不內附廟堂碑十六年正月庚戌由朝陽港乘舟入海道至甲子門獲宋斥候將都統劉青顧愷乃知廣王所在辛丑至崖山而他將自外省調至者雖𨽻所部然齊視不相下有驕蹇意或故違其號令王以軍法斬其最惡者一人衆皆懾服聽命時宋人僑居海中環列千餘艘碇之建樓櫓其上隱然堅壁也王引舟師當之然其地兩山東西對立其地淺舟膠不可進我師由山之東轉而南入大洋始得與之薄又出騎兵斷其歸路燒其宫室而宋益困蹙無所容矣世傑有甥韓在王軍中王使招世傑世傑不從甲戌恆自廣州至舟小更授以二海戰船守北面二月癸未我師將戰或請以炮攻之王曰火起則舟散不如戰也明日四分其軍分處其東南北三面王自將一軍相去里許下令曰宋舟西艤崖山潮至必東遁急攻之弗令得去聞吾樂作乃戰違令者斬先麾北面一軍乘潮而戰不克李恆等順潮退樂作宋人以為小宴且懈王舟犯其前南衆繼之王命髙構戰樓于舟尾以布障之命軍士負盾而伏令之曰聞金聲起戰先金而妄動者死敵人傅我舟如蝟伏盾者不動舟將接鳴金撤陳弧弩火石交作頃刻并破七舟宋師大潰宋臣以其主廣王赴水死獲其符璽印章張世傑北突吾軍而遁令李恆追至大洋不及世傑走未至交趾風壞舟與將士俱溺死于是嶺海悉平宋無遺蘖矣磨崖山之陽紀功而還廟堂碑其又牧庵撰左丞李恆廟碑云宋幼主出降將相陳宜中張世傑挾益王是廣王昺浮海趣福州立益王改元景炎閩廣諸州下者十五郡縣豪傑亦爭起矣公出定反地大破惠潮軍十萬南軍悉走遁張文虎復合兵十萬又破之兜港伏尸三十里後又合其相文天祥瑞金又大破之天祥走據江州得孔遵破之併破趙盂營軍復其州而還天祥復陷二州收兵出興師又擊走之追四百里及之五坡降其衆二十萬禽趙宗室以下文武將吏數百人益王殂廟號端宗世傑復立廣王改元祥興移柵海中崖山海道去廣治四百里公進復梅循惠潮輿廣之諸道走王道夫擊凌震海上獲船三百艘禽將吏宋邁以下二百人又破其餘軍茭浦江淮省亦遣都元帥𢎞𢎞範至自漳與共圍崖山勢計窮蹙度不能國資政陸秀夫抱廣王蹈海死獲其金璽其將吏死焚溺者數萬人翟國秀凌震皆降世傑遁去風壞舟死後陵南海平十月入朝賜宴內殿慰勞良厚然王以瘴癘疾作矣上命尚醫護視日以狀聞遣近侍臨議用藥吾有國事待其謀畫必盡伎速愈之敕衛士坐其門曰九巴圖病甚矣非必不可不見者宣詔示之可也疾革沐浴易衣冠俾左右扶至中庭面闕再拜遂入室酌酒作樂與親戚賓客為别遺言毋厚葬出南征時賜劍與甲以畀嗣子圭曰汝父以是立功其佩服毋忘語竟端坐而薨廟堂碑王素敏悟喜讀書過目輒識大義歌詩尤慷慨身長七尺修髯如畫機眀氣鋭言辨捷出勇略絶人輕財下士拔材於衆已不以為惠尚氣節敦信義與人交久而益敬剛直自持不為勢位所屈雖臨之以威而辭氣灑落理辨愈眀初丞相巴延至建康大㑹諸將出庫金行賞王後至丞相曰祖宗之法凡以軍事命集罪加後雖貴近材勇無所貸爾何敢後衆錯愕王徐進曰臨戰未嘗後受賞恥居先何為不可丞相為之俯首其能片言解疑誤類如此簿録宋內府金帛行省都事矣谷之竒與焉既而多所遺失或因以誣之竒將就考驗王曰之竒名士行又有素何可以此議之請以本身官爵及家帑保其必不然者其後誣果眀南征時宋丞相文天祥之軍在潮之五坡嶺𢎞正掩擊獲之縛文丞相以至摏以戈使拜不屈王釋之待以客禮吏士或諫王曰敵人之相叵測不可近王曰忠義人也保無他求族屬被俘者悉還之及囚京師聞王薨至為之埀涕又玉堂佳話云至元十二年臨安降度宗二庶子為陳宜中張世傑擁入嚴浦江口時有黑龍見因改元景炎缺為帥臣張𢎞範破滅于崖山執文天祥至大都囚之缺月九日戮燕南城市欲赦出相之竟不從十九年十二中在海上得宋禮部侍郎鄧光薦禮之于家孰以為子師嘗戒其子曰居官律己廉慎則公眀自生御衆賞罰有信則人致力不懷報之之心怨亦自釋此三言者皆王素躬行者也凡行軍非對敵未嘗妄殺吏卒有病者必為親視醫藥不幸死必轉送其家凡上賜與即頒士卒麾下有功賞或不時得則慨然曰人宣力如此而受抑如彼後或解體將誰與共功乎甚者為之涕泣陳說不得請不止故人樂為之用及為元帥雖有所刑戮亦必為之懇惻申諭仁聞既著薨之日天下莫不傷悼痛惜焉廟堂碑元名臣事略卷六
