body:
  text: 元名臣事略卷二元蘇天爵撰丞相淮安忠武王王名巴延巴林氏其父從宗王居西域至元初王奉使于朝遂拜中書左丞相七年改同知樞密院事十一年復拜中書左丞相總兵伐宋十二年秋入覲拜右丞相明年春宋亡第功增食邑六千户復同知樞密院事二十六年進知樞密院事三十一年加太傅録軍國重事是嵗薨年五十九至大四年敕建廟于臨安至元初年王奉使天子世祖見其貌偉聽其言厲曰非諸侯王臣也其留事朕遣介報還建謀發令才恆出廷臣上由是上愈益賢之敕中書右丞相安圖女弟昭睿順聖皇后之姊之女女王謂曰為巴延婦不慚爾氏矣拜光祿大夫中書左丞相一時君相慶明朝野晏清號為極治清河元功撰勳德碑王姿凝峻寡言諸曹白事尤難決者辭往復稠疊王夷然如無聞白已舉目一兩語破其歸要事以決省中始帖帖讋服識其為真宰輔中菴劉公撰廟碑十一年復拜左丞相總襄陽兵伐宋上曰曹彬不嗜殺人一舉而定江南汝其今體朕心古法彬事毋使吾赤子橫罹鋒刃王受命馳至襄陽諸軍纂嚴禡師啓行薄郢州漂水溢塗人病於涉王曰吾且飛渡大江而憚此橫潦耶麾使一騎前導諸軍畢濟勳德碑郢城恃江為固而兵精食足耀兵不攻潛由平江堰蕩舟而過郢將將二千人追我王以百騎殿郢人不敢逼平章烏珠公適至郢人走王手斬其帥趙文義以徇戰禽沙洋守將壓新城而軍列沙洋俘馘城下不應城陷佩沙洋降將黃順金符上為招討使炫其榮於宋人以故江陵諸郡相繼送款遣别帥受之降勳德碑烏珠公使右丞阿里哈雅來期渡江不答明日又來又不答烏珠自來王曰此大事也主上委我二人餘可知吾實乎潛刻期而去將自沙蕪口入江宋制置使夏貴將精兵守之乃陽言明日圍漢陽夏貴來援我遣騎兵襲奪沙蕪口大兵咸會江北崖宋戰艦屬江中餘三十里我以白鷂千艘爭陽邏堡夏貴分兵拒戰命烏珠公挽舟逆上載死士三千夜渡是年十二月也明旦王戰夏貴江上兵奪陽邏堡逸夏貴諸將請曰貴大將而逸之可乎王曰陽邏之捷吾將遣使前告宋人而貴走伐吾使也貴今來矣未幾果以廬州歸勳德碑師既渡江將佐咸賀王曰天子威靈烏珠武勇將校用命吾何力焉王陳師鄂城下鄂恃漢陽將戰焚其蒙衝火照城中明日鄂人及漢陽城皆下留阿里哈雅守之規取荆湖王與烏珠等東兵興國蘄黃南康江州望旗輒靡殿帥范文虎以安慶張都統以池州來勳德碑二月都督賈似道用師十萬陳丁家洲我士賈勇索戰軍容甚盛似道聞鼓聲先遁其師遂潰獲都督府符印斬虜無算太平寧國建康無為鎮巢皆送管籥請城主勳德碑行省駐建康時江東大疫居民乏食乃開倉賑飢發醫起病人大喜曰此王者之師也勳德碑有詔時方暑熾不利行師俟秋再舉王上奏曰百年逋冦已扼其吭風馳電擊取之恐後少爾遲回奔播江海遺患留悔矣上諭使者曰語爾丞相朕不從中制也勳德碑十二年七月詔王入朝進右丞相辭曰烏珠功多臣宜居後以烏珠為左丞相賜從戰功臣爵賞有差躬受廟謨會諸將於淮安同左丞相圍揚州未下勳德碑左丞相烏珠才勇善戰而士頗不附王患之乃獨禮敬加異由是衆視王益敬以和諸文武將佐皆密悉其才用臨事遣授各盡其長故能所向無前動必有成廟碑十月王馳至鎮江分軍三進參政阿喇哈以右軍出建康道參政董文炳以左軍出海道王以中軍出常州道咸會臨安勳德碑攻常州守將劉師勇遁諸將請追之王曰勿追師勇所過城守者膽落矣蘇湖秀州先師來降勳德碑阿喇哈文炳皆來駐臨安北宰臣陳宜中發使來請降日及期宜中逃海軍進臯亭山宋主遣其臣齎國璽奉表納上命董文炳入宋宫取宋主居之别室封庫歸之有司宋滅十三年三月也放散兵衛罷易官府軍錢塘沙上三日海潮不至宋人以為天助宋主求見王曰未入朝禮無相見也留董文炳鎮臨安經略閩越勳德碑王用兵紀律外嚴而中以聖訓不殺為主威懾德懷款附日至或請入視降城府藏簿賑以知金穀户口多寡王笑曰是欲夤緣噬吾民耳乃下令諸將士敢有暴掠及入城者以軍法論所至犬雞不驚四民晏然獲來蘇之望廟碑江左繁阜滋久金玉錦綺珍異竒古之玩所在充溢王一不挂目宋降將有以趙氏二宗女獻者立叱去之廟碑四月獻宋主趙顯謝后全后于上都上御大安殿降封顯瀛國公遣大臣告成功於太廟上勞王王再拜謝曰奉陛下成算烏珠效力臣何有功寵詔以陵州藤州增食户為六千勳德碑南又汲郡王公玉堂嘉話云宋末童謡云茗破百鴈來蓋指丞相巴延也丞相巴延既渡江來京師謂樞密副使張易同知趙良弼言都邑乃四海會同之地貢賦之入非漕運不可若由陸運民力憊矣川瀆所經何地徑便此方今便宜博加詢訪必有知者至上都入見奏言江南城郭郊野市井相屬川渠交通凡物皆以舟載比之車乘任重而力省今南北混一冝穿鑿河渠令四海之水相通逺方朝貢京師者皆由此致達誠國家永久之利上可其奏至至元二十四年前太史掾邊源言自安氏山穿渠引汶水西北至臨清河與漳水合省檄都漕運副使馬之貞行視計工自臨清由東昌而南得河故道過景德鎮至壽張抵安氏山袤三百里有竒與源所言合二十六年春正月庀役五月即功江淮湖廣四川海外諸畨土貢糧運商旅懋遷畢達京師賜名曰會通河野齋李公文集十四年宗王錫里濟畔詔王將兵討之與賊夾水而陳久之不戰令牧馬具食賊疑而怠俄引兵渡水擊賊錫里濟走死勳德碑十八年詔從皇太子撫軍北鎮諭太子曰巴延才兼將相行全忠孝改命從汝皇太子次舍必與論天下事待有加禮勳德碑别有婁默色者嘗誣王以死是年得罪誅敕王臨視王與之酒愴然不顧而回上問其故對曰彼罪自致臣若臨刑人將不知天誅之公也上賞其量勳德碑二十二年宗王阿濟格錫里詔王代總北軍逺斥候謹隄防足兵食明賞罰不肯要功生事將校大和敵人逺避勳德碑二十四年宗王納延將反報者還至詔王視之多載衣裘以往至其境輒賜驛人納延宴王王以大義語納延納延陽應而陰欲執王酒闌趨出與其從者潛分三道以逸驛人以得衣裘故爭獻馬以遞遂脫追騎具以實聞佐上親征奏李庭董士選帥漢軍得以漢法戰金剛努塔布岱進逼乘輿漢軍力戰賊不能陳而走及擒納延王之謀畫居多勳德碑二十六年進知樞密院事總北軍討叛王明埒克特穆爾大戰敗之明日搜其伏兵追斬二千餘級馳書開諭明埒克特穆爾其人奉書以泣有譖王于上者詔以御史大夫伊嚕勒代之居王大同以俟後命未至軍三驛王遣使語大夫曰所至姑止待我翦此寇卿來不後時海都帥大兵以入寇進我退如是而南七日衆帥怒曰寇至則走何不武若是果懼戰胡不授軍大夫而誤國事也王曰海都入吾境持重而殿邀之則遁誘使深入一戰可擒諸軍必欲速戰戰非吾憚果失海都誰任其咎衆曰請任之王麾軍邀擊敵兵大敗殺虜幾絶惟海都脫走乃召大夫至軍授印而去勳德碑三十年十二月驛召至大同上不豫明年正月宫車晏駕遣使召成宗于撫軍王總百官以定國論兵馬使請日在鳴暮鐘日出鳴晨鍾問其故對曰防變起也王曰汝將為賊耶其如平日宰臣請誅盜內府銀者曰幸赦而盜不可長王曰盜何時無今以誰命誅人其守正體大多類此勳德碑翰又汲郡王公文集云甲午嵗正月癸巳詔林諸君謁大傅巴延公姿威不見猛簡不失和真魁傑人也公初至燕詢諸何名轄曰翰林諸老今在者誰及是歷問各官壽期今供何職酬禮問顧相謂曰國家所以養諸老者正以乞言論政而已如遇事會議各顧官守未免或偏若集之同僚則議論通一為益良多乃知公深謀逺至氣象含𢎞朝廷之上軍國大計心無適不在所謂大臣以道事君者也四月成宗即位于上都大安殿時親王有違言王陳祖宗寶訓述所以立成宗之意辭色俱厲諸王股栗趨殿下拜勳德碑五月加太傅録軍國重事依前知樞密院事上意欲王入中書時相忌之王呼相語曰幸送兩罌美酒我與諸王飲於宫前餘非所知也勳德碑江南行三樞密院行省臣纍陳非便樞密院臣庇之有詔問王王已病張目對曰罷行樞密兵柄一歸行省於國事為完三院遂罷勳德碑王天質髙厚風神靜明英偉端大剛介莊亷當大任而不動遇大論而善斷言笑有時喜愠莫測恆負天下之重以神器尊安為務仁視羣品無間親疏義使衆材無所適莫故四海公論翕然歸之其平宋也將二十萬猶將一人賞罰信紀律彰大將稟命仰之若神明降人投誠依之猶父母未嘗妄戮一卒未嘗妄殘一物貨財不足移其心聲色不足惑其志師入臨安禮賢黜罪市肆不易雞犬無驚歸馬蕭然囊惟衣被畢事還朝口不言功逮出總師無投不最嗚呼碩德元才生由間氣良相名將見諸行事乃知宇宙之間功名之表自有大人也勳德碑天以正統命帝元太祖皇帝奪起朔方博爾穆穆呼哩博爾呼齊拉衮四傑輔之滅克烈滅乃蠻滅夏滅金乃有天下三分之二宋承中華之運西距蜀楚東際吳越盡有荆揚益三州之野世祖皇帝紹運撫圖肆𢎞大略發兵二十萬授丞相巴延不三年而滅宋聖文神武固勞造化雋功偉烈實由折衝四傑開之於其前一相擴之於其後國家接五帝三王之緒保無疆歷服至于億萬維王而功臣生分爵國死配朝廷有以也夫勳德碑丞相河南武定王王名阿珠烏庫哩氏初從父都帥公征西南夷有功中統三年拜征南都元帥將兵伐宋至元六年加平章事十一年春入覲拜平章政事十二年留守揚州拜中書左丞相十三年秋兩淮平還朝第功加食邑二千户二十四年薨年五十四公沈幾有智謀臨陳對敵英毅果決氣蓋萬人癸丑嵗從父都帥公征西南夷率精兵為候騎所向摧陷莫敢攖其鋒至平大理收諸部降交趾踐宋境無不在焉其破水寨掀關城奪鬬艦於馬湖舟指可掬索盜馬於山堞賊將生擒而又鏖戰三湘搴旗五陳是皆樹立之駿偉者也嘗蒙憲宗賞諭有阿珠未有名位挺身奉國特賜黃金三百兩以勉將來其降大任於公兆見於先者誠不偶然也汲郡王公撰廟碑文云公祖諱蘇布特初以質子入侍繼為百夫長嵗壬申太祖經略中原首攻桓州公先登丙子帝會諸將于圖喇河喻勒曰默爾竒斯部未附疇為朕征之公即應詔選裨將阿楚嗣領百人為候騎喻以方略使勿為備大軍至陳蟾河上一戰而潰遂降其衆卒已追默爾竒斯酋長輝圖與欽察戰于玉峪敗之壬午大祖征回回國其王委國而去命公逐之及于呼喇河戰不利公駐軍河東戒其衆人爇三炬以張軍勢其王夜遁繼遣公將萬騎由布哈川追襲既及逃匿海嶼則守其要害彼進退失㯫不旬日瘐死癸未詔征欽察竟收其境又與俄羅斯大小穆爾竒扎爾鏖戰降之丙戌取薩里輝和爾塔勒竒木等部又掠西蕃邊部庚寅太宗命睿宗循宋徼而北營取河南公亦在行是役也大敗金將哈達于三峯山壬辰夏睿宗還駐官山留公總兵圍汴金主北走渡河尾敗于黃龍岡癸巳秋汴京降俘金妃后寶器獻闕下其冬圍金主于蔡甲午金亡時汴梁受兵日久嵗荒民殍公下令縱其北渡俾就樂土詔諸王巴圖西征以公為先鋒遂虜巴齊瑪克妻子于騰吉斯海辛丑諸王巴圖征俄羅斯為所敗奏遣公督戰遂擒俄羅斯王額勒本復從攻滿濟勒噶部其主竒哩克兵勢張甚諸王分五道以進公出計桃誘至漷寧河大軍會戰不利乃于下流先渡直搗其城拔之公以嵗戊申卒於圖喇河上壽七十三子烏蘭哈逹太祖朝憲宗方髫齓以公佐命故家付之護育及長分掌宿衛辛巳扈定宗征女真國破萬努于遼東己酉定宗升遐諸王巴圖與宗室大臣册立憲宗議久未決公以大義陳請即定壬子時世祖在潛奉詔征西南夷命公總督軍馬自旦當嶺入雲南境摩些二部酋長迎降涉金沙江所在寨柵以次攻下之遂取龍首關世祖入大理國城是年分兵取附都善闡及烏㸑之未附者先是羅部府大酋髙升集諸部兵拒戰大破于洟可浪山下復收合餘燼嬰城自守城際滇池三面皆水堅險不易攻以炮摧其北門乃大震鉦鼓進而作作而止如是四日伺彼氣靡夜五鼓潛師躍入衆果內漬克焉而國主段智興逃匿昆澤并擒以獻又智未降附者逺近尉嘯聚大為民梗公命裨將伊埒圖卜新掩其右哈逹護掩其左約三日圍合與其子阿珠陷陳擊刺禽獮草剃川谷為之一空不二年平大理五城八府四郡洎烏白等蠻三十七部兵威所加如羅三斯阿伯等城亦來款附乙卯秋奉命出烏蒙趨廬江剷禿刺蠻三城宋邊將來厄戰屢交斬獲不勝計遂通道于嘉定崇慶間抵合州濟蜀江以雲南平遣使獻捷于朝還鎮大理丙辰九月遣使招降交趾留介不報十月進兵壓境國主陳光炳隔江列陳公濟江縱兵與戰彼軍大壞得舟逸去遣納哈丹往諭光炳請罪內附己未夏憲宗遣使喻旨約明年正月會于長沙是秋率四王兵三千騎蠻㸑萬人掠橫山塞柵鬬老蒼關徇宋內地自貴州蹂象州突入靜江府遂破辰沅直抵潭州州大出兵斷我歸路公與四王掠其後子阿珠橫擊于前盡破走之潭州又遣兵來犯蹙之門濠掩溺無算彼氣褫不敢復出壁城下者月餘聞世祖班師鄂渚尋遣竒爾濟蘇將千人來援仍慰勞之由滸黃北渡庚申夏飲至上都至元八年卒年七十三中統三年秋九月自宿衛將軍拜征南都元帥治兵于汴復立宿州廟碑至元元年八月掠地廬江入滁陽自安慶經略兩淮攻取戰獲軍聲大振廟碑四年八月觀兵襄陽遂入南郡取仙人帖城寺柵俘生口五萬人江陵晝鎖宋人間我師還合謀還兩淮驍悍騎五千步萬人併力邀襄樊間公謂諸將曰若不投宿江北恐落賊便遂自安灘濟江獨留精騎陳牛心山下立虛塞設疑火夜半賊果至伏兵發斬首萬餘級廟碑初公過襄陽駐馬虎頭山指顧漢東白河口謂諸將曰若築壘于此以斷餉道襄陽可圖也議聞於朝許焉五年九月築鹿門新城白河等堡廟碑六年七月大霖雨漢水溢宋將夏貴范文虎相繼以兵來爭又遣兵出沒東岸林谷間公按觀兵勢謂諸將曰此張虛形不可與戰宜整舟師以備新堡衆從之明日南船果趣新堡大破之殺溺生擒者五千獲戰艦百餘艘於是治戰艦教水軍築圜城以逼襄陽文虎率舟師來救某知府以百艘泊百丈山掣肘城役皆邀擊于湍灘敗走之裨將矮張以軍旟百舫躍入襄州尋乘輪船順流東走公與都帥劉整分艤戰艦以待燃薪照江兩岸如晝公追戰至匱門關擒矮張餘衆盡殪廟碑九年三月破樊城外郛重圍逼之襄樊兩城漢水出其間宋人植木江中鎖以鐵絙中造浮梁樊恃此為固我以機鋸斷木斧絙燔其橋襄援既絶公率猛士攻而拔之襄守將吕文焕懼而出降廟碑秋七月奉命掠地淮東抵淮陽城下彼以千騎出戰公伏師道左佯北賊果乘之擒騎將王都統廟碑十一年正月公入覲因奏兵事曰臣久在行間備見宋人兵弱于昔削平之期正在今日上付相臣議久不決公復奏曰今聖王臨御釋亂朝不取臣恐後日又難于今日上喜曰卿言允契朕意詔以兵十萬付之廟碑秋九月師次郢之鹽山得生口四人問知宋沿江九郡精鋭盡萃郢江東西兩城今舟師出其間騎兵不得護行兩岸此危道也不若取黃家灣堡之東有河口可由中拖船入湖轉而下江便時雨久晝夜不息公料大軍方集餽餉不繼水陸兩間進退無據吾大事去矣遂與丞相巴延議決意前進遂拖舟逹江舍郢而去廟碑初過郢按行舟路經大澤中忽騎千人掩至時從騎才數十人公即奮槊馳擊所向披靡彼驚走追斬五百餘級擒范趙二統制攻沙洋新城拔之前次復州守將翟貴迎降廟碑十一月公往覘漢口兵勢時夏貴以鐵鎖大艦扼江漢口兩岸備禦堅嚴公曰可回舟輪河口穿湖中從陽邏堡西沙蕪口入江夏甚便廟碑十二月大軍至陽邏堡攻之不克公語丞相曰攻城下策若分軍船之半循岸西上泊青山磯下伺隙搗虛可以得志是夜雪大作黎明開霽公遙見南岸多露沙洲即率部曲徑渡令載馬後隨宋將程鵬飛來拒戰公橫身蕩決蹀血大鏖中流敗去得船千餘艘公登沙洲舟擊攀岸步鬬開而復合者數回賊小却出馬于岸遂苦戰破之追殺至鄂南門岸兵敗走夏貴聞公飛渡大驚引麾下兵三百艘先遁餘皆潰亂我軍乘之江水為赤陽邏堡亦拔盡得軍實丞相議師所向或謂先取蘄黃公謂諸將曰若赴下流退無所據上取鄂漢雖遲旬日可以萬全水陸趨鄂焚其船三千艘煙焰漲天兩城大恐漢陽鄂渚諸兵皆降廟碑十二年正月黃蘄江州降公率舟師趨安慶范文虎出降繼下池州賈似道統兵扼蕪湖遣宋京來請和廟碑二月似道師次丁家洲公與丞相議曰當和議未定間昨我船出已亂射又執我邏騎四人宋人無信惟當進兵若避似道不擊恐已降州郡今夏難守若實欲和俟渠自來遂與前鋒孫虎臣對戰夏貴以戰艦二千五百艘橫亘江中似道將後軍殿時我已令諸將順江兩勢樹炮擊其中堅南軍陳動趨我船急進公挺身登艦手柁衝船雷鼓大震喊聲動天地我師掠彼舟大呼曰宋人敗矣似道倉皇失措舳艫簸蕩乍分乍合公以小旗麾將校率輕鋭橫擊深入宋軍大敗即回棹前走丞相以步騎夾岸掎之追奔百五十里殺溺死者蔽江而下獲戰艦二百餘艘都督府圖籍符印悉為我有軍資器仗狼籍不勝計是日似道以輕舸東走揚州夏貴走廬州廟碑朝廷以宋重兵皆駐江都臨安倚之為重四月命公圍守揚州公次真州與南兵戰珠金沙殱其千人獲鹽艘三十艘既抵維揚視揚子橋河路漕真粟以助揚乏即樹柵斷其餉道宋都統薑才領馬步二萬來爭期於必取南軍夾河為陳公麾騎士踰河直斬薑陳才所將多亡命叛降餘皆淮卒徑勇養鋭日久戰數合堅不能却我佯北才軍果逐之我奮而回戈萬矢雨集彼不能支騎先遁去我隨以鐵騎蹂之追奔斬截萬八千餘級兩淮鎮將張世傑孫虎臣以兵萬艘駐焦山東七月公登石公山脊而望之舳艫連接旌旗蔽江公曰可燒而走也遂摘抗健善彀者千人載以巨纜分兩翼夾射公居中合勢進擊繼以火矢著其篷檣煙焰赫赫窘無所出先是虎臣命前船悉沉鐵纜于江示以必死至是欲走不能前軍爭赴水死後軍鬨走追至圖山獲白鷂子七百餘艘是後淮東諸城兵不復出矣廟碑十月拜中書左丞相仍諭之曰淮南重地庭芝狡獪須卿守之時諸軍進取臨安公駐兵瓜州彼絶應援揚不能為後患兵不血刃而兩浙平定公控制之力為多廟碑十三年二月夏貴舉淮西諸城來附公謂諸將曰今宋已亡庭芝未下以外助猶多故也若絶聲援塞餉道尚恐東走通泰假息江海乃柵揚之西北丁村拒髙郵寶應糧運貯粟以備灣頭堡留駐新城用逼泰州又遣千夫長巴延察帥甲騎三百壯灣頭兵力仍諭之曰庭芝水路既阻必從陸出冝謹備之如丁村烽起當首尾相應斷賊歸路六月薑才知髙郵米運將至出步騎五千果犯丁村與我兵相抗至曉巴延察來援所將皆精兵旗幟作雙赤月大軍望其塵起連呼曰丞相來矣南軍識其幟才脫身走追殺騎兵四百步卒免者不滿百人庭芝挾薑才東走公率兵追襲殺步卒千人僅入泰州乃築壘以守之廟碑七月朱焕以揚州降泰州守將開北門納我師執庭芝等出繼奉命戮揚州市揚泰既下公申嚴士卒不得入城致毫髮犯有武衛軍校掠民二馬即斬以徇其號令肅賞罰信有古名將風廟碑九月兩淮悉平冬北覲見世祖於大明殿庭陳宋俘設席宴賀因上奏曰是皆陛下威德所致臣何與焉第功行賞實封泰興縣二千户廟碑二十三年奉命北伐叛王色埒默等明年凱旋繼西征至哈刺霍州以疾薨廟碑公貴而不有其位難而克任其責料敵明臨幾果聞敵所在忠勇奮發不俟嚴辦躍馬挺槊陷陳深入故士卒感服爭出死力南討北征四十年間大小百五十戰未嘗敗衄其追降生擒者皆釋而不問及處間暇恂恂似不能言論者謂公智信仁勇四者兼備與孫吳合云廟碑丞相楚國武定公公名阿爾哈雅輝和爾氏初事帝潛邸至元元年由中書省郎中參議省事出僉河南行省轉亷訪使五年治兵于楚復同僉行中書省七年拜參知政事兼漢軍都元帥十一年拜中書右丞相宋亡拜平章政事十三年拜湖廣行省左丞相未行薨年六十公幼聰穎而辨長躬農耕喟然曰大丈夫當立功國家何至與細民勤力畎畝釋耒去求讀國書一月而盡其藴師學甚缺除宋苛法衣衾惸嫠詔以世傑窮而來歸棄江陵市祀孫徵至京師死猶沒入其妻子還公于鄂神道碑初公下江陵驛聞大宴三日曉近臣曰巴延東兵阿爾哈雅孤軍戍鄂朕嘗深憂或荆蜀連兵順流而東人心未牢必翻城為內應根本斯蹶孰謂吾北庭人能覆全荆江浙聞之肝膽落矣而吳東兵可無後虞即封江陵民千家神道碑公移兵長沙行拔湘陰潭守臣植滉柱江中自喬口至城凡十五所皆斷之又拔城西柵射書招其守帥李芾速下以活州民不然拔城屠矣不答乃令諸將畫地分圍決隍水以樹梯衝炮鐵壩石心臺百日公中流矢創甚責戰益急申命諸將凡所由久頓兵者卒伍前驅諸將安行其後也自今萬夫千夫百夫長皆居前列有退衄者定以軍興法從事三日而拔語諸將曰國家為制城拔必屠是州生齒繁夥口數百萬悉魚肉之非帝諭巴延以曹彬不殺者也其屈法生之發倉以賑餓人傳檄柳全道桂陽永衡武岡寶慶江西袁連皆下之神道碑幼主面縛公入覲賀始庭拜平章政事還移兵靖江破嚴關敗馬都統臨川陳張兩總管小溶江諭經略馬暨不下凡攻四十餘日而拔公以靖江逺中土非長沙匹民性鷔囂易叛難服不重典刑之廣西它州不可言以綏徠其坑之市斬暨傳檄下柳鬱林橫雍亷象潯藤梧貴昭融賔宜賀化髙容欽雷為州二十廣肇慶德慶封為州三特磨農士貴南丹牧莫大秀皆請內屬乃閘全之湘水三十六所以通逺舟承制以萬户史格行宣慰於靖江神道碑公還潭宋餘孽益衛兩王改元海中爵以啖人規復其舊全永諸州與潭屬縣之民文才喻周隆張虎羅飛之倫大或集衆數萬小亦千數在在為羣與江之北黃蘄相煽以動皆削平之神道碑宋將張世傑傳欲襲肇慶雷詔公討之且略地海外無為賊巢過柳州嶺時暑軍士病渴所乘馬蹄地出泉人資沃飲至今名馬蹄泉而偽安撫趙與珞己戌海南白沙港公航海五百里不崇朝而至擊與珞并獲偽使冉安國黃之紀皆磔之諭降瓊南寧萬吉吉陽聞偽王陷南恩公還襲走之降方經略會偽衛王死崖山乃還復諭降八畨以其酋龍文貌入覲置宣慰司從鎮南王伐交趾其君蹈海去得文毅昭國兩王以歸神道碑余嘗讀望諸君書善作者不必善成善始者不必善終未嘗不興慨嘆於武敏間用兵端視南國為竒貨思圖形丹青垂譽竹帛於今與後者如取覃懷及襄陽下方戍淮西功已不出乎已大師南伐復分兵淮東渡江捷聞一失聲而死豈先福始禍者誠如道家所忌耶又劉武敏碑云始上書䇿宋必平時廷臣譁然異之以為虛國病民未見收其成功可嵗月計者不謀一喙而天聰獨奮然曰惟汝豫同為之興兵如所䇿圍襄陽而宋宿援師十萬于郢説不可前乃遣間懷偽燕郡王昌化軍節度使告身金印牙符聲致之公以幸吾元假手以甘心也公聞之待罪闕下詔磔死間俾中書移書讓其謀國臣曰汝禮義邦乃今出盜賊計誣我大臣大賚加公還之于軍襄陽既下詔丞相巴延將數十萬衆浮漢濟江俾公别將數萬衆遊擊淮南公鋭欲濟江為首帥者纍不可曰吾受詔遊擊敵兵使無西耳濟江非所聞也及丞相入鄂捷至公失聲曰首帥束縛顧乃成功後人善作者不必善成果然其友憤惋以死而公鼓其孤軍留戌所餘不能倍萬名城通都身至力取利盡海表圖地籍民半宋疆理凡所下州荆之南十四淮西四湖南九江之西二廣西二十有一廣東海南各四凡五十八自餘洞夷山獠荷氊被毳大主小酋棊錯輻裂連數千里受縻聽令者猶不與焉其依日月之末光張雷霆之餘威以會其成功者亦一世之雄哉今列其由省幕戎麾與所受降登宰相位者二蒙古岱阿嘍罕平章十二阿嚕齊呼圗特穆爾阿爾實克吕文焕特穆爾巴哈李庭李恆張𢎞範劉國傑程鵬飛史弼右丞四塔海唐古岱輝圖楚多爾也訥左丞四索多完顔那劉深趙修已參政十三賈文備鄭也可何湋張鼎樊楫朱國保張榮實囊嘉岱烏爾博羅哈哈爾髙達馬應龍雲從龍都元帥宣慰使總管萬夫千夫之長又什伯是觀出其門者衆多又足徵公善推勞人也神道碑元名臣事略卷二
