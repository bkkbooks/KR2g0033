body:
  text: 元名臣事畧卷三元蘇天爵撰太師廣平貞憲王王名伊實阿爾刺氏賜號伊嚕勒諾延初襲父職為右萬户至元十二年拜御史大夫二十四年將兵平納延以功加太傅二十九年加錄軍國重事知樞密院事三十一年進太師元貞元年薨年五十四公小字伊實迨至貴顯寵以不名賜號伊嚕勒諾延譯云能官也髙唐開公撰勲徳碑國初官制簡古置左右萬户位諸將之上首以公之祖博爾濟居右博爾濟贈大師諡武忠善戰知兵太祖在潜共履艱危征伐四出無徃不從時諸部未寧每遇武忠警夜必安枕寓直于内與語或至逹旦輜默爾竒斯之戰風雪迷陣再入敵中求太祖不見急趨重則御勒已還卧憩車中聞武忠至曰此天賛我也及得天下君臣之分益密武忠既老以病薨子博囉台襲爵公弱嵗襲爵統按台部衆器量宏達襟度淵深莫測其際世祖聞其賢驛召赴闕見其手骨龎厚解御服銀貂以賜國朝重太官内膳之選特命公領其事侍晏内殿公起行酒詔諸王妃皆執婦道勲徳碑至元十二年拜御史大夫公長臺憲務振宏綱弗親細故興利之臣欲援亡金舊制併憲司入漕府他日當政者又請以郡府之吏互照憲司檢底公言風憲所以戢姦若是有傷監臨之體其議乃格勲徳碑公事上遇下一本於誠事有廷辨當雷霆之下辭益鯁直天顔為之霽威勲徳碑二十四年宗王納延叛東鄙世祖躬行天討命公總戎以先之大駕至半道則公已退敵僵尸覆野數旬之間三戰三㨗獲乃顔以獻詔選乘輿駞畜百蹄勞公公謝曰天威所臨如風偃草臣何力之有駕還留公𠞰絶餘黨執其酋金嘉努獻俘於朝同惡數人戮之軍前明年納延餘燼哈坦多羅干復叛再命公出師兩與敵遇皆敗之追及兩河威乘破竹勢敵衆大衂酋長遁去時已盛冬聲言駐兵俟春方進忽倍道兼行過黑龍江徃擣巢穴殺戮殆盡其酋莫知所終夷其城郭鎮撫遺黎而還國家承平日乆變生肘腋貽九重宵旰之憂公英猷載奮不期月而三叛悉平詔憫其勞加太傅開府儀同三司申命禦邊杭愛勲徳碑二十九年加録軍國重事知樞密院事宗藩帥鉞一切禀命於公特賜步輦入内位望之崇廷臣無出其右勲徳碑三十年成宗以皇孫撫軍北邊公為輔行請授儲闈舊璽詔從之勲徳碑鼎湖上仙公奉鑾馭而南宗室諸王畢㑹上都定策之際公起謂皇兄晉王曰宫車逺駕已踰三月神器不可乆虛宗祧不可乏主疇昔儲闈符璽既有所歸王為宗盟之長奚俟而勿言王遽曰皇帝踐阼願北面事之於是宗親大人公辭勸進公復坐曰大事已定吾死再無憾惟公一言合臣民共戴之誠成先皇付託之意勲徳碑上即位進秩太師佩以上方玉帯寳服還鎮北邊勲徳碑元貞元年冬議邊事入朝兩宫賜晏酬酢盡歡如家人父子然還鎮有期不幸遘疾以十一月某日薨勲徳碑太師洪陽忠武王王名伊徹察喇學順氏至元十八年由宿衛官拜宣徽使三十年拜知樞密院事明年加太保録軍國重事樞密宣徽使如故大徳四年進太師至大元年拜和林行省右丞相封淇陽王四年朝京師薨年六十五王性仁厚儉勤事毋備諸孝敬姿貌英偉望之如神世祖雅聞其賢復憫其父之死事也年十六召見容止端重奏對詳明上驚喜曰失烈門有子矣王曽大父博囉罕自太祖蚤年已見聖駕委心臣事大業肇基身餘百戰竟薨于敵是時官制簡古止為第一千户大父托歡嗣父官佐憲宗四征不庭日闢土疆父實勒們恒鎮徼外從征六詔懷服諸蠻遘疾薨于軍即命領四集賽太官集賽者國制分宿衛供奉之士為四番番三晝夜凡上之起居飲食諸服御之政令集賽之長皆總焉清河元公撰勲徳碑至元十七年長一集賽明年詔曰伊徹察喇秉心忠實執事敬慎知無不言言無不盡曉暢朝章用輒稱㫖不可以其年小而遲其官可代錫津為宣徽使勲徳碑二十六年上討反者于杭愛皆陳王奏曰丞相安圖巴延御史大夫伊嚕勒皆嘗受命征戰三人者臣不可以後之今勍賊逆命敢禦天戈陛下憐臣賜臣一戰上曰乃祖博囉罕佐我太祖無征不在無戰不克其勲大矣卿以為安圖軰與爾家同功一體各立戰多自愧不逮然親屬櫜鞬恭衛朝夕俾予一人不逢不若爾功非小何必身編行伍手事斬馘乃始快心邪勲徳碑二十七年僧格既立尚書省簧鼓上聴殺異己者箝天下口以刑爵為貨而敗之咸走其門入貴價以買所欲貴價入則當刑者脱求爵者得不四年紀綱大紊人心駭愕尚書平章政事伊蘇岱爾王之太官屬也潛以其事告王王奮然奏劾僧格伏誅上曰伊徹察喇口伐人奸發其䝉蔽乃以没入僧格黄金四百兩白銀三千五百兩及水田水磑别墅賞其清彊勲徳碑僧格既敗上以湖廣行省西連畨洞諸蠻南接交趾島夷延袤數千里其間土沃而人夥畬丁溪子善驚好鬬非賢方伯不能撫全王舉哈喇哈斯達爾罕以為其省平章政事凡八年威徳交孚蜚聲海外入為丞相天下稱賢勲徳碑二十八年都水使者請鑿渠西導白浮諸水經都城中東入潞河則江淮之舟既達廣濟渠直泊于都城之滙上亟欲其成又不欲役及細民敇四集賽人及諸府人與鑿所司髙深之分賦之刻日使畢王率其屬著役者服操畚鍤即所賦以倡趨者如雲依刻而渠成賜渠名通惠河而河為公私大利上語近臣曰是渠非伊徹察喇身率衆手成不亟也成宗登極制曰伊徹察喇盡其誠力深其謀謨抒忠于國流惠於人可加開府儀同三司太保録軍國重事樞密宣徽使如故勲徳碑大徳四年拜太師初金山南北叛王海都都勒斡據之不奉正朔垂五十年時入為㓂恒命親王統左右部宗王諸帥屯列大軍備其衝突五年朝議北師少怠紀律或失命王亞晉王以督之是年海都都勒斡入冦我為五軍王將其一鋒交軍頗不利王視之怒被甲持矛身先陷陣一軍隨之出敵之背五軍合擊敵大崩潰海都都勒斡遁去王罷兵歸鎮賞功謀罪恩威服于敵人厥後都勒斡請臣附時武宗亦在軍王遣使與武宗及諸王將帥議都勒斡請降為我大利固當待命於上然徃返再閲月必失事機事機一失為國大患人民困于轉輸將士罷于討伐無有已時矣都勒斡妻我弟瑪古哈喇之妹也宜遣報使許其臣附衆議為允既遣使以事聞上以公深識機宜既而瑪古哈喇復命由是叛人稍稍來歸勲徳碑十年冬叛王穆爾特穆爾等屯于金山武宗帥師出其不意先踰金山王以諸軍繼徃壓之以威啖之以利穆爾特穆爾乃降其部人驚潰王遣圗們特穆爾察呼將萬衆深入其部人亦降徹伯爾者海都長子也海都死嗣領其衆至是我軍掩取妻子及其部人兩部凡十餘萬口勲徳碑至大元年王遣使奏曰諸王托和木本懐攜貳而徹伯爾游兵近境叛黨素無悛心倘合謀致死則垂成之功顧為國患臣以為昔都斡勒先衆請和雖死宜遣使安撫其子庫春使不我異又諸部既已歸明我之牧地不足宜處降人於金山之陽吾軍屯田金山之北軍食既饒又成重戍就彼有謀吾已𢷬其心腹矣奏入上曰是謀甚善公宜移軍阿達罕薩音薩哈地王既移軍徹伯爾托和木欲奔庫春不敢納去留無所遂相率來降於是北邊以寧勲徳碑上詔王曰公之先佐我祖宗常為大將功城戰野勲烈甚著公國之元老宣忠底績靖謐中外朕昔入繼大統公之謀猷甚多今立和林等處行中書省以公為右丞相依前太師録軍國重事特封淇陽王佩黄金印宗藩將領實瞻卿麾進退其益懋乃徳悉乃心力母替所服勲徳碑四年王入朝仁宗燕之于大明殿眷禮優重九月六日疾病敇御醫數軰診療越三日薨勲徳碑樞密句容武毅王王名托克托呼欽察氏世為欽察國主國亡率其種人入宿衛至元十四年王將兵北伐有功除同知太僕院事改衛尉院事領羣牧司事二十二年拜樞密副使攝欽察親軍都指揮使大徳元年遷同知樞密院事是嵗薨年六十一公欽察人其先係武平北哲琳川按塔哈山部族徙絶域有山曰伊埓巴爾襟帶二河左曰約囉右曰伊蘇定居焉自號欽察其地去中國三萬餘里夏夜極短日漸没輒出川原平衍草木盛茂土産宜馬富者有馬至萬計俗衽金革勇猛剛烈盖風土使然公之始祖庫春髙祖蘇穆鼐曽祖伊納克實世為欽察主太祖征默爾竒斯其主輝圗奔欽察遣使諭伊納克實謂使者曰逃鸇之雀蘙薈猶能生之吾顧不如草木耶嵗丁酉憲宗在潜邸奉命薄伐兵已叩境公之父巴圗徹爾舉族迎降從征默爾竒斯世祖征大理伐宋渡江率其種百人侍左右以其俗善芻牧俾掌尚方馬畜嵗時撞馬湩以進其色清徹號黑馬乳因目其屬曰哈喇齊盖華言黑也中統初同氣有䦧墻之釁靖亂有功賞銀百兩公年逾弱冠亦以功受銀五十兩巴圖徹伯爾卒乃襲職備宿衛髙唐閻公撰紀績碑宗室海都粤自先朝畔涣朔方國家根本之地在北詔遣皇子北平王率諸王鎮守之至元十四年諸王托克托穆爾錫里濟叛北平諸部暨祖宗所建大帳盡為所掠公請為國宣力率兵討叛以其年三月敗敵將多爾濟戬於納琳布拉邀諸部以還夏四月應昌部族珠爾噶岱構亂托克托穆爾引部相應中途遇公將㑹戰擒其偵伺者數十騎敵乃引退珠爾噶岱勢孤不能振尋即殄滅夏六月聞敵騎駐圖喇河馳河上追奔逐北三宿而後返秋八月復敗敵於斡琿河獲所掠祖宗大帳北平部衆悉追還之紀績碑詔公率欽察驍騎千人從大軍北伐十五年正月追錫里濟過金山擒扎哈台等以獻繼敗庫春等被創力戰獲輜重羊馬甚衆紀績碑有㫖欽察種人或𨽻諸王或在民編皆命析出𨽻公部伍於是户給楮幣二千緡嵗賜粟帛擇材堪宿衛者從事輦轂紀績碑二十三年置欽察親軍都指揮使公以樞密副使攝都指揮使衛之官屬聴以公宗族將吏為之夏六月海都兵犯金山詔公與大將托多爾海共為守禦紀績碑二十四年春東藩諸王納延叛陰結其屬額布根錫里哈於北邊諜者二人至軍中為公所執盡得其情使以聞且言宜召錫里哈等赴闕一日錫里哈設宴召公及托多爾海托多爾海將徃公止之曰彼已藏禍心吾屬至必被擒大軍誰與統屬遂不徃尋有㫖令錫里哈入朝將東道進公言於北安王曰若輩分地在東脱有不虞是縱虎入山林也乃命從西道進既而有言額布根叛者衆欲先聞于朝然後發兵公言兵貴神速吾盡忠於國當臨事制宜若彼果叛兵至可即屠之否則與約而還衆以為然即日啟行公為前鋒疾驅七晝夜渡圖喇河乃與額布根戰於博恰嶺彼大敗俘獲無筭額布根僅以身免紀績碑世祖親征納延聞額布根敗走遣使諭公收其餘黨沿河而下遇叛王特爾格軍萬騎擊走之獲納延羣牧馬畜擒叛王哈喇婁等獻俘行在所悉誅之欽察喀喇之屬自叛所來歸者即以付公始置哈喇婁萬户府欽察之散處安西諸王部下悉令公統之紀績碑冬十月納延餘黨復萌成宗時在儲闈詔命公扈從徃征之十一月至哈拉衮誅烏塔噶等降其部曲紀績碑二十五年諸王伊竒哩部衆為叛王哈喇哈斯所掠遣使告急公復奉命從成宗率師徃援夏五月與敵戰于烏爾呼彼軍敗衂伊哩竒部衆盡復師還至哈拉衮山聞叛王哈坦軼我邊鄙宵濟古烈河大敗敵軍哈坦脱身逃竄遼左諸部悉為我有乃置東路萬户府鎮守其地紀績碑二十六年春從皇孫晉王征海都夏六月兵抵抗愛嶺敵先據險我師失地為敵所薄軍士隨潰公一軍獨前鏖戰久之翼衛晉王而出行至信宿聞襲騎在後公選精鋭為殿設伏以待之襲騎聞之遂不敢進秋七月世祖廵幸北邊褒諭公曰惟昔聖祖肇基失利于斡罕一二藎臣同飲班珠爾河水者至今稱之卿赤心衛社稷馳譽朔南雖死之日猶生之年卿其勉旃還至京師㑹宴羣臣復諭公曰朔方人來海都有言抗愛之役使彼邊將人人善戰如托克托呼吾屬安所措矣凡有功將士可令見朕欲面加優賞公言慶賞之典䝉古將士宜先之世祖曰卿毋飾讓若輩誠居汝曹之右盍效汝曹力戰邪明日召諸將士頒賞有差紀績碑二十八年秋公率哈喇齊萬人北獵罕達該敵衆將入冦知公在邊遂引去紀績碑二十九年秋畧地金山虜海都之黨三千餘户還駐和林紀績碑三十年春有詔進取竒爾濟蘇師次謙河冰行數晝夜至其境盡收五都之衆屯兵鎮守之遣使奏功進秩龍虎衛上將軍仍給行樞密院印以使文移夏五月海都聞公取竒爾濟蘇引兵至謙河復為公所敗擒其將博囉齊一嵗之内多雋功紀績碑成宗即位以邊圉事重須公鎮守有㫖無預朝㑹紀績碑元貞二年秋宗室諸王附海都者率衆來歸邊民驚擾徃徃逃匿山谷公率兵直抵金山伊嚕哈斯界餉饋資糧安集衆庶導諸王永和爾等入朝紀績碑公為將鷙猛先期制敵應變如神尢善激昻士氣臨陣誓師人百其勇至若出司閫鉞入賛機樞忠國大計知無不言古之所謂熊羆之士不二心之臣於公見之紀績碑元名臣事畧巻三
