body:
  text: 元名臣事畧傳記類三總錄之屬提要臣等謹案元名臣事畧十五巻元蘇天爵撰天爵字伯修真定人由國子學生試第一釋褐授從仕郎薊州判官終浙江行省叅知政事事跡具元史本𫝊此書記元代名臣事實始穆呼哩終劉因凡四十六人大抵據諸家文集所載墓碑墓誌行狀家𫝊為多其襍書可徴信者亦採掇焉一一註其所出以示有徴葢仿朱子名臣言行錄例而始末較詳又兼仿杜大圭名臣碑𫝊琬琰集例但有所棄取不盡錄全篇耳後蘇霖作有官龜鑑於當代事跡皆採是書元史列傳亦皆與是書相出入足知其不失為信史矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀元名臣事畧序應奉翰林文字趙郡蘇伯修年弱冠即有志著書初為冑子時科目未行館下士鮮言詞章講誦既有餘暇而筆札又富君獨博取中朝鉅公文集日鈔之凡而元臣世卿墓表家𫝊徃徃見諸編帙中及夫閒居紀録師友説於國初以來文獻有足徵者彚而梓之始疏其人若干屬以其事中更校讎櫛去而導存抉隠而蒐逸乆而成書命曰國朝名臣事畧他日余與伯修同預史屬從借讀之作而嘆曰壯哉元之有國也無競由人乎若太師魯國淮安河南楚國諸王公之勲伐中書令丞相耶律楊史之器業宋商姚張之謀猷保定稾城東平鞏昌之方畧二王楊徐之辭章劉李賈趙之政事興元順徳之有古良相風亷恒山康軍國之有士君子操其他臺府忠藎之臣帷幄文武之士内之樞機外之藩翰班班可紀也太保少師三太史天人之學陵川容城名節之特異代寧多見哉至於司徒文正公尊主庇民之術所謂九原可作我則隨武子乎嗟乎乾坤如許大人才當軰出伯修是編未渠央也姑志余所見如是云天厯己巳四月乙卯翰林待制冀郡歐陽𤣥謹序自古帝王有天下或受於人或起而取之堯舜禪讓湯武弔伐厥時義大矣書紀唐虞之際易稱湯武革命應天順人皆有輔佐同心一徳後世可述焉孟子曰五百年必有王者興其間必有名世者𫝊曰有立徳立功立言是謂不朽誠哉是言也三代而降其盛者曰漢曰唐曰宋夫子言革之時蓋謂必有不得其義者矣如近代是也皇元起朔方紹帝運接統資始於天不因於人遂大作明命訓戒宇内一啟而金人既南遼海和輯再啟而西域率服遂拓坤隅三啟而靖河北秦晉戡集河南是同分宗子以方社胙功臣之土四啟而庸蜀是柔五啟而江漢奄從趙氏為臣陸道西北見角端溟海無際舶乃旋艫凡有血氣者莫不尊親而崇極配天矣厥初受命南北割裂天氣不通二氏不享天實醜之乃眷北顧俾我聖人作神天主完顔璟割虐下民趙氏爽盟背約自伐喪其國家大哉貞矣其允時義也易曰田有禽利執言此之謂也其始桓毅討伐䖍劉戡定之其暨肅恭恪勤棐圉輯柔就緒之其後勸相富厚之定之以上下道之以名分淑之以庠序秩之以禮樂慶之以官賞董之以威罰而天下成矣列聖運於上賢臣賛於下穆穆明明相須以成相濟以寧是故舜有臣五人而天下治武王有亂臣十人非虚言也故論本朝輔亮之臣其佐命垂統或鷹揚於外或運籌於内有同肇迹之艱難者矣其輔翼成化或規模𢎞逺或論思密勿有登治道之鴻熙者矣翰林修撰趙郡蘇君天爵始為成均諸生好訪當今之故攷遺失迹搆百家行狀碑誌𫝊賛叙述及他文賅載者見其本末既而仕為典籍應奉凡三為史氏在職八年遂徵以所知無所乖舛於是紀述其故自國初至于延祐之際自太師國王以下或周召懿親或岐豐舊姓或秉義效順或降附後見或策杖上謁或徵起草野功格皇天保乂國家所謂名世者天爵徳器優逺悉心盡職不顧己私所謂不朽者夫歴代以來善終善始未有若今日之懿者也昔漢髙之臣皆戰國之餘非南面而王之不能畢其功全莫我若也光武之臣皆生西漢多經術之士功定天下不過封侯賞莫我若也使髙光易世而居亦不能相及何哉其人異也天生聖賢共成大業豈漢敢望哉書成凡十五巻號名臣事畧其事之所載盡摽作者姓氏示不相掩也其名位顯著功在帝室求未得者續為後録蘇君常閔宋氏以來史官不得盡其職載筆之士多乖故實宋人詳而多曲筆又以比時遼金簡而徑事多湮昧於是著其故輯其闕漏别為遼金紀年皇道之成與三代同風身為史氏顧已職業繹而明之君子哉其用心也蘇氏自唐宰相味道以文章顯宋太史文忠公軾父子兄弟稱欒城焉所從來逺矣繼之者修撰君也泰定初故侍講㑹稽袁公薦君亮達前代文獻今侍講蜀郡虞公舉君該洽文辭爾雅由是遷修撰云至順辛未六月辛亥賜進士出身文林郎翰林國史院編修官南鄭王理謹叙
