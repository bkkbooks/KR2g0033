body:
  text: 元名臣事畧巻七元蘇天爵撰太保劉文正公公名秉忠字仲晦順徳邢臺人少隐武安山因祝髮從釋氏㳺後居雲中從海雲師應召北上留侍潛邸凡征伐謀議皆與焉至元初翰林王鶚請公改正衣冠詔從之遂拜太保參領中書省事十一年薨年五十九公風骨秀異志氣英爽不覊家貧年十七為邢臺節度使府令史以養其親一日因案牘事有不愜意投筆嘆曰吾家奕世衣冠今乃汨没為刀筆吏乎即棄去隠於武安山天寧禪師聞之遣其徒招致為僧以公知書工翰墨命掌書記後逰雲中值海雲禪師被召北覲過雲中聞公博學多藝能求相見既見約公俱行謁上于潛邸一見應對稱㫖自是屢承顧問及征雲南還公遂見留王文忠公撰神道碑録事公卒訃音至公懇求奔喪上賜黄金百兩仍遣使送至邢州公持服營𦵏事服除被召後還和林公獻書陳時事所宜者數十條率皆尊主庇民之事上嘉納之神道碑邢州古民郡也國初為某官食邑州舊萬餘户兵興以來不滿五七百公言于上曰今邢州破壊如此當得良二千石如真定張耕洺水劉肅者治之猶可完復如故上從之請于憲宗以耕為邢州安撫使肅副之兩人皆儒者亷平方正既至蘇枯弱强爬蠧剔荒由是流民四集宅爾宅畋爾田未㡬改邢州為順徳府韋軒李公撰文集序癸丑從征大理克城之日令行禁止未嘗妄戮一人公之謀居多甲寅從征雲南已未從伐宋由楊羅渡濟漢江公曰古者軍賞不踰時盖急武功作士氣也今三軍暴露于外乆所至必㨗而未獲少酬其勞可使近臣一人慰藉之上曰善即命呼魯蘇以諭其志故人人踊躍皆樂為用進圍鄂州閲三月宋人乞和全師而還文集序丙辰上始建城市而修宫室乃命公相宅公以桓州東灤水北之龍岡卜云其吉厥既得卜則經營不三年而畢務命曰開平尋升為上都文集序上神武善斷每臨陣前無堅敵而中心仁愛公常賛之以天地以好生為徳佛氏以慈悲濟物為心方便救䕶所全活者不可勝計神道碑庚申上正位宸極命公曰凡治天下之大經養民之良法卿其議擬以奏公即上採祖宗舊典參以古制之宜扵今者條列以聞深稱上意詔下之日綱舉目張一時人材咸見錄用文物燦然一新張忠宣公撰行狀至元元年翰林承㫖王鶚奏言書記秉忠效忠藩邸積有嵗年參帷幄之密謀定社稷之大計忠勤勞績宜被褒崇今聖明御極萬物維新秉忠猶以野服散號守其初心深所未安宜與正其衣冠崇以顯秩上覽奏即日會有司備禮冊授公光禄大夫位太保參領中書省事賜第于奉光坊給少府宫籍監户甚衆公齋居蔬食終日澹然與平昔略不少異神道碑既又圖克坦公履撰墓誌云公大拜以天下之重為己任以身徇國知無不為奏建國號定都邑頒章服立朝儀事無巨細有闗於國家大體者條舉而縷陳之無有遺者吾又魯齋文集云初太保之奏朝儀也因言髙帝有言乃今知皇帝之貴也㫖漢髙眼孔小朕豈如是十一年扈從至上都居南屏山精舍儼然端坐無疾而薨訃聞上嗟悼不已謂羣臣曰秉忠事朕三十餘年小心慎密不避險艱事有可否言無隠情又其隂陽術數之精占事知來若合符契惟朕知之他人不能得與聞也神道碑公自幼好學至老不衰通曉音律精算數善推步仰觀占候六壬遁甲易經象數邵氏皇極之書靡不周知初丁太夫人憂毁瘠骨立衣一敝裘三嵗不易及録事公卒雖身從天竺之教而服食貶損容貌哀戚與循禮典而執通喪者無少異也神道碑國家列聖相承咸以武功戡定禍亂豐功偉績之臣不為不多若夫輔佐聖天子開文明之治立太平之基光守成之業者實維公為稱首上在潛邸士之所以涉逺道冒風霜而至者往往有所陳訴祈請惟公獨無所求閒燕之際每承顧問輒推薦南州人物可備器使者宜見録用由是弓旌之招蒲輪所迓耆儒碩徳竒才異能之士茅拔茹連至無虛月逮今三十年間敭歴朝省班布郡縣賛維新之化成治安之功者皆公平昔推薦之餘也神道碑丞相史忠武王王名天澤大都永清人嵗乙酉嗣其兄職為都元帥己丑授真定大名河間濟南東平五路萬户壬子授河南經略使中統元年授河南宣撫使盡兼江淮軍馬經略使二年入拜中書右丞相至元三年皇子燕王領中書省兼任樞密使遂拜中書左丞相兼樞密副使八年加開府儀同三司平章軍國重事十一年與丞相巴延總兵伐宋至郢以疾還十二年薨年七十四嵗庚辰金將武仙以真定降太師國王命公兄天倪充河北西路兵馬都元帥即鎮守俾仙貳焉公時年二十餘身長八尺騎射拳勇絶人屬櫜鞬署帳前總領汲郡王公撰家傳乙酉春公䕶母北歸武仙叛都帥遇害府僚王守道追公及燕曰變起倉猝部曲散在近郊即廻斾當不招自至公毅然曰不共國之仇死亦當往况不死耶遂傾貲裝易鎧仗而南行次滿城得士馬甚衆遣監軍季伯佑言狀於王就請兵濟討即命公紹兄職仍以國將實訥岱統精甲三千為援合勢進攻盧奴仙驍將葛鐵槍擁萬衆來援公徹圍逆之奮先將士灑血馳戰呼聲動地無不一當千葛氣褫㑹日暮退依沽水為阻公料其退歸敵必宵遁果然乗之衆大潰生擒鐵槍軍威大振遂下中山略無極拔趙州進駐野頭仙懼奔西山之抱犢砦其年夏六月復真定無㡬宋將彭義斌隂與仙合又圖竊取公同國將禦諸賛皇扼仙軍不得進義斌勢蹙燎山自固公令監軍孫某提鋭卒五十略其後公以鐵騎蹂之斬義斌戲下自是義勇之名軒襮燕趙間後數月仙潛納反者匿大厯寺後斬闗為内應公跳走藁守帥董俊以全軍授公復與實訥岱破走仙主帥忿怒其反覆驅萬人出將𠞰焉以示威公曰是皆吾民我力不能及一旦委去不幸為賊脅制今殺之何罪乃全釋之公乃繕城壁儲武備為不可犯之計嵗荒食艱嘗甘攻苦與衆共之於是招流散拊瘡痍披荆榛掇瓦礫數年間官府民衆以次完治然商公抱犢諸柵仙之巢穴也不即剪覆終遺後患隨攻下之仙䑕竄而去繼又取相衛蟻尖蒼峪馬武京等砦家傳太宗即位公入覲朝議方選三大元帥分統漢地兵上素聞公賢以杖麾公及劉哈瑪爾蕭札居右詔為萬户其居左者悉千夫長遂以真定河間大名東平濟南五諸侯兵𨽻焉家傳庚寅冬圍仙于汲金將完顔哈逹以衆十萬來援兵始交不利諸將乗虛一時奔北公獨以千人繞出敵後挺刄横擊敗一都尉軍既而復與大軍合攻仙逸去復取衛州家傳壬辰太宗由白波渡河詔公以兵㑹河南至則睿宗已破哈達軍于三峰山命公略地京東遂招降太康懐縣瓦岡睢州追殺帥臣完顔慶善努于陽邑家傳金主東播復自黄龍岡來襲我新衛公聞之輕騎馳赴比至已合圍奮戈突城下呼守者曰汝等勉力援兵繼來復躍出敵愕睨明日大軍至内外夹擊敗走蒲城公尾其後金將完顔布呼將兵尚八萬我軍殺掠殆盡金主以單舸東保歸徳公與諸軍㑹睢陽薩竒蘇欲薄城背水而營公曰若敵來犯我進退失據此豈駐兵地耶公以事赴汴比還薩竒蘇全軍皆没家傳金主入蔡諸道兵圍之公當其北面汝水阻其前乃結篾潜度血戰連日金遂亡西溪王公撰行狀金亡公還趙視師自乙未版籍後政煩賦重急于星火以民猝不能辦有司貸賈胡子錢代輸積累倍稱謂之羊羔利嵗月稍積操籍來徵民至賣田鬻妻子有不能給者公詣闕奏其事官為代償一本息而止軍則中户充籍其征賦差貧富為定額詔皆從之諸路永為定制家傳戊戌己亥間仍嵗蝗旱復假貸以足貢賦積銀至萬三千餘錠公度民不可重困乃先傾其家資次及族屬官吏均配以償遂折其券家傳監郡孟克薩勒以國兵數萬散處州郡間伐桑蹂稼生意悴然公奏太后悉徙居嶺北于是田里有遂生之樂迄今真定兵甲民數勝于他郡由公牧養其根本故也家傳國朝自金亡嵗有事于宋公未嘗不在戎行棗陽之役城小而堅主帥忿其攻乆不援命徑乗其城公先登戰愈力克焉其攻襄陽也宋以舟師數千陳峭石灘犄角以綴我師公驅猛士兩舸直前𢷬之彼氣既奪奮槊盪决覆溺者萬計及取光化復引絙首上立陷其城復州之役敵以鬭艦三千艘鎖湖面為柵破則復自續遂募勇敢士四十輩親鼓而前壊蕩無遺敵懼而降其攻夀春也宋人以我圍遠勢分緩急首尾莫應敵乗夜果來斫營公單騎逆戰手格殺數人戲下繼至盡驅敵人入淮水至若掀滁州蹂盱眙掇寳應瀕江諸湖且破且降者二十餘所雖會諸道兵共事其伐謀制勝愾敵樹功未嘗不在羣帥之右及策勲盟府推讓行間寸長不掩故諸將曲盡其智能士卒樂出其死力論者謂公智信仁勇有古良將風上在潛邸壬子春行幕駐嶺上極知漢地不治河南陕西尤甚憲宗方倚任於伊囉斡齊乃因朝覲請分河外所屬而試治之乞不令伊囉斡齊有所鈐制詔許之是時河南民無依恃差役急迫流離者多軍無紀律暴掠平民莫敢誰何邉無備禦宋人跳踉内地之民多被殺擄上舉公與趙公璧立經略司於汴而代治焉公扵是選賢才居幕府以清其源置提領布郡縣以察奸弊均賦税以蘇疲困更鈔法以通有無設行倉以給軍餉人始免攘奪矣立邉城以遏宼衝民皆得以保全矣誅奸惡以肅官吏立屯田保甲以實邉鄙利則興之害則去之不一二年而河南大治行于野民安其樂郊出于塗商免其露處觀民俗則既庶而有教察軍志則又知夫怯私鬭而勇公戰威行惠布陽開陰肅内外修治略無遺策河流逺潤衛亦復承平之舊宋為墮其北門矣行狀癸丑夏上在六盤召公議經略司事公因奏曰始臣攝先兄軍民之職先兄有二子民權已歸其長楫兵柄又歸其次權臣可退休矣上曰無夫之婦無父之子誰當顧恤此卿之良徳也問以退休之由公對曰臣一門三要職分所當辭上曰昔青吉斯皇帝封有功者十人為千夫長因諭衆曰今所封之人有年幼者汝等無疑此人父兄俱有功于國未及封賞而死豈得不報又一家三子其一襲父職其次多才能固不以既官一人而不用也又其次或立功效亦不以已官二人而不用也豈無一門三要職者竟不許辭行狀丁巳春詔左丞相阿勒達爾勾較諸路財賦阿勒達爾性苛刻鍛鍊羅織轉功為罪例遭陵辱公以勲舊獨容假之公曰經略事我實主之是非功罪理當我責今捨焉而罪餘人心何能安用是得釋者甚衆家傳戊午秋扈憲宗西征明年夏駐合之釣魚山秋疫作方議回鑾宋將吕文徳率艟艨千餘蔽嘉陵江來犯逆戰不利上命公禦之乃分兵為兩翼跨江注射新總舟師順流縦擊獲鉅艦數百艘追至重慶三戰三㨗率全師而還中統元年上即位首韶公問以治國安民之術公具疏以聞大略以為朝廷當先立省部以正紀綱設監司以督諸路霈恩澤以安反側退貪殘以任賢能頒俸秩以養廉禁賄賂以防奸應能上下丕應内外休息上嘉納之命公之鄂渚江上軍既還詔授公河南宣撫使兼江淮諸翼軍馬經畧使行狀二年夏五月拜中書右丞相公既秉鈞衡細大之務知無不為然言必慮其所終符必稽其所始不強時之不能不禁民之必犯體時順勢通變制宜于是立中書以正紀綱分六部以綜名實設撫司以肅州郡退貪殘以簡賢能霈恩澤以安反側頒禄秩以養廉節禁賄賂以絶倖門又定省規十條董正其機務家傳憲宗初年括户餘百萬至是諸色占役者强半悉奏罷之賦稅􅗀絲法盡均一論思之際處國相儒臣間調諧彌縫必使情通理得期于事集功成澤被生民而已自是上下交孚帝載熙緝中書無留務矣故中統初元文物休明階太平之治者公之力俱多家傳秋九月扈從北征次錫黙圗與額埓布格遇上命錫津將右軍公將左軍合大勢蹵之北兵潰遁家傳三年春李璮陰結宋人以益都叛率軍據濟南上命親王哈必齊總諸道兵討之璮兇勢甚張繼命公往公受命不至其家輕騎奔赴至則亟築長圍樹木柵遏其侵軼使内外不相聞凡四月城中食盡軍潰出降生擒璮斬軍門誅同惡數十人餘悉縦令歸家明日引軍吏行未至益都城中人已開門迎降初公將行上臨軒授詔責公以專征之任俾諸將皆聼節度公自始至還未嘗以詔㫖示人其謙退慎密如此入見上慰勞公悉歸功諸將若無一毫出於已者王文忠公撰神道碑三齊平公首奏兵民之權不可併居一門行之請自臣家始史氏子弟即日皆解紱而退家傳至元三年皇太子燕王領中書省兼判樞密院以公為左丞相樞密副使遂議建三衛及留兵寓農之策不二三年國容軍實蔚然可觀家傳六年朝廷營取襄漢詔公與駙馬呼喇珠往經畫之至則相要害起一字城聫亘諸堡貯兵儲絶聲援示以乆駐必取之基明年以疾還家傳八年授開府儀同三司平章軍國重事仍令丞相安圖諭公曰中書省尚書省御史臺或一月或一旬遇有大事卿可商量小事不必煩卿也神道碑十年宋將吕文焕以襄陽内附聖天子赫然有掃清六合混一車書之意明年春詔公與丞相巴延總大軍自襄陽水陸並進趣鄂渚渡江中道病不能進上聞遣使勞公仍慰諭曰卿自朕祖宗以來宣力者多矣又首事南伐異日功成皆卿力也勿以小疾阻行使為憂勞可且北歸善自調䕶又牧庵文集云公方將百萬之衆南伐至江而疾詔他將専制而還公于軍其辭若曰畫剪宋䇿汝也成功而疾汝安可言誠有不諱碑汝之勲班汝之罰雖不可必死者之知能知之者非人與汝子孫耶公還真定上又遣其子杜與尚醫馳視因附奏曰臣大限有終死不足惜第願天兵渡江以殺掠為戒言訖而薨略不及其家事家傳公忠亮有大節出入將相近五十年其元勲碩徳柱石四朝師表百辟殆古社稷臣而氣貌仍然若無所為者及臨大事論大政夷大難毅然以天下之重自任要以竭忠徇國尊主庇民為心一以至誠將之其視富貴權勢斂然畏避若將有浼於巳者其善始令終世擬之郭汾陽而器量涵𢎞識慮明哲又根于天性然家傳公孝敬友愛忠信誠篤明而恕寛而肅言約而理到氣和而色莊人誣之而不辨人譽之而不喜勞而不伐有功而不徳見利不茍就見害不茍避其行已也知時識勢其臨事也應變制宜行狀公年四十始折節讀書酷嗜資治通鑑真積力乆義精理貫至成敗是非往往立論出人意表雖老師宿儒有不加詳者至於矢論廟堂運籌帷幄良法美意契合融㑹見諸行事者誠無愧于古人家傳初武仙既害都元帥公紹其職及兄子楫長即奏請以職歸之太宗曰但聞争官者多讓職者鮮卿此舉殊可嘉尚朕自有官畀之即詔楫為真定路兵馬都總管又奏次姪權充唐鄧軍百户憲宗駐六盤也詔發民為兵𠡠使擬公子為帥公曰吾兄弟三人大兄之子俱顯仲之子未也幸先之使者嗟服竟以姪子樞先新軍百户行狀公嘗戒其子姪曰史氏起隴畝際風雲涼徳薄效其將㡬何今身名顯赫宗族昌熾如是何以答乾坤大造累朝之恩私乎若以王事歿身邉野裹馬革歸𦵏吾素願也汝等謹服此訓茍違吾言與暴吾丘墓等耳家傳初公之取衛也獲衛士富察輔之公問金朝才幹之人汝識者誰輔之以近侍局副使李正臣對及破歸徳縛數人將殺之公問一縛者為誰曰我李正臣也公救免遣人䕶送至真定後任為參謀一路事悉聼其施為措注焉每南征北覲公必署空名委劄數十通有可用者即書畀之或䜛間之公一不聼衛既為公食邑即命軍前參議王昌齡治之衛前為蕭帥所節制凡蕭氏所署矯虔之吏所行蠧政一切罷之失職者造為誣毁公用之愈篤其知人之明用人之専𩔖如此行狀北渡後名士多流寓失所知公好賢樂善偕來游依若王滹南元遺山李敬齋白樞密曹南湖劉房山段繼昌圗克坦侍講公為料其生理賔禮甚厚暇則與之講究經史推明治道其張頤齋陳之綱楊西菴孫議事張條山擢用薦達至通顯云家傳憲宗駐合州也一夕詔鞏昌汪帥及東諸侯軍各摘鋭士若干以備宿衛命公總之有邉將富察琚者偃蹇不為下公含容之明年琿塔噶平行臺上其功獨琚名闕公問之或以前事對公曰若戰功最多其可後哉遂均賞賚其忘過記功又如此家傳公初大拜朝野交慶公門閣蕭然有面説公不以威權自長者公因舉唐周墀為相問于韋澳曰力小任重何以能濟澳曰願相公無權墀諤然不知所謂澳曰刑賞爵祿與天下共之何權之有言者悚服而退家傳自中統建元以來中書省官少即五十員多至七十員列坐一堂凡政事議行之際所見異同互相軒輊待其國相可否之然後為定公於其間審其無害則行之不疑若有失當心平氣和委曲論列期合于理而已不以詭隨為得計不以循黙為知體故在中書十餘年或奉行上意或更張事宜彌縫扶持天下陰受其賜者不可勝計行狀嘗有上書奏先朝太宰請以汾陽王郭子儀濟陽王曹彬封諡者上曰朕想郭子儀曹彬皆有顯功終身無大過以致如此今所奏豈其然哉朕所知者史天澤其人也行狀平章㢘文正王王名希憲字善甫輝和爾氏由父官㢘訪使氏焉初事潛邸嵗癸丑授京兆宣撫使丁巳宣撫司罷中統元年復為京兆宣撫使未㡬拜中書右丞行秦蜀省事就拜平章政事四年召入朝拜中書平章政事至元二年分省山東踰月召還七年罷行十一年行省事北京明年行省江陵十四年以疾召還十七年薨年五十公以辛夘五月二十五日生于燕適孝懿公㢘訪使命下孝懿喜曰是兒必大吾門吾聞古者以官受氏天將以廉氏吾宗乎吾其從之舉族承命河南高公撰家傳公幼魁偉舉止異常九嵗家人盗五馬逸去已而俱歸失所盗物時法制未定盗咸當死孝懿怒將付有司公泣諫止之卒活此四人孝懿北上魏國夫人留居山中有豪奴兩人酗酒出惡言公曰是㓜我也即械繫府獄杖之家人悉震懼無敢譁者公仁義之施見諸㓜年者已如此家傳年十九侍孝懿北覲入侍世祖潜藩上亦因其多智有威容論議宏深恩顧殊絶家傳公於書嗜好尤篤雖食息之頃未嘗去手一日方讀孟子聞急召因懐以進上問何書對曰孟子上問其説謂何公以性善義利之分愛牛之心擴而充之足以恩及四海為對上善其説目為㢘孟子家傳諸貴臣校射上前一貴臣顧公取三矢似欲授公公曰爾豈億我為不能耶顧吾用弓差軟諸貴假以勁弓三發連中諸貴驚服曰真文武全材有用書生家傳上初以京兆分地置宣撫司歳甲寅還自雲南即命公為宣撫使京兆諸郡臂指隴蜀諸王貴藩環擁周布户雜羌戎尤號難治公訪民瘼不憚設施摧摘奸强扶植貧弱事無遺使少暇則延訪耆宿如魯齋許公雪齋姚公咸待以師友薦許公於潛邸充京兆提學俾教育人材為根本計辟河南智仲可參幕府扁所居堂曰止善公退則坐於中明經讀史凡義理精粗事務得失研究纎密必歸於是而後已家傳富民貸錢民間至本息相當責入其本又以其息為券嵗月責償號羊羔利其徵取之暴如夏以火迫冬置凌室民不勝其毒公正其罪雖嵗月踰乆毋過本息對償餘皆取券焚之後著之令家傳國朝創制凡名為士類者母𨽻奴藉獨京兆多豪右廢格不行公至一如令有稍通章句者亦來儌倖其主蓄憾勿置公哀其情出私錢贖之俾附儒籍家傳民有其妻與卜者厭詛其夫置毒殺之獄成僚佐皆言方大旱宜減死卜者公並署伏法澍雨隨應家傳嵗丁巳憲宗以世祖嘗受命經理河南闗右入䜛者言謂王府諸臣多擅權為姦利事命其貴强相阿勒達爾以丞相行省事劉太平以參知政事佐之鈎校括索不遺餘力又取諸路酷吏分領其事復大開告訐虐焰恟恟公言關中宣撫一司某當身任佐屬受成事而已事竟卒無毫髮得自是河南闗右諸司詔並停寢公還王府凡府屬漢人之在行者悉命公領之如古納言家傳嵗己未憲宗方駐蹕合州而世祖已徑渡大江取鄂城克之日命公入籍府庫公引儒生百餘拜伏軍門因言今王師一舉渡江宜令軍中應俘獲南儒並以官錢遣還家以廣異恩上嘉納之所還者五百餘人家傳憲宗訃至且聞河朔摘軍之擾𠡠諸軍守鄂公從世祖北還因陳大計曰殿下太祖嫡孫先皇母弟前征雲南尅期撫定暨今南伐率先取鄂天道可知且殿下收召賢傑悉洽人望子育黎庶率土歸心今先皇奄棄萬國神器無主而殿下位親望重功徳兼隆天意人心灼然可見上頗然之且命公前行審察事變公聞劉太平暨先朝大將霍魯懐復至闗右又念先帝經蜀嘗留大將渾都海以騎兵四萬屯守六盤及征南諸軍尚散處秦蜀太平自先朝用事與諸將要結素習險詐又畏主上英果因闗右形便扇摇民心驚動汾晋河南誠非細故及上既渡河悉以聞奏遣趙良弼西行假以他故偵伺事情上深然之家傳憲宗南征留季弟額埒布格居守北庭及訃聞遣其用事臣托果斯徵兵河朔大肆凶暴真定名士李槃嘗以莊聖太后命侍額埓布格講讀及托果斯至真定怒槃不附已械繫之獄燕南諸路震駭無所控語公間訪槃繫於獄言于上釋之民情大悦家傳上欲賜塔齊爾王飲膳難其人公請行既至王甚歡語及上渡江事公曰主上聖徳神功天順人歸髙出前古臣下論議已定大王位屬為尊若至開平首當推戴無為他人所先王大然之許以身任其事公還奏其言上曰如此大事卿輒言之何不畏甚耶對曰臣所讀書云時然後言臣語言之頃得其誠心故言家傳嵗庚申春上在開平諸王宗室相繼勸進上謙讓未許公以天時人事進言曰今額埓布格雖殿下母弟彼以前嘗居守專制有年設有奸人俾正位號以璽書見徵我為後時今若早承大統頒告徳音彼雖遷延宿留便名叛逆安危逆順間不容髪宜早定大計上良乆曰汝等能叶心輔翼吾意巳决促篆寶文一冶而成衆皆稱賀翌日上登寶位家傳時鄂兵未還公奏言宋嘗壓以天威彼已破膽或遣信使諭以息兵講好𠡠諸軍北歸則恩威並著上善其言乃遣使如宋家傳趙良弼還自闗右奏言劉太平霍魯懐已行尚書省獨收闗中諸處錢穀名為應接川蜀實欲據有其地與六盤相為表裏其勢張甚又西川大帥耨埒一軍私屬與六盤密邇其副將竒塔特布哈親戚軍屬並在北庭其心皆不可測又聞額埓布格已分遣心腹易置諸將又散金帛分賚將吏大抵皆如公言上既即位以秦蜀地重非公莫可及分十道宣撫乃以闗右四川併為一道者命公為宣撫使公受命馳赴太平霍魯懐聞之以五月一日乘急𫝊入城中密謀為變秦人前被阿勒達爾太平等威虐聞其來皆膽落初三日公亦入城大集官吏宣示詔㫖遣人馳往六盤宣諭安撫時事新集人素懐公不數日官府初定頗知趣向後旬餘城門候引一急使至云我來自六盤斷事官庫庫楚遣我今琿塔噶已反公所遣使已殺又分遣人乗急𫝊入成都密拉和卓青居竒塔持布哈各起軍馬來赴援又多遺蒙古軍鄂囉官烏努呼等金帛使盡起新軍且約太平霍魯懐同時舉事公集僚佐議曰聖上首命我軰正為今日事疑變生脱致罪釁我當身任不以相及乃分遣萬户劉哈瑪爾京兆治中髙鵬霄華州尹史廣掩捕太平霍魯懐等具得逆黨與六盤要結狀又遣哈瑪爾誅密拉和卓於成都總帥汪惟正誅竒塔特布哈於青居時闗中無兵備公嘗厚遇總帥汪惟良知其材可用又以汪府兵精併徵秦鞏平凉等處諸軍俾將之進討汪帥危疑未即聴命公取金虎符銀印授之曰此皆身承密㫖君今但辦吾事制符巳馳奏矣又付銀萬五千兩以充犒賞又出庫幣為軍衣汪大感激遂行公又摘蜀卒踐更及在家餘丁復得四千人推䝉古官巴崇將之遊擊謂巴崇曰君所將烏合六盤兵精毋與争鋒但張吾軍聲使不得東則大事濟矣家傳公繫太平等於獄一日急報赦至臨潼公曰勍寇在邇太平等豈赦所原乃遣人逆止近郊絞太平等于獄尸諸通衢方出迎赦民心帖然公遣使自劾停閣赦恩徵調諸軍擅帥惟良等罪上深善之曰此軰讀書所説權字是也朕委卿以方面之權事當從宜無拘常制坐失事機家傳巴崇遣其子執送耨埓軍鄂囉官二人曰此曹已受渾塔噶重賞欲舉軍應募同行五十餘人已械繫乾州宜並誅戮以警餘軍兩人者自分必死公謂佐屬曰琿塔噶不能乗勢以東保無他慮今雖民心粗定衆志未一反側不安亂何由息彼皆諸軍將校彼軍見其執因或别生心為害不細今因其懼死並皆寛釋使恩出非望必思效力就發此軍餘丁往𨽻巴崇兩人者既得釋果大喜過望切諭其屬使出兵效力初巴崇既囚執諸校北軍疑懼駭亂四出莫可禁遏及使至知諸校安全且聞兩人語人人感悦巴崇亦釋然開悟果得精騎數千將與俱西公復謂巴崇曰聞君欲深入追襲慎無輕鬭宜緩行追躡掎角此寇琿塔噶亦知公有備且據有六盤倉庫遂西渡河徑趣甘州阿勒達爾復自和林提兵與琿塔噶軍合又遣奸人約結隴蜀將又使耨埓兄薩敦者為書招耨埓於是成都帥百嘉努興元帥䝉古岱青居帥汪惟正竒徹等俱遣使來言人心疑危倉糧不繼恐南冦生心事或莫測公遣使申勅將吏曰公等皆勲業世胄政宜協心畢力無替先烈一旦以觀望召釁悔將何及兩川將帥素憚公威名佩服忠藎咸思輯睦軍政帖然上即拜公中書右丞行秦蜀省事家傳時朝議欲捐兩川退守興元公聞謂佐屬曰今四川已安糧餉已給忽出此議必遺後悔即遣使論奏朝廷是之家傳初琿塔噶阿勒達爾既合兵而東我前軍失利河南大震西土親王哲伯特穆爾棄輜重皆就食秦雍會親王哈坦及汪帥巴崇等軍合復與琿塔噶阿勒達爾大戰西凉我師大㨗俘斬西軍略盡得三叛首以送梟之京兆市三日諸軍還悉分屯便近所至足餉而居者不擾事聞上大嘉之曰此真男子事遂進拜平章政事公時年三十矣家傳公奏四川降民皆散處山谷宜申敕軍吏無妄虜掠違者自本軍千户以下與犯人同科又禁諸人毋販易生口由是四川遂安降民益衆又罷解鹽户所摘軍及京兆諸處無籍户戍靈州屯田者以裕民力家傳東川帥竒徹獲宋知資州張炳震興戎司統制王政兩人俱言母老咸願矜貸公乃遣還就為書遺四川帥余玠大略諭聖天子威徳必能混一六合兼强弱異勢較如白黒彼方權臣用事猜忌勲舊終當瓦解玠得書感愧雖未即降自是亦謹疆界帖然自守而已家傳鞏昌帥府言鎮戎州有謀為不軌者反形已具連引數百餘人公詳權之得首惡五人誅之餘並原釋家傳詔大會諸王公馳驛入朝上已留公參政商挺馳使奏曰向時琿塔噶之亂若非㢘相闗中安危未可知兼闗中軍民他人難制惟㢘相能得其心聞朝廷欲留人心驚疑皆不自安今闗中最為重地關中安則河南河北俱安所係利害不小乞早命公還鎮上不得已還公西省家傳瀘州降將劉整囚我叛人數百軍吏請誅以戒王曰力屈而降豈其心哉奏而免之導整入覲手書宰臣使整有所觀感恩浃其心當得死力清河元公撰神道碑詔括京兆諸郡馬牛以濟河西王奏曰闗中兵亂凋瘵已極嵗賦不充尚堪此役奏入特復二年馬牛免括其年自春涉夏大旱王步禱終南其夕大雨神道碑時以額埓布格之變北事未寧恒有㫖諭公與汪帥宜申敕將吏嚴整部伍及一切噐備所摘新軍母或散遣所部城池宜令深峻先是宋俘費寅以利口才㨗仕國朝為同知興元府事後坐法當死會赦出之公悉其人不用寅懐憾以北適李璮反山東寅乘間䜛公聚兵黨城當有他志上命中書右丞諾海代公行省且覆視所告事無一得詔公還朝公陛見言曰臣在京兆三年值邉叛四起川隴未寧民心危疑事急星火臣隨宣所屬佐貳毋或柅正如寅所言罪止在臣請逮繫有司上撫御座曰當時之言天知之朕知之卿果何罪慰諭良乆拜中書平章政事家傳方逆璮未誅平章趙璧素忌公勲名倡言王文統一窮措大由廉某張易薦遂至大用今日豈得不坐一日夜半中使召公入從容道潜邸事良乆及趙言公曰向行驛駐鄂賈似道以木柵環城一夕而辦聖諭謂扈從諸臣曰吾安得如似道者用之秉忠易進言山東有王文統才智士也今為李璮幕僚詔問臣臣對亦聞之其心固未識也上曰然朕亦記此家傳公在中書毅然以振舉綱紀朘削冗類裁抑僥倖考覈名實為務凡前政踵習故弊者毋弛不張故當時翕然致理文物典章粲然可考家傳公言國家自開創以來凡納土及始命之臣咸會世守逮今埀六十年故其子若孫並奴視所部而郡邑長吏皆其皂𨽻僮使此皆古之所無宜從更張俾考課黜陟始議行遷轉法五品以上制授六品以下敕授家傳丁太夫人憂公率族親行古䘮禮勺飲不入口者三日慟輒嘔血扶乃能起既𦵏苫塊廬墓所諸相以居憂無例欲極力起公相與至廬聞公號痛竟不忍言數月制奪哀起復家傳至元二年分考山東黜陟官吏省併郡佐登能進賢擢忠扶弱物無遁情山東諸使皆震懼失次公徐諭以祖先創業之艱汝曹宜一力與國作成新政庶㡬保有基緒取其尤不法者數人繫之舊以縣名户不及者立約裁省轉易之地逺不踰五百里不兩月訖事召還家傳公以舉選未立權令各路嵗薦經明行修及長行吏治者各一人以備選擇家傳有中貴傳㫖朝堂某事當爾諸相欲從之公曰此小臣預政漸也事宜覆奏上是公言杖其人家傳時阿哈瑪特寵眷日隆已領左右部其黨自相攻擊上命都省推覆衆畏其權莫敢問公獨勞治其事阿哈瑪特竟得决杖遂罷所領還復有司家傳上諭王曰吏弛法而貪民廢業而逃工不給用財不贍費先朝嘗以戚矣自相卿等朕無此戚王對曰陛下聖猶堯舜臣等未能以臯契之道賛輔治化以致雍熙慙對天顔今日小康未足多也上因論及魏徵王曰忠臣良臣何代無之顧人主用與不用耳神道碑言者訟史丞相子姪布列中外威權太盛乆將難制詔王罷丞相政事待鞫王奏曰知天澤深者陛下也粤自潛藩多經任使將兵牧民悉著治效以其可屬大任因使丞兹相位小人一旦有言陛下察其心跡果有跋扈不臣者乎今日信臣故臣得預此㫖他日一人訟臣臣亦入疑矣臣等承乏政府上之疑信若是何敢自保天澤既罷亦當罷臣上曰卿姑去明日召王曰昨思之天澤無對訟者神道碑有訟西川帥竒徹罪者上勅中書急發使誅之明日王覆奏上怒曰尚爾遲回對曰竒徹大帥以一人之言被誅西川必駭逮之至此與論者庭對暴其罪於天下可也上曰其遣能者按問既而卒無一實竒徹得免神道碑王奏議上前讜論具陳無少回惜上曰汝昔事朕王邸猶或容受為天子臣乃爾木强邪王對曰王府事輕為天子論天下事一或面從天下將受其害非不自愛也神道碑方士請鍊大丹勅中書給其所需王奏曰前世人主多為方士誑惑堯舜得夀不假於大丹也上曰然卻之神道碑上命公受戒國師公對曰臣已受孔子戒上曰汝孔子亦有戒耶對曰為臣當忠為子當孝孔門之戒如是而已家傳始建御史臺外設諸道提刑按察司時阿哈瑪特專總財利迺曰庶務責成各路錢榖付之轉運必繩治者此胡能辦事公曰今立臺察不獨事遵古制盖内則彈劾姦邪外則察視非常訪求民瘼裨益國政無大此者如君所言必使上下專恣貪暴公行然後事可集耶權臣語塞回鶻官鼐智密鼎者用事先朝為怨家所訴繫獄未㡬詔釋大都見禁囚詔至公適在告堂判無公署至秋車駕還都怨家復訴上怒召留守諸相詰之公令取堂判補署之曰倘天威莫測豈可幸無已署獨免也公進以前詔為言上曰詔釋囚併釋鼐智密鼎豈亦有詔耶公對曰不釋此囚臣亦未聞有詔上愈怒曰汝等號稱讀書此宜何罪公曰臣等備員宰相有罪當罷退上曰第從汝言即與左丞相耶律鑄並罷政事實至元七年也家傳當姦權柄用公家居教子讀書而憂國之心食息不忘聞一令之苛戚見顔間或一事裕民喜至忘寐一日公嘆曰陽豈可無隂亦無絶理也聖人進君子折小人盡人道爾家傳上嘗問希憲居家何為左右以讀書對上曰讀書固朕所教讀之不肯見用何多讀為阿哈瑪特曰日與妻孥燕樂爾上色變曰希憲清貧何從燕設神道碑王疾大作上遣醫三人診視或言須砂糖作飲良時最艱得王弟某求諸阿哈瑪特與之二斤且致密意王推箸在地曰使此物果能活人吾終不以姦人所遺愈疾也上聞特賜三斤神道碑先是以嗣國王特訥克行省鎮遼霫東人有言其不便者十一年奏王疾稍愈上命公往將行肩輿入辭賜坐上曰昔我先朝卿先事知㡬毎啟朕以帝道及鄂渚班師屢述天命朕心不忘丞相卿實宜為顧自退托爾遼霫户不數萬政以諸王國婿分地所在居者行者聨絡旁午明者見往知來察㣲燭著塔齊爾諸王素知卿能命卿往者識朕此意神道碑王至北京問民所苦皆曰有西域人自稱駙馬營於城外繫富貴誣其祖父嘗貸子錢執之使償無所於訴旦日持牒吿王王即遣吏逮駙馬者其人怒乗馬而來直入省堂徑坐榻上王令曳下跪而詰之曰制無私獄汝何人敢爾繫民其械繫之哀禱請命國王亦為之言稱寛待對一夕拔營遁去神道碑達勒達使者傳㫖國王立聼王坐自如曰大臣無為王起者使者還語其王王曰彼朝廷大臣無違禮也詔國王歸國王獨行省事神道碑朝廷發寳鈔市馬六千五百王遣市東州盡所發鈔得羡馬千三百王曰上之則類自衒其以馬依元直予他郡駝郡馬不入慮害及其民終不忍分彼此也神道碑長公主及國壻入朝縱獵郊原發民牛車載其所獲徵求需索其費至鈔萬五千貫王讌公主從者怨食不及王曰我天子宰相非汝庖者國婿怒起王隨之曰主婿縱獵原禽非國務也費民財不貲我且馳奏矣國婿愕然入語公主公主出飲王酒曰從者煩民我不知也請出鈔如數償民幸公止使者自後貴人過者皆不敢縱王師渡江急召王朝會右丞阿爾哈雅下江陵圖其地形上之請曰荆州西距梁益南控交廣據江淮上游誠為要地非朝廷重臣開大名府以鎮之未足以綏新附徠逺人上夜召王賜坐曰荆南入我版籍使新附者感恩忘苦未來者懐化效順宋知我朝有臣如此亦足降其心也南土濕下於卿疾非宜今以大事託卿卿當不辭賜卿田以其入食留者馬五十疋以給從者王對曰臣每懼識度淺薄不能仰荷重寄何敢辭疾力請不受新賜詔荆湖行省承制官三品以下刻印板授奏入制出神道碑公冒暑兼程以進既至阿爾哈雅率其屬郊迎比公止車已望拜塵中南人大駭先是政無綱紀士卒縱横剽奪商販城門晝閉燈火禁嚴民心驚疑生意蕭索公即日開罪令各軍歸營騎兵徙屯高敞以便牧養非調發請給不得輒出闢城四門毋得拘檢弛燈火之禁内外帖然民始安枕家傳歸附之初故官咸懐驚疑陰有去志公下車議録用宣撫制置兩司幕僚以備採訪左右難之公曰今天下一家皆大元臣子也君等勿疑擇可與論議者二十餘員訪逮物情隨材錄用人心感激懐服威惠不數月政化大行家傳時宋故官禮謁大府必以珍玩重噐動至數牀公至亦來謁見公曰汝等身仍故官或不次陞擢當念聖恩報效朝廷使此物盡諸公已財我取非義一或係官事同盗竊若取於人不為無罪慎勿為此以蠧政害民公一無所受各官感激謝去家傳有言南人立券鬻妻子者公聞蹙然曰人倫之壊一至此迺嚴為條禁當相買賣者並坐没入所直且即罪有司立屏絶公號令一行賞罰必信凡下條約所在奉行惟謹而不敢犯家傳公暇日登城顧見城闉之外瀦水彌望公曰此宋扞敵下策當還之江流遂得陸地數百萬畝招諭富民隨力耕種約以三年後減半收租貧民趨之曾未期年已成沃壤家傳初江陵沙市後降其倉儲不入官籍恣豪右私取公聞之曰此皆民力豈可徒資貪鄙迺令槩閲得米二十萬斛會公安民闕食公發廩賑賚全活益衆家傳王顧民粗安乃曰風教不可後也遂大興學旦日親至校官講授以倡他郡徹官屋以復竹林書院與書萬四千巻學者日盛神道碑王政化大行聲及四逺思播田楊二氏負固不下重慶趙定應堅守恥降皆遣使納款王謂主使曰歸語而主速歸所𨽻以全民命我已馳奏天子詔安爾土矣奏上上曰國家不用兵得地未之見也希憲坐致數千里之堅城勁士其仁政為何如也寳慶武岡益陽安化善化寧鄉諸城籍編民冒圍納款王移文其省使安全之神道碑鎮逺溪洞蠻酋以其樂工四十餘人重譯而至曰願奏土風於天子之庭王曰而軰獨無妻子乎驅迫而來豈其心哉且天子仁聖不重夷音皆泣拜而回神道碑闗譏得江陵人私書不敢發封樞密臣發之上前中語曰歸附之初人無生意大元皇帝命㢘相出鎮荆湖豈惟人漸徳化草木昆蟲咸被澤矣上嘆曰希憲不嗜殺人故能致此神道碑時王疾士民羣走僧寺道館為王祈福語及必額手叩齒祝曰願我公永長我人神道碑王疾日劇上聞即命尚醫馳視十四年春僉樞密院事董文忠奏曰江陵熱濕奈希憲沉疴何上即召還荆南人聞王且去皆號泣隨之擁所乗車不得行王慰諭再四乃拜哭而别大者繪像建祠小者書版瞻禮王囊橐蕭然琴書自隨神道碑五月公至上都館華嚴寺時太常卿田忠良領陰陽事一日來問疾公曰上都聖上龍飛之地天下視為根本近岡遺火此居民常事今南人萃此勿令妄談風水惑動上意未㡬副樞張公易左丞張公文謙果與南人數軰廷辯徙置都邑二相力言不可上不懌而罷明日召太常質前所言忠良以公言對上曰希憲方大病念及此耶其議遂寢家傳詔徵明醫王仲明于揚州未見行意士大夫責之曰君術固妙其能已億兆人之疾乎蒼生懸望亷公復相乆矣能起亷公是恵及天下也仲明乃至進其良劑能杖而起上喜召入曰聞卿比得良醫日俟痊復王對曰醫持善藥治臣沉疾茍能戒謹誠如聖諭稍或肆惰終將不療葢以醫諫也神道碑㑹議立門下省上曰首官何稱曰侍中曰侍中非希憲不可遣近臣諭㫖曰鞍馬之任不以勞卿乘軒論道時至治所必須執奏肩輿以入王附奏曰臣疾何恤輸忠效力生平深願時皇太子方聼政遣人諭王曰上命領門下省勿難羣小吾為公除之阿哈瑪特不利而止神道碑安西王相商挺以博古名世嘗語公宜蓄古器物以廣見聞公曰古物無古於易與書者他尚何求家傳時營繕東宫工部官請曰牡丹名品惟相公家乞移植數本太子知出公家矣王曰若出特命園雖先業一無所靳我早事聖主備位宰相未嘗曲丐恩幸方爾病退顧以花求媚耶請者愧止神道碑十六年春詔復入中書王稱疾篤皇太子遣侍臣問疾因叩治道王曰君天下者二道用君子則治用小人則亂臣病雖劇俟之於天所甚憂者大奸専柄羣邪蠭附誤國害民病之大者殿下宜開聖意急為屏除不然日以沉痼不可藥矣語聞深嘉重之神道碑王嘗戒子恂恪曰丈夫見義勇為禍福安可逆必又曰宰相須有力量未有無力量能為賢相者天下事茍無牽制三代可復也又曰稷契臯夔伊傅周召便為不及是自棄也又曰汝讀狄梁公傳否梁公有大節乃為不肖子所墜汝軰當深以為警神道碑公秉政中書凡六年當是時也朝廷清明海内乂安臺察百司日漸張舉家無滯事野無遺才權臣韜姦羣小斂畏故公常言君子小人勢猶水火必欲兼收並用以致堯舜之理者前未聞也及公去位姦臣滔天羣小附起天下靡然風俗大變彼雖外為狐媚求好而投間抵巇以相毒螫無所不至而公卒以直言正道致讒其身不變家傳十七年十一月十九日夜大星殞于正寢之後樂堂其光燭地乆之方滅是夕王薨士大夫走哭相弔天下知之者無不嗟傷咸曰良相逝矣蒼生何望上每追思之曰當諸王大㑹議决大事惟亷希憲能也神道碑丞相淮安忠武王曰亷公宰相中真宰相男子中真男子可謂名言神道碑左丞張忠宣公公名文謙字仲謙順徳沙河人歳丁未召居潛邸中綂元年拜中書左丞大名宣撫司事至元改元行省事于中興七年拜大司農卿十三年拜御史中丞明年拜昭文館大學士領太史院事十九年拜樞密副使是歳薨年六十七公幼聰敏讀書善記誦自入小學與太保劉公同研席年相若志相得其後太保祝髮為僧侍世祖於潛邸薦公才可用歳丁未驛召北上入見召對稱㫖擢置侍從之列命司王府教令牋奏日見信任野齋李公撰神道碑又先塋碑云公少時欲習簿書之事軍負府君召而責之公謝曰身漸長大無所效用仰衣食于父母心日不安故勉强為此今䝉尊誨敢不敬從即捨誦讀之習専志儒學戊戌歳命朝廷試天下儒士公試文名中選得免本户徭役之差邢初分𨽻勲臣二千户為食邑歳遣人更迭監收類皆不知撫治加之頻歳軍興郡當驛𫝊衝要徵求需索民不堪命會郡人赴愬王府公與太保實為先容合辭言於世祖曰今民生困弊莫邢為甚捄焚拯溺宜不可後盍擇人往治要其成效俾四方諸侯取法於我則天下均受賜矣世祖從之命近臣托克托故劉尚書肅李侍郎簡偕往三人者同心為治黜去貪暴剗除宿弊不期月流亡者復益十倍於是世祖益重儒士任之以政葢自公發之神道碑辛亥憲宗踐阼世祖以太弟日侍宸扆所言率賜俞允公暨太保數條具特所當先治為世祖言皆奏可施行之是後大駕所臨若大理若漢鄂公皆扈行神道碑世祖即位首拜中書左丞與平章王文統共政建立綱紀講明利病以安國便民為務詔令一出天下有太平之望文統素忌公謀議之際屢相可否積不能平公遽求出詔以本職行大名等路宣撫司事且有後命曰第往行詔卿矣比行謂文統言天下生民罷瘵日乆歳屬大旱若不量蠲税賦將無以慰来蘇之望文統以為上新即位國家經費不貲且索無積儲何所供億公曰百姓足君孰與不足俟時和歳豐取之未晚也竟蠲常賦什之四商酒税額什之二下車宣布徳意百姓歡欣鼓舞思見徳化之盛神道碑二年春入朝還居政府始立左右部分司綜務鉅細畢舉公之力居多神道碑三年阿哈瑪特領中書左右部總司財賦每事欲専奏聞不闗白省府詔廷臣議之公昌言曰分制財用古有是理不闗預中書無是理也且財賦一事耳中書不敢言天子將親蒞之乎世祖曰仲謙言是也阿哈瑪特語遂塞神道碑至元改元秋詔公行省事中興羌俗素鄙野事無統紀公求蜀士為人僕𨽻者得五六人咸為申理而出之俾通明吏教以案牘旬月之間樞機品式粗若可觀羌人始遣子弟讀書土俗為之一變又疏唐来漢延二渠之流田千萬餘頃民至今賴之神道碑三年還朝諸勢家告言有户數千當役屬為私奴朝議乆不能决公言奴與良法當以乙未户帳為斷若已籍為奴或奴之而未占籍者歸勢家可也自餘皆國家良民必無為奴之理其議遂定至今守以為法神道碑五年春淄川妖人曰胡王者作亂惑衆逮繫百餘人事聞世祖命中書省議公謂愚民無知為所誆誘殺首惡三數人足矣丞相安圖是其言命公與斷事官布哈涖决于濟南既至尸三人於市餘並釋去人以為死而復生神道碑七年拜大司農卿立諸道勸農司巡行勸課敦本業抑㳺末設庠序崇孝弟不數年功效昭著野無曠土種植之利遍天下奏開籍田祭先農先􅅙皆自公始尋又奏立國子學詔以魯齋許公為祭酒選貴胄子弟教養之所成就人材為多已而分布省寺臺閣往往蔚為時望達於從政皆出公始終左右之力神道碑阿哈瑪特當國𣙜民鐵鑄為農噐厚其直以配民剏立宣慰司行户部於東平大名不與民事惟印楮幣諸路轉運司怙勢作威害民千政莫敢誰何公屢于世祖前極論其害詔從公言皆罷之彼怒其沮已數欲中傷頼世祖眷知有素計不得行神道碑十三年拜御史中丞時阿哈瑪特威權日甚恣為不法慮臺憲發其奸奏罷諸道提刑按察司以撼内臺居數日公奏復之神道碑十四年拜昭文館大學士領太史院事初世祖以大明厯嵗乆寢差詔魯齋許公太史令王恂同知太史院事郭守敬測騐改正命公董其事厯成賜名曰授時頒行天下神道碑十九年拜樞密副使首議肅兵政祛冗員選練將士而優恤其家曽未及施而一疾不起神道碑初大理之役我師至其城下國主髙祥拒命殺我信使一日遁去世祖怒欲屠之公與太保劉公左丞姚公入言曰殺使拒命者其國主耳非民之罪世祖從之特免殺掠所活者無算漢鄂之役王師方啟行公與劉公姚公數言王者之兵有征無戰當一視同仁不可嗜殺世祖曰保為卿等守此言既入宋境諸將分道兼進各遣儒士相其役禁戢軍士毋肆殺戮毋焚燒廬舍所獲生口悉縱遣之其後混一之功卒本於不可嗜殺等語信乎仁人之言其利溥哉神道碑公為人謙恭篤實外和内剛其好賢樂善出於天性人有寸美必極口稱道遭際以來毎以薦達士類為己任或曰人心不同豈能盡識一不當得無累乎公曰人才何嘗累已第患鑒裁未明有遺才耳且人臣以薦賢為職豈得避纎芥之嫌而負國蔽善乎一時聞人敭歴中外者多公所舉然未嘗有徳色平居慈祥樂易與人交不立崖岸及當官論事守正不倚毅然有不可犯之色又勇於為義茍一事可行一善可舉如梗芒在胷必欲快吐而後已重農事及銓法謂生民之重本有國之大計尤拳拳焉樂聞已過僚屬或相規勸雖其言甚切自敵以下宜若不能堪者公毎優容之過亦隨改不少吝晚嵗篤於義理之學摳衣魯齋求是非之有自得之趣無他嗜好惟聚書數萬巻而已身居貴寵自奉若寒士門無閽𨽻客至倒履出迎惟恐不及人以是多之神道碑世祖始居潛邸招集天下英俊訪問治道一時賢士大夫雲合輻輳争進所聞迨中統至元之間布列臺閣分任岳牧蔚為一代名臣者不可勝紀至其愛君憂國忠勤匪懈好善疾惡始終不撓若時政之臧否生民之利病知之無不言言之無不盡曽不以用舍進退累其心者公一人而已神道碑嘗觀於世祖之世矣自其在藩至於即位文武小大之臣乘運以興者各以職事見功業求其悃愊深厚知為國之本造權輿於屯昧不寧者於公見焉太保劉公學術通神明機筭若龜䇿其所以為上計者審矣當是時軍國之重則有宗親貴人而書記征發之責取才金氏之遺而有餘也迺獨薦公為謀臣在上左右主儒者使陳先王之道雖若迂於智數而世皇信用以一天下而貽子孫無疆惟休其迹無得而名焉嗚呼自孔子孟子没豪傑各以其資奮而内聖外王之學千百餘年無能道之者生民况得被其澤乎宋儒始有以逺接其端緒而朱子為能集其書之大成然猶以是取怪時人身㡬不免自其學者誦而習之亦或莫究其㫖許文正公衡生乎戎馬搶攘之間學於文獻散逸之後一旦得其書而尊信之凡所以虛已致君者無一不取于此而朱子之書遂衣被海内其功詎可量哉夫孰知先後扶持時其進退乆速使其身安乎朝廷之上而言立道行者公實始終之也嗚呼㣲朱子聖賢之言不明于㣲芒㣲許公朱子之書不著于天下㣲公則許公之説將不得見進於當時矣庸非天乎中統建元以來政術與時高下獨成均之敎彛倫大農之興稼穡厯象之授人時凡出於公之所為者皆隱然而有不可變者詩云樂只君子邦家之基其公之謂乎蜀都虞公撰郭塋記元名臣事畧巻七
