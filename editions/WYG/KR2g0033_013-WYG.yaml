body:
  text: 元名臣事畧巻十三元蘓天爵撰亷訪使楊文憲公公名奐字焕然乾州奉天人國初舉進士甲選授河南路徴収稅課所長官兼亷訪使嵗壬子㕘議京兆宣撫司事乙夘卒年七十君母程嘗夢東南日光射其身旁一神人以筆授之已而君生父蕭軒翁以為文明之象就為制名年十一丁内艱哀毁如成人日蔬食誦孝經為課人以天至稱焉又五年師鄉先生呉榮叔未幾賦業成即有聲場屋間不三十三赴庭試興定辛巳以遺誤下第同舎盧長卿李欽若惜君連蹇勸試補臺掾臺掾要津仕子慕羨而不能得者君答書曰先夫人毎以作掾為諱僕無所克肖不能顯親揚名敢貽泉下之憂乎正大初召草萬言策將詣闕上之所親謂其指陳時病辭㫖剴切他人所不敢言保為當國者所沮忠信獲罪君何得焉君知直道不容即日出國門而西教授鄉里遺山元公撰墓碑癸巳汴梁陷乃微服北渡羈孤流落人所不能堪處之自若也冠氏帥趙侯夀之延致君待之師友間㑹門生朱拯自京師輦書至君得聚而讀之東平嚴公久聞君名數以行藏為問君終不一詣或問之故君曰不招而徃禮歟且業已主趙侯矣得無以我為二三乎墓碑戊戌天朝開舉選特詔宣徳課稅使劉公用之試諸道進士君試東平兩中賦論第一俄從監試官北上謁中書耶律公力奏薦之宣授河南路徵収課稅所長官兼亷訪使陛辭之日言於中書公曰僕不敏誤蒙不次之用以書生而理財賦已非所長又河南兵荒之後遺民無幾烹鮮之喻正在今日急而擾之糜爛必矣願公假以嵗月使得拊摩創罷以為朝廷愛養基本萬一之助中書甚善之君初莅政招致耆勝如蒲隂楊正卿武功張君美華隂王元禮下邽薛微之渑池翟致忠太原劉繼先等日與商畧條畫約束一以簡易為事按行境内親問監務月課如干難易若何有循習舊列以増額為言者君訶之曰剝下罔上若欲我為之即減原額四之一公私便之官長所監率有餽餉君一切拒絶不踰月政成官民以為前乎此皆未有漕司惠吾属之如是也在官十年乃請老于燕之行臺墓碑酉又公文集云嵗在己十有一月中書耶律公以軍國大計與近世轉運司例經理十路課說闕開為所器使稱長相豐歉闕登耗以平嵗入奏可一聴中書省總之開創伊始制度未遑天下郡縣猶以財賦自贍不重其權則無以剗其弊故吏汚濫得悉料之財賦舛錯得釐正之至于風俗之疵美盗賊之有無楮貨之低昻皆闕得季奏之凡佐史許自辟以從被選者以為榮壬子九月王府驛召入問尋被教㕘議京兆宣撫司事累上書乃得請閒居鄉郡築堂曰歸來為佚老之所雖在病臥猶集子弟秀民諭之曰吾鄉宻邇豐鎬民俗敦朴汝輩皆當孝弟力田以亷慎自保母習珥筆之陋以玷傷風化病革處置後事如平時敇家人吾且死勿以二家齋醮貽識者笑遂引觴大噱而逝墓碑君不治生産不取非義仕宦十年而家無十金之業然其周困急卹孤遺扶病疾助𦵏祭力雖不贍猶强勉為之與人言毎以名教為言有片善則委曲奬藉唯恐其名之不著或小過失必以苦言勸止之怨怒不計也墓碑初太和大安間入仕者惟舉選為貴科榮路所在人争走之程文之外翰墨雜體悉指為無用之技尤諱作詩謂其害賦律尤甚至於經為通儒文為名家不過翰苑六七公而已君授學之後其自望者不碌碌舉業既成乃以餘力作為詩文下筆即有可觀性嗜讀書博覽强記務為無所不闚真積日久猶恐不及寒暑飢渴不以累其業也作文剗刮庸爛創為裁製以蹈襲剽竊為恥禮部閑閑趙公平章蕭國侯公内翰馮公屏山李公皆折行伍與相問遺河朔士夫舊熟君名想聞風采所過求見者應接不暇其為世所重如此暮年還秦中秦中百年以來號稱多士較其聲問赫奕聳動一世盖未有出其右者前世闗西夫子之目今以歸君矣墓碑君著述有還山集六十卷始于古賦次之以古律詩又次之碑誌記説銘贊雜文槩言十巻隠而天道性命之説微而五經百氏之言明聖賢之出處辨理欲之消長可謂極乎精義入神之妙矣與夫近鑑三巻自壬辰正月至甲午六月絶筆其書法如古之史臣其議論如胡氏之春秋也正統書大十巻自唐虞至于五代一年一月一日各有所書事三代以上存而不議秦漢而後附之以論其叙曰正統之説所以禍天下後世者凡以不出孔孟之前故也且夫湯武之應天順人後世莫可企及猶曰予有慙徳武未盡善後世辟王乃復頼前哲槩以正統之𫝊非私言乎今八例曰得曰𫝊曰哀曰復曰與曰陷曰絶曰歸始皇十年貶絶陷者何懲任相之失也太宗𫝊之而曰得者何志奪宗之思也責景帝者何短通喪也責明帝者何啟異端也與明宗者何有若人之言也與周世宗者何世宗而在禮樂可興也如是八例其說累數十萬言以為不如是則是非不白治亂不分勸戒不明雖綿歴百千萬世正統之為正統昭昭矣内翰李文正公公名治字仁卿真定欒城人金正大末登進士第壬辰北渡居太原藩府交辟皆不就至元二年召拜翰林學士明年以疾辭居元氏之封龍山十六年卒年八十八公㓜讀書手不釋巻性頴悟有成人之風既長與河中李欽叔龍山兾京甫平晉李長原為同年友屏山李先生令代作墓銘數篇一夕而就屏山大加賞異正大七年登詞賦進士第調髙陵簿未上從大臣辟推知鈞州事時調度方殷公掌出納無圭撮之誤壬辰正月城潰微服北渡流落忻崞間人所不能堪公處之自若也事蹟先生才大而雅識逺而明閎于中而肆于外盖將以斯文明斯道者也在河南時文聲已大振及壬辰北渡隱于崞山之桐川聚書環堵中閉闗却掃以涵泳先王之道為樂雖饑寒不能自存亦不卹也是後由崞山而之大原之平定之元氏流離頓挫亦未嘗一日廢其業手不停披口不絶誦如是者幾五十年先生之于學其勤至矣人品既髙真積之力斯乆所以優柔饜飫深造自得無衆人之所難經為通儒文為名家其名徳雅望又為一時衣冠之龍門也退然自以為不足嘗曰名為吾學中之累盖先生性喜退宻恥于近名所學所行切于為已而非以為人也門生集賢焦公撰文集序世祖方居潜邸嵗丁巳五月遣阿爾特黙見董文用馳𫝊來召且曰素聞仁卿學贍才優潜徳不耀久欲一見之切母他辭既至帝問汝在河南居官者誰最佳公對曰百餘年間人才未易數在今日論之其險夷一節則完顔仲徳甚可嘉尚又問仲徳讀書否對曰仲徳策論進士觀其以國忘家以忠忘身實自讀書中來又問完顔合答及蒲九何如對曰二人將畧俱短少帝任之不疑此金所以亡也又問魏徵曹彬何如對曰徵忠言讜論知無不言實為唐朝名臣第一彬伐江南未嘗妄殺一人當在方叔召虎之列韓白衛霍在所不論又問今居官之人有如魏徴者否對曰今之人側媚成風欲比魏徵實多愧矣又問人材對曰天下未嘗乏材求則得之舎則失之理勢然耳且今之儒生如魏璠王鶚李獻卿蘭光庭趙復郝經王博文輩皆可用之材又皆吾王之所素知已嘗聘問者也舉而用之何所不可但恐用之不盡耳夫四海之内曷止此數子哉誠能廣延于外將見雲集輻輳于朝廷也又問囬鶻人可用否對曰漢人中有君子小人囬鶻人亦有君子小人但其貪財嗜利亷謹者少在國家擇而用之耳又問天下當何如而治對曰夫治天下欲難則難于登天欲易則易于反掌盖有法度則治按名責實則治進君子退小人則治如是而治天下豈不易于反掌乎無法度則亂有名無實則亂進小人退君子則亂如是而治天下豈不難于登天乎且為治之道不過立法度正紀綱而已紀綱者上下相維持法度者賞罰示懲勸今則大官小吏下至編民皆自縱恣以私害公是無法度也有功者未必得賞有罪者未必被罰甚至有功者或反受辱有罪者或反獲寵是無賞罰也法度隳紀綱壞天下不變亂已為幸矣又問昨者地震何如對曰天裂為陽不足地動為隂有餘地道隂也隂太盛則變生矣今之震動或姦邪在側或女謁盛行或讒慝𢎞多或刑獄失中或征伐驟舉五者必有一于此矣然天之愛君如愛其子故出此以警之茍能辨姦邪去女謁屏讒慝減刑獄止征伐上當天心下合人意則可變咎厲為休徴王庭問對先生平生愛山嗜水餘無所好晚家元氏買田封龍山下以供饘粥學者稍稍從之歲久從游者日益多所居不能容鄉人相與言曰封龍山中有李相昉讀書堂故基兵革以來荆棘湮廢不治若芟而葺之令先生時憩杖履而栖生徒豈不為吾鄉之盛事哉以告先生先生欣然從之則相與聚材鳩工日増月積講堂齋舍以次成就舊有大成殿敝漏傾欹又重新之未幾朝廷聞先生賢安車聘之既至奏對稱㫖欲處以清要先生謝曰老病非所堪也懇求還山朝廷知不可留遂其意後四年詔立翰林院於燕京再以學士詔仍勑真定宣慰司驛騎賫遣先生起就職纔期月又以老病尋醫去王文忠公撰書院記髙按公與翰院諸公書云諸公以英才駿足絶出之學揖紫清元化固自有所而某也孱資瑣質誤恩偶及亦復與吹竽之部律以亷耻為何如耶諸公慰我耄昏赦不速肯容我名玉堂之署日夕相與刺經古訂辨文字不即叱出之徳寧敢少忘哉但翰林非病木叟所處寵祿非庸夫所食官謗可畏幸而得脱跡還山石與居麋鹿與游斯亦老朽無用者之所便也翰林視草惟天子命之史館秉筆以宰相監之特書佐之流有司之事耳非作者所敢自専而非非是是也今者猶以翰林史館為髙選是工諛譽而善縁飾者為髙選也我恐議者羞之敬齋泛說我聞文章有不當為者五茍作一也徇物二也欺心三也蠱俗四也不可以示子孫五也今之作者異乎我所聞矣不以為所不當者之為患惟無是五者之為患泛說巻公著述有文集四十巻壁書叢削十二卷泛説四十古今難四十巻測圖海鏡十二巻益古衍疑三十巻其他雜書又十餘卷或問學李子曰學有三積之之多不若取之之精取之之精不若得之之深泛説李子年二十以來知作為文章之可樂以為外是無樂五十矣覆取二十以前所讀論孟六經等書讀之乃知曩諸所樂曾夏蟲之不若焉尚未卜自今以徃又有樂於此也與否泛説初聶侯珪以土豪歸國帥平定者最久雅親文儒聞敬齋李公之名而說之延至郡舎㑹遺山元公還太原過之為數日留因追憶閑閑文獻二老作詩云百年喬木欝蒼蒼耆舊風流趙與楊為向榆闗使君道郡中合有二賢堂聶侯起謝曰此珪志也方經始而聶侯卒至元二年到侯天禄繼守是州為屋數楹置趙楊元李四公像其中以事之惟閑閑文獻以道徳文章為一代宗師者在禮部翰林對持文柄時號楊趙遺山敬齋皆二公門下自南都時才已相埓北渡以後徃來西川冩志于文字間賡唱迭和世亦謂之元李海内之人識與不識徃徃詠其詩讀其書敬仰其人盖所謂聞而不得見見而不得親者獨是一郡閑閑之桐鄉文獻之梓里也人歌清静之政家服孝友之化而又接見遺山敬齋凡長吏士庶毎語及中州耆儒必以四賢為稱首堂而祠之冝矣太史楊文康公公名恭懿字元甫奉先人隱居不仕至元十三年召至京師未幾辭歸十六年以脩厯召厯成授集賢學士兼太史院事十八年辭歸二十年以太子賔客召二十二年以昭文館學士領太史院事二十九年以議中書省事召皆辭疾不行三十一年卒年七十公以正大辛酉生童而讀書記識强敏日數千言時艱從中大夫逃亂而東不恒其居于汴于歸徳于天平雖間闗險阻未嘗怠弛其業年十七侍中大夫西歸無田于郊假室以居鄉鄰或繼其匱皆謝不取惟服勞以為養暇則力學綜博于書無不經目而䆒心者摳衣之徒戸外滿履横經入問為析疑義源源其辭若引江河而下之名聲日延海内縉紳友大中者馳書交譽知之膚者求觀其文侈其世者以為鱣堂之席有繼與其極者直期以宗盟斯道為開來繼徃時已通易禮春秋思有纂􅄒恥為章句儒而止忘于用世反覆史學以監觀廢興存亡理亂得失于千數百年之中輔治之具禮樂兵刑禮樂非王者果為不可與行于天下兵恃以輯暴亂而安元元刑取其弼教循本以求皆仁義之資也不講之有素或一旦帥三軍為士師貿貿焉不知其方反受成教武人俗吏乎年二十四始得朱子集註章句四經太極圖小學近思録諸書誦其言而惟其意嘆曰人倫日用之常天道性命之妙皆萃此書今入徳有其門矣進道有其途矣吾何獨不可及前修踵武哉窮理以致其知反躬以踐其實動静云為一于持敬行之以剛健居之以悠久日就月將俟其成功於潜齊之下自任益重前習盡變不事浮末矣牧庵姚公撰神道碑嵗甲寅司徒許文正公奉潜藩教來秦公徃見之際其道徳之光聞其仁義之言於傾盖頃歸心服曰世烏有斯人之倫敬事猶師而司徒友之亦至分庭而行抗席而坐一遇講貫動窮日夕而所造益深平居訒于為言喪中大夫絶口水漿五日喪𦵏用牲盡祛桑門惑世之法為具不足稱貸益之棺槨皆黄膓衣衾必縟䟽衰餐粥悲憂為疾杖始能起司徒㑹𦵏歸語學者曰小子志之曠時墜典夫夫特立而獨能行之聚居六年司徒東歸喪妣夫人猶中大夫其疾益阽三輔士夫知由禮制自致其親者皆本之公神道碑先是宣撫司行省欲以掌書記共議事禄之皆不能屈至元七年詔司徒由國子祭酒拜中書左丞始與右丞相安圗共政日譽公賢丞相以聞十年遣使來詔疾不能行十一年儲皇下教中書汝如漢惠聘四皓者具聘以來故丞相遣郎中張元智書致是命其冬下車京師上遣國王和通勞其逺來他日入見上問何鄉先徳為誰從何師學子今有幾無不周悉明年月正元日之翼日等共議權以新儀木表與舊儀所測相較得今嵗冬至晷景及日躔所在與列舎分度之差大都北極之髙下晝夜刻長短㕘以古制創立新法推筭成辛巳厯雖或未精然比之前改厯者附㑹厯元更立日法全踵故習顧亦無愧然必毎嵗測驗修改積二三十年庶盡其法可使如三代日官世守其職測驗恒久無改嵗之事矣又合朔厯曰日行歴四時一周謂之一嵗月踰一周天復與日合謂之一月言一月之始日月相合故謂合朔自秦廢厯紀漢太初止用平朔法大小相間或有二大者故日食多在晦日或二日測騐時刻亦鮮中宋何承天測驗四十餘年進元嘉厯始以月行遲速定小餘以正朔望使食必在朔名定朔法三大二小時以異舊罷之梁虞􅒠造大同厯隋劉孝孫造皇極厯皆用定朔為時所阻唐傅仁均造戊寅厯定朔始得行貞觀十九年四月頻大人皆異之竟改從平朔李淳風造麟徳厯雖用平朔遇四大則避人言以平朔問之又希合當世為進朔法使無元日之食至一行造大衍厯謂天事誠宻四大二小何傷誠為確論然亦循常不改臣等更造新厯一依前賢定論推筭皆改從實今十九年厯自八月後四月併大實日月合朔之朔也是日方列跪未讀奏上御香殿以大師南伐使乆不至方念之深欲筮之時以日者待詔公車百十為輩獨以命公盖以其道徳素著可交神明者其言頗秘神道碑侍讀徒單公履請設士之科詔先少師文獻公司徒竇文正公與公雜議公上奏曰三代以徳行六藝賔興賢能漢舉孝亷兼䇿經術魏晋尚文辭而經術猶未之遺隋煬始専賦詩唐因之使自投牒貢舉之法遂廢雖有明經止于記誦宋神宗始試經義亦令典矣哲宗復賦詩遼金循習將救斯弊惟知明詔嘗曰士不治經學孔孟之道日為賦詩空文斯言足立萬世治安之本今欲取士宜敕有司舉有行檢通經史之士使無投牒自賤試以五經四書大小義史論時務䇿夫既從事實學則士風淳朴民俗趨厚國家得致治之才矣奏入上善之丞相毎咨世務倚以自毗㑹其北征公遂請畢男婚而歸神道碑十六年詔安西王相敦遣赴都九月入見詔于太史院改厯十七年十二月副樞領太史易數太史衡及公等上改厯奏曰臣等徧考自漢以來厯書四十餘家精思推算晝夜測驗舊儀難用而新者未備故日行盈縮月行遲疾五行周天其詳皆未精察四方亦未測驗參考詔賜魯齋及公坐諭曰卿二老毋自勞謹教示諸人耳四月授集賢學士兼太史院事墓誌徴士蕭􅆽誌其墓曰朱文公集周程夫子之大成其學盛于江左北方之士聞而知者固有其人求能究聖賢精㣲之蘊篤志于學真知實踐主乎敬義表裏一致以躬行心得之餘私淑諸人繼前修而開後覺粹然一出乎正者惟司徒暨公嗚呼誠知徳不易之言哉神道碑元名臣事畧巻十三
