body:
  text: 元名臣事略卷八元蘇天爵撰內翰竇文正公公名默字子聲初名傑字漢卿廣平肥鄉人歲己酉召居潛邸中統元年拜太子太傅辭不受改翰林侍講學士未幾以疾辭三年復召入朝職如故至元十七年拜昭文館大學士是歲卒年八十五公幼知讀書確然有立志叔祖缺時為郡功曹欲使改肄刀筆公不肯就願卒習儒業會國兵南下公為所俘掠間關險阻還走達鄉井家人輩皆巳去唯母氏存焉驚怖之餘母子俱得時疾僵卧困憊中重罹母憂扶病藁瘞而大兵復至遂往河南而依母黨吳氏以居服闋贅於清流河醫者王氏婦翁謂之曰世方多難能業醫術則可以濟人而善身因稍習之壬辰授館西華以教讀為業久之河南復被兵公還視其家則盡室亡矣逃難之蔡遇儒醫李浩授以銅人針法能得其微妙金末帝之遷蔡也公以為大兵且至不速去禍在旦夕乃徙居德安之孝感縣縣令謝憲子一見與公相善以語孟中庸大學授公公朝講暮習以為初未嘗學而學自此始欣然日有所得野齋李公撰墓志河南既下中書楊君奉朝命招集釋道儒士公應募北歸至大名尋返鄉里以經術教授邑人病者來謁無分貧富貴賤視之如一針石所加應手良也久之道譽益著墓志上在潛邸聞其賢召之既至首以三綱五常為言上曰何為三綱五常公一一言之上曰人道之端無大於此則不名為人且無以立於世矣公又言帝王之學貴正心誠意心既正則朝廷逺近莫敢不正自是接待加禮不令暫去左右嘗言及治道上問今之明治道者為誰公以姚樞對遂召用之墓志壬子冬賜以貂尾裘帽時皇太子未冠上命公教之及征大理以玉帶鉤為賜曰此金內府物也汝老人佩服為宜且太子見之與見朕無異庶幾知所警畏逮公請南還命大名順德各給第宅田土冬夏皆有衣物歲以為常墓志上即位首召至都問曰朕嘗命卿訪求魏徴等人有諸乎對曰許衡即其人也萬戶史天澤有宰相才可大用遂拜天澤為丞相詔授公太子太傅固辭曰今東宫未正位號且臣不敢當保傅之任乃授翰林侍講學士墓志二年公言於上曰臣事陛下十有餘年數承顧問有以見陛下急於求治未嘗不以利生民安社稷為心以先帝在上姦臣擅權總天下財賦操執在手貢進奇貨衒耀紛華以娛悅上其扇結朋黨離間骨肉皆此徒也此徒當路陛下所以不能盡其初心救世一念涵養有年矣今天順人應誕登大寶天下生民莫不歡欣踴躍引領盛治然平治天下必用正人端士唇吻小人一時功利之説必不能定立國家基本為子孫久逺之計其賣利獻勤乞憐取寵者使不得行其志斯可矣若夫鉤距揣摩以利害驚動人主之意者無他意在擯斥諸賢獨執政柄耳此蘇張之流也惟陛下察之伏望别選公明有道之士授以重任則天下幸甚時平章王文統用事故公言及之一日同在上前復面斥之曰此人學術不正必將壞天下後世不可久居相位以疾引還明年文統事敗上追憶公言謂人曰曩言王文統可罷者惟竇漢卿一人向使言之者衆朕寧不思之耶即遣使召公至京師國有大政時加咨訪墓志公奏言三代所以厯數長久風俗純粹者皆自設學養士所致方今宜建學立師博選貴族子弟以教之以示風化之本於是拜許衡國子祭酒教養胄子皆公言發之公嘗同太保劉公左丞姚公等侍上前詢及治道公言君有過舉為臣者當直言匡正不可詭隨都俞吁咈此隆古所尚今則不然君曰可臣亦以為可君曰否臣亦以為否莫敢少異非嘉政也上默然詰旦復同侍幄殿會獵者失一海東青鶻上盛怒一侍臣從旁曰是人去歲失一鶻今又失一鶻宜加罪上釋獵者不之問移怒侍臣且杖之諸公出咸揖公賀曰非公誠結主知安得感悟至此神道碑公年八十諸僚友致賀禮符寶董公以聞上恭默瞻仰拱手於天曰此輩賢士安得請於上帝減去數年留朕左右同治天下顧不偉歟今老矣良可惜也悵然久之神道碑公稟樂易與人交不立崖岸平居不好臧否人物時人不過以柔愞書生待之至其關國家大計則面斥權貴不少撓雖古之汲黯朱雲無以加蓋胸中所學純正其志有所操守故見於事業如此上嘗謂侍臣曰朕訪求賢士幾三十年惟得李狀元竇漢卿二人又曰如竇漢卿之心姚公茂之才合而為一始成完人矣墓志憲又楊文公文集元李狀元諱俊民字用章澤州晉城人資醇謹重然諾不妄交遊金承安中舉進士第一釋褐應丞翰林學士南遷隱嵩州鳴臯山北渡客覃懷未幾入西山既而變起倉卒識與不識皆以知幾許之居鄉閭終日選書不出四方學者不逺千里而往隨問隨答曾無倦色會皇弟經理西南夷聞其賢安車馳召不得已起而應之延訪無虛日遽乞還山王重違所請遣中貴護送之年八十餘而卒世之知數者無出子聰右而子聰猶讓之先又汲郡王公中堂事記云先生在河南時於隱士荆生傳康節皇極數學已未見上在潛邸令張仲一就問禎祥優禮有加中統元年先生已沒其言盡徴追諡為莊和先生以旌其德云左丞姚文獻公公名樞字公茂營州栁城人後遷洛陽國初為燕京行臺郎中未幾辭去歲庚戌召居潛邸中統元年拜東平宣撫使明年召拜太子太師辭不受改大司農四年拜中書左丞至元五年出僉河南行省十年拜昭文館大學士詳定禮儀事十二年拜翰林學士承旨十七年薨年七十八公自稚弱篤於孝敬長力於學晝則經紀其家嚮晦則讀書夜分不輟妣夫人恐傷耽苦每止之乃塞窗不使見燭就枕必盡三鼓聞將遷關中考康懿公録事判官於許俾取師氏姑以來公徒行懷書困依於樹宿止於邸亦出以誦自期甚髙宋內翰九嘉時有重名方間居許折行位與之遊一日賔會録事名召公內翰怒曰公茂負王佐之略豈可若是易之先祖曰同僚呼兒輩宜然猶竟席不樂其為前輩見推如此牧菴撰神道碑壬辰許城被圍州版公軍資庫使與副夜直四鼓聞窗外嘆曰人獻東門出索之無得副曰吾嘗遭兵河朔見物云然宜救吾家乃相與歸至家裹餱糧為逃死謀日出而東門果破軍將蕭姓者曰吾嘗受丘真人教汝軍中惟救人無殺吾救乃死公聞太宗詔學士十八人即長春宫教之俾楊中書惟中監督則往依焉中書少公六年兄稱之與偕入覲時龍庭無漢人士夫帝喜其來具重之神道碑乙未詔二太子南征俾公從楊中書即軍中求儒道釋醫卜會破棗陽併公所招將盡坑之大將幕竹林間公前辨析明詔如此它日將何以復命乃蹙數人逃入竹中者脫死數千人繼拔德安得江漢先生趙復仁甫見公戎服而髯不以華人遇之至帳中見陳琴書駭曰西域人知事此乎公為一莞與之言信奇士出所為文數十篇以九族殫殘不欲北與公訣蘄死公留宿帳中既覺月皓而盈惟寢衣存及鞍馬號積尸間求至水際脫履披髮而號欲投溺而未入也公遂以徒死無益汝存則子孫或可傳緒百世保吾而北無他也遂還盡出程朱二子性理之書付公江漢至燕學徒從者百人北方經學自兹始神道碑燕又靜菴筆録云趙仁甫本宋人被俘居其經學文章雖李敬齋元遺山亦推讓焉上在潛邸嘗召見問曰我欲取宋卿可導之於前乎對曰宋吾父母國也未有引他人以伐吾父母者上悅仁甫雖居燕恆有思歸之志歲辛丑賜金符以郎中伊囉勒齊行臺於燕時惟事貨賂天下諸侯競以掊克入媚以公幕長必分及之乃一切拒絶遂携家來輝墾荒雲門糞田數百畝修二水輪誅茅為堂城中置私廟奉祠四世中堂龕魯司冦容傍埀周兩程張卲司馬六君子像讀書其間衣冠莊肅以道學自鳴佳時則鳴琴百泉之上遁世而樂天若將終身後生薄夫或造庭除出語人曰幾褫吾魄又汲汲以化民成俗為心自板小學書語孟或問家禮俾楊中書板四書田尚書板詩折衷易程傳書蔡傳春秋胡傳又以小學書流布未廣教子弟楊古為沈氏活板與近思録東萊經史經説諸書散之四方時先師許文正公在魏出入經傳子史泛濫釋老下至醫卜筮兵刑貨殖水利算數靡所不究公過魏與竇漢卿相聚茅齋聽公言義正粹先師遂造蘇門盡鈔是數書以歸謂其徒曰曩所授受皆非今始聞進學之序若必欲相從當盡棄前習以從事於小學四書為進德基不然當求他師衆皆曰惟先生命歲庚戌文正公盡室來輝相依以居神道碑上在潛邸遣故平章趙璧來徵既至上大喜自客過之時召與語隨問而言久之詢及治道公見上聰明神聖才不世出虛己受言可大有為乃盡其平生所學為書數千百言首以二帝三王為學之本為治之敘與治國平天下之大經彚為八目曰修身力學尊賢親親畏天愛民好善逺佞次及救時之弊為條三十曰立省部則庶政出一綱舉紀張令不行於朝而變於夕辟才行舉逸遺慎銓選汰職員則不專世爵而人才出班俸祿贓穢塞而公道開定法律審刑獄則收生殺之權於朝諸侯不得而專丘山之罪不致茍免毫髮之過免罹極法而寃抑有伸設監司明黜陟則善良姦窳可得而舉刺閣徴斂則部族不橫於誅求簡驛傳則州郡不困於需索修學校崇經術旌節孝以為育人材厚風俗美教化之基使士不偷於文華重農桑寬賦稅省徭役禁遊惰則民力紓不趨於浮偽且免習末技者歲加富溢勤耕織者日就飢寒肅軍政使田里不知行營往復之擾攘賙匱乏恤鰥寡使顛連無造者有養布屯田以實邊戍通漕運以廩京都絀債負則賈胡不得以子為母如牸生牸牛十年千頭之法破稱貸之家廣儲蓄復常平以待凶荒立平準以權物估却利便以塞幸塗杜告訐以絶訟源各疏施張之方其下本末兼該細大不遺上奇其才由是動必見詢且使授太子經日以三綱五常先哲格言薰陶德性神道碑憲宗即位詔凡軍民在齊拉衮山南者聽上總之大為張宴羣下罷酒將出遣人止公頃者諸人皆賀汝獨默然豈有意耶對曰臣欲陳之它日不謂遽問且今天下土地之廣人民之殷財賦之阜有加漢地者乎軍民吾盡有之天子何為異時廷臣聞之必悔見奪不若惟于兵權供億之需取之有司則勢順理安上曰慮所不及者遣人入聞報可公䇿太祖承天大命兵取天下功未及竟而遽陟遐太宗平金遣二太子總大軍南伐降唐鄧均德安四城拔棗陽光化留軍戍邊襄樊夀泗繼亦來歸而夀泗之民盡為軍官分有由是降附路絶雖歲加兵淮蜀軍將惟利剽殺子女玉帛悉歸其家城無居民野皆榛莽何若以是秋去春來之兵分屯要地冦至則戰冦去則耕積穀髙廩邊備既實俟秋時大舉則宋可平上善之始置屯田經略司於汴西起襄鄧宿重兵與襄陽制閫犄角東連陳亳清口桃源列障守之又置都運司於衛轉粟于河繼餽諸州陜西則移隴右汪義武王戍利州劉忠惠公哈瑪爾於成都割河東解之鹽池歸陜西置從宜所中限興元猶懼不繼置行部秦州順嘉陵漕漁關汚池轉粟入利神道碑大封同姓敕上於南京關中自擇其一公曰南京河流無常土薄水淺潟鹵生之不若關中厥土上上古名天府陸海上願有關中帝曰是地戶寡河南懷孟地狹民夥可取自益遂兼有河內神道碑壬子夏入覲受命征大理至察遜城外夜宴羣下公陳宋祖遣曹彬取南唐敕無效潘美伐蜀嗜殺及克金陵未嘗戮一人市不易肆以其主歸明日早行上據鞍呼曰汝昨所言曹彬不殺者吾能為之吾能為之公馬上賀曰聖人之心仁明如此生民有幸國之福也明年大師及城飭公盡裂槖帛為幟書止殺之令分號街陌由是其民父子完保軍士無一人敢取一錢直者神道碑上駐六盤公疾居關中教使勸農身至八州諸縣諭上重農之旨凡今關中桑成列者皆所訓植神道碑丙辰公入見或讒王府得中土心帝遣阿勒達爾大為鉤考置局關中惟集經略宣府官吏下及征商無遺羅以百四十二條曰俟終局日入此罪者惟劉史兩萬戶以聞餘悉不請以誅上聞不樂公曰帝君也兄也吾弟且臣事難與投逺將受禍未若盡是邸從主以行為久居謀疑將自釋上遣使以來覲告時帝在河西不信曰是心異矣曰來詐也再使至詔許馳上遂乘傳棄輜重先及見天顔始霽大會之次上立酒樽前帝酌之拜退復坐及再至又酌之三至帝泫然上亦泣下意不令有所白而止敕罷關西鉤考廢行部安撫經略宣撫都漕諸司神道碑帝即大位立十道宣撫使諸侯惟嚴忠濟為強橫難制乃以公為東平至治郡置勸農檢察二人以監之推物力以均賦役罷鐵官神道碑二年拜太子太師公曰皇太子未立安可先有太師還制中書神道碑改大司農公奏在太宗世詔孔子五十一代孫元措仍襲封衍聖公卒其子與族爭求為嗣訟及潛藩帝時曰第往力學俟有成德達才我則官之又聞曲阜有太常雅樂命東平守臣輦其歌工舞郎與樂色俎豆祭服至日月山帝親臨觀飭東平守臣員闕充補無輟肄習臣宣撫東平常閲先聖大賢之後詩書不通文理不究與凡庶等版洛士楊庸選孔顔孟三族諸孫俊秀者授之經而學夫禮盍其授庸教官以成國家育才待聘風動四方之美又詳議王鏞練習故實宜令提舉禮樂庶其歲久不致崩壞皆從之神道碑詔赴中書議事謀定朝格且勉諭曰姚某辭避台司朕甚嘉焉省中庶務須賴一二老成同心圖贊仰與左三部尚書劉肅往盡乃心其尚無隱條成與丞相史忠武公奏之帝深嘉納神道碑李璮召其質子彥簡竊歸反有迹矣帝問卿料如何對曰使璮乘吾北征之釁留後兵寡瀕海搗雁門困居庸惶駭人心為上䇿與宋連和負固持久令數擾邊使吾疲於奔救為中䇿如出兵濟南藉山東諸侯應援此成擒耳帝曰若是賊將何出對曰出下䇿神道碑三年平章王文統伏誅西域之人為所排抑者伏闕羣言回回雖時盜國錢物未若秀才敢為反逆帝曰昔在潛藩商訂天下人物亦及文統姚公茂言此人學術不純以遊説於諸侯他日必反去年竇漢卿上書纍數千言亦發其必為亂首秀才豈盡皆斯人然文統之相參政商公挺實譽之至是費寅以九事中時恚忌訟商公為文統西南之羽引陜西郎中趙良弼為徵幽商公上都以良弼多智略疑為文統流亞械繫於獄會遣缺行院成都而無輔行仍諭擇人公奏惟商挺可陛下寬其前責成斯行遂出而遣之公又奏方踐阼之初非良弼同事關中恐後事會寧身負矯擅誅東西川兩帥之罪以寬陛下西顧之憂推是為心忠純皎然安得與文統蓄異志者比帝赦出之神道碑四年拜中書左丞至元之元出省臣三罷世侯置牧守遷轉河東山西河南山東官吏公行省河南山西明年而歸神道碑或言中書政事大壞帝怒大臣罪有入不測者公上言太祖開創跨越前古施治未遑自後數朝官盛刑濫民困財殫陛下天資仁聖自昔在潛邸堅與諸老成日謀治道如邢州河南陜西皆不治之甚者為置安撫經略宣撫三司其法選人以居職頒俸以養亷去汚濫以清政勸農桑以富民不及三年號稱大治諸路之民望陛下之治已如赤子之求母先帝陟遐國難並興天開聖人纘承大統即用歷代遺制內立省部外設監司自中統至今五六年間外侮內叛繼繼不絶然能使官離債負民安賦役府庫粗實倉廪粗完鈔法粗行國用粗足官吏轉換政事更新皆陛下克保祖宗之基信用先王之法所致今陛下於基業為守成於治道為創始正宜息聖心答天心結民心睦親族以固本建儲副以重祚定大臣以當國開經筵以格心修邊備以防虞蓄糧餉以待歉立學校以育才勸農桑以厚生是可以光先德成帝治遺子孫流逺譽以陛下才略行此有餘邇者復聞聖聽日煩朝廷政令日改月異如始栽之木生而復移既架之屋起而復毁逺近臣民不勝戰懼惟恐大本一廢逺業難成為陛下之後憂國家之重害帝乃釋神道碑十年拜昭文館大學士詳定禮儀事其年襄陽下初議大舉公奏如求大將非右丞相安圗即同知樞密院事巴延布哈七月巴延陛辭付敕書惟逆戰者如軍律餘止殺掠古之善取江南者惟曹彬一人汝能不殺是亦一彬也既濟江布哈使至夜召見公帝憂見色曰自太祖戡定天下列聖繼之豈固存之令久帝制南國耶蓋天命未絶朕昔濟江而家難作天不終此大惠而歸今巴延雖濟江天能終此與否猶未可知是家三百年天下天命未在吾家先在於彼勿易視之其有事宜可書以進公言嚴兵守鄂無使荆閫斷陽邏渡先遣使責負歲幣留行人之罪明年公又言由陛下降城不殺虜之詔巴延濟江兵不踰時西起蜀川東薄海隅降城三十戶踰百萬自古平南未有若此之神捷者然自夏徂秋一城不降皆由軍官不思國之大計不體陛下之深仁利財剽殺是致降城四壁之外縣邑丘墟曠土無民國將安用皆聞揚州焦山淮安人殊死戰我雖克勝所傷亦多宋之不能為國審矣而臨安未肯輕下好生惡死人之常情蓋不敢也惟懼吾招徠止殺之信不堅詐其來耳宜申遣公幹官専輔巴延宣布止殺之詔有犯令者必誅無赦若此則賞罰必立恩信必行聖慮不勞軍力不費老氏有曰大兵之後必有凶年疾疫隨之軍雖不試而民止得其半况今民去南畝來歲之食將安所仰帕首腰刀必倡為亂袒臂一呼數十萬衆不難集也壁山柵水卒未易平是一宋未亡復生一宋又南方官府以情破法鞭背文面或盛竹絡投諸江中又鹽酒酤𣙜自漢代以後因之不廢今方新附若復徴之人必離散制曰鞭背黥面及諸濫刑冝急除之𣙜酤後議神道碑十三年拜翰林學士承旨宋平凡其侍從之臣以士子入見者必令見公詢其學行而官之神道碑十四年上以自九月不雨至於三月問可以惠利斯民者公曰糜穀之多無若醪醴麴糵京師列肆百數日釀有多至三百石者月已耗穀萬石百肆計之不可勝算矣祈神賽社費以不資宜悉禁絶從之神道碑公天質含𢎞而仁恕恭敏而勤儉理生惟務本實不事末作未嘗疑人欺已有負其德亦不留意胸中憂患之來不見言色有來即謀必反覆忠告惟恐吾言之不盡及秉筆中書或咎公獨遺門牆故人對曰用人威權當出天子果若賢才焉避不聞其瑣尾者烏敢藉權樹親賔市私恩乎神道碑左丞許文正公公名衡字仲平懷慶河內人金大安己巳生於河南新鄭寓舍壬辰北渡隱居大名遷居於衛甲寅京兆宣撫使亷公奉潛邸命來徵乙卯授京兆提舉辭不受中統元年五月應召北上二年五月授太子太保力辭不受改國子祭酒九月以疾辭歸三年九月應召北上至元元年正月辭歸二年十月應召北上詔入省議事四年正月辭歸十一月應召北上六年奏定官制七年正月拜中書左丞力辭不允八年四月改集賢大學士兼國子祭酒十年七月遷葬辭歸十三年七月應召北上修授時厯十五年三月授集賢大學士兼教領太史院事十七年春厯成八月辭歸十八年三月薨年七十三皇慶三年詔與宋儒周程張邵司馬朱張吕九人從祀夫子廟庭先生初有異稟賦性端慤與羣兒嬉即畫坐作進退周旋之節羣兒莫敢犯年七八歲受學於鄉師時國家多事學校廢弛惟農隙之際下第老儒會閭里正句讀以糊口爾先生凡三易師焉所授書輒不忘嘗問其師曰讀書欲何為師曰應舉取第爾曰如此而巳乎師大竒之每從質句讀訓解必問其旨義師辭於父母曰此兒頴悟非常它日必有過人者流離之際吾聊以遣日豈能為之師乎父母固請而師卒遁去亂後先生知三師皆遇難而無後每歲時設位祭之終身祭酒耶律公撰考歲略又云先生十餘歲時有道士欵其門謂父母曰此兒骨清而神全目光射人當謹視之茍非名冠天下即當神遊八表馳騁方外者也人間富貴不足道耳但兩顴頗暗清節有餘而安逸不足惜乎父母俱不能見之時歲飢民食橡栗或易子而食先生聞人有書即往求觀父母危之每與俱往人厭其迂考歲略時民間徭戍繁迫舅氏適典縣吏先生從授吏事參托名議考求立法用刑之原久之以應辦宣宗山陵州縣追呼旁午代舅氏分辦因見執政執政方怒舅氏不敢見及見先生應對則以溫言撫慰及還歎曰民不聊生而事督責以自免吾不為也遂不復詣縣而決意求學考歲略是時國日以蹙民皆轉徙無從師授亦無書籍父母知世將亂因欲稍知占候之術以為避難計遂令與日者遊故於推步占候之家見尚書疏義皆散亂毁缺先生凡三往就宿其家皆手録之由是刻意墳典考求古者為治為學之序操心行已之方一言一行必質諸書故雖亂離之際人亦稍稍從學焉考歲略亂後先生隱居於魏時竇默子聲以針術得名纍被朝廷徵訪亦隱於魏最知敬先生每相遇則危坐終日出入經傳泛濫釋老下至醫藥卜筮諸子百家兵刑貨殖水利算數之類靡不研究雪齋姚樞公茂方以道學自任聞先生苦學力行因過魏相與聚居剖微窮深忘寢與食考歲略壬寅雪齋隱蘇門傳伊洛之學於南士趙仁甫先生即詣蘇門訪求之得伊川易傳晦菴論孟集注中庸大學章句或問小學等書讀之深有默契於中遂一一手寫以還聚學者謂之曰昔所授受殊孟浪也今始聞進學之序若必欲相從當悉棄前日所學章句之習從事於小學灑掃應對以為進德之基不然當求他師皆唯師命遂悉取向來簡帙焚之使無大小皆自小學入先生亦朝夕精誦不輟篤志力行以身先之雖隆冬盛暑不廢也諸生出入惴栗惟謹客至則歡然延接使之惻然動念漸濡善意而後出考歲略己酉先生年四十自得伊洛之學其釋理順義如芻豢嘗謂終夜以思不知手之舞足之蹈是歲有讀易私言先生於書於易尤多致力然每學者請問則必使之從事於小學卒未嘗以此語之也考歲略云又耶律公國學事迹先生日用小學書則舉此書以開導學者嘗寄其子書曰小學舊書吾敬信如神明然能明此書雖他書不治可也庚戌春先生力疾還鄉里過衛聞懷之政尤苛虐遂止蘇門與雪齋相比以便講習且為還鄉之漸辛亥雪齋赴徵先生獨處蘇門始有任道之意考歲略甲寅王府徵教授京兆遜於大名使者訪焉遂偕往乙卯廉公希憲宣撫關中奏擬授先生京兆提學仍給月俸力辭不受往返凡六七不能強也考歲略庚申上正位宸極應詔北行至上都入見問所學曰孔子問所長曰虛名無實誤達聖聽問所能曰勤力農務教授童蒙問科舉何如曰不能上曰卿言務實科舉虛誕朕所不取七月還燕考歲略辛酉三月應召至上都時王文統秉政深忌雪齋諸公以先生素無因緣而弗憚也及竇公立排其學術之非必至誤國文統始疑先生唱和其説五月授雪齋太子太師竇公太子太傅先生太子太保外佯尊之內實不欲備顧問也竇公既以言文統不中欲依春宫以避焉先生獨以為不可曰姑舍其不安於義者且以一事言之如中古以來傅與太子相見則就西位東面太子東位西向公能為此事否不然是師道自我而亡也雪齋亦贊其説相與懷麻力辭於闕下凡數日始從其請由是改授雪齋大司農竇公翰林侍講學士先生國子祭酒既拜命以疾辭九月得告南還仍奉旨教授懷孟路子弟考歲略壬戌九月召至大都先生居都下也假館於道庵中凡權貴豪右延請皆不往惟姚竇二公時時相過始終如一考歲略中書左丞張公仲謙由大名宣撫復入中書好善最篤自初見先生屢請執弟子禮先生拒之而止一時賢俊多所薦拔凡中原士夫頗依賴之而公亦以復古進賢為己任每先生進退之際必往返導達上意挽之留之兾有以不屑去也然性執數忤幸臣故被譴責至是遣人求言先生貽書曰弔者在門慶者在閭一倚一伏孰知其初君子存誠克己就義始若甚難終知甚易可委者命可憑者天人無率爾事不偶然舍苗不耘固為有害助而揠之其害愈大既徵於色又發於聲天道無他庸玉汝成考歲略至元元年正月懇辭還懷州六月迅雷起中堂時卜築於此而未遷也先生與一二從者視役其下雷雨驟至火光滿室墁匠從者皆昏仆而先生弗動也考歲略二年十月召至大都即陳雷震不宜入見上不許十二月奉旨入省議事先生以疾辭丞相安圗素聞先生名心慕之乃就訪於行館及還心悅誠服念念不釋者纍日謂左右曰若輩自謂相去幾何蓋什百而千萬也是豈繒繳之可及耶翼日先生與丞相答禮考歲略三年春二月召至檀州後山面奉德音竇漢卿獨言王文統當時汝何為不言豈孔子教法使汝若是耶汝不遵孔子教法自若是耶往者不咎今後勿爾也是云是非云非可者行不可者勿行我今召汝無他省中事前雖命汝汝意猶未悉今而命汝人皆譽汝想有其實汝之名分其斟酌在我國事所以無失百姓所以得安其謀謨在汝謂汝年老未為老謂汝年小不為小正當黽勉從事毋負汝平生所學安圗尚幼苦未更事汝謹輔導汝有嘉謨先告安圗以達於我我將擇焉先生對曰聖人之道至大且逺而學者所得有淺深臣平生雖讀其書所得甚淺然既叨特命願罄所知者言之所不知者亦不能強也安圗聰明且有執持告以古人言語悉能領解臣所知者盡告之但慮中有人間之則難行外用勢力納入其間則難行臣入省之日淺淺見如此未知是否考歲略夏四月分省至上都屢蒙訪問遂奏陳時務五事聖旨俞允令繕寫以進朕當詳之其一曰立國規模歷論前代建國北方奄有中夏如魏如遼如金能用漢法故享國長久今國家當行漢法事在不疑然萬世國俗纍朝勳貴一旦驅之下從臣僕之謀改就亡國之俗其勢甚難非三十年不能成功舉一語民使富實興學校練甲兵隨時損益裁為定制如臣等輩皆足以任此在陛下篤信而堅守之不雜小臣不營小利不貴近效不惑浮言庶幾可以得天下之心成至治之效二曰中書大要今仕者宜頒俸祿使可資以為養未仕者宜明立條式俾就銓敘則失職之怨少舒矣外設監司糾察汚濫內由吏部考訂資歷則踰分之求漸可息矣再任三任抑髙而學下則人才爵祿可得而差次之矣至於貴家世襲品官任子驅良戶口之制亦不可緩也若夫得行與不得行在上之委任者何如而能行與不能行在執政得人與不得人耳其三曰為君難其目曰踐言曰防欺曰任賢曰去邪曰得民心曰順天道六者乃為君難之目舉其要則修德任賢愛民三者而已此謂治本治本立則綱紀可布法度可行治功可必矣其四曰農桑學校今國家徒知斂財之巧不知生財之由不惟不知生財而斂財之酷又害於生財也徒知防人之欺不知養人之善欲其不欺非衣食以養其生理義以養其心不可也徒思法令之不行不思法令無可行之地上多賢才皆思為公下多富民皆知自愛則不令自行不禁自止誠能愛重農民勿使擾害盡驅遊惰之民歸之南畝歲課種樹懇諭而篤行之十年以後當倉盈庫積非今日比矣自上都中都及司縣皆設學校使皇子以至庶人之子弟皆從事於學日明父子君臣之大倫自灑掃應對至於平天下之要道十年以後上知所以御下下知所以事上上和下睦又非今日比矣其五曰慎微文多削藁先生每有奏對或欲召見則上自擇善譯者然後見之或譯者言不逮意上已領悟或語意不倫上亦覺其非而正之至燕先生以疾不復入省因求還家養疾許之考歲略四年十一月召至大都六年奉旨議官制先生與左丞張公贊善王公同奏官制送入中書先生歷考古今設官分職之本沿革之由與夫上下統屬之序其權攝增置冗長倒置行之有弊者率皆不取自省部屬縣體統之正左右臺院輔弼之制內外諸官聨屬控制之差后妃儲藩隆殺之防悉圖為定制以聞其所以取舍欲著成書而未暇也考歲略十年正月拜中書左丞入見奏事畢辭於上前不允大槩以為臣之所以不敢承受者有三一則臣一介書生遽當大任非勳非舊不足以服內外之人二則無德無才不能辦陛下責任之事三則臣之所學迂逺與陛下聖謨神算未盡吻合陛下知臣未盡信臣未至直以虛名誤蒙采擢臣若不自度冒當聖眷其旋致悔咎必矣上曰此一事皆出朕意無復多讓先生再三懇請上命左右掖出左右曰有旨令先生出矣將至門復還奏曰陛下令臣出當出省去耶上曰出殿門爾爾後連日求辭不允考歲略夏五月先生隨省赴上都因具奏阿哈瑪特專權無上蠧國害民等事渠由是銜之或曰先生夜寢疏濶無他防備卒有橫逆奈何先生曰主上在此何得敢爾脫或有之亦命也人生不應有如許計校考歲略其又云阿哈瑪特欲以子與兵柄先生以為不可謂國家事權兵民財三者而已父位尚側書者典民與財而子又典兵太重旨卿慮阿哈瑪特反耶先生言此反側之道也古者姦邪未有不由如此者上以此語語西相相語先生曰公何以言吾反先生曰吾言前世反者皆由權重君誠不反何為由其道相復之曰公實反耳人所嗜好者勢利爵祿聲色公一切不好欲得人心非反而何先生曰果以君言待罪亦無所辭先生以病告辭丞相安圗不許臺官李羅奏聞聖意憫惻召其子師可入見喻以舉官自代先生奏用人者天子之柄臣下泛論其賢否則可若授之以政則當斷自宸衷不可使臣下有覬覦市恩之漸考歲略八年授集賢大學士國子祭酒先生方居相府丞相傳旨令教蒙古生四人後又奉旨教七人至是有旨令四方及部下願受業者俱得預其列即令南城之舊樞密院設學國學事迹先生自開學家事悉委其子師可凡賔客來學中者皆謝絶之先生嘗謂學中若應接人事諸生學業必有所妨外人謗怒是我一巳之事諸生學業乃上命也日令家具早膳午膳以老疾日西不復食矣先生時年六十有一以宿疾當忌鹽肉酒麵三年且以治法不可以補而體力復不可以瀉故日節飲食未嘗敢至於飽以為飽則必有補邪氣也然朝夕蒞事略無老人疲倦之意國學事迹先生嘗謂蒙古生員質朴未能視聽專一茍置之好伍曹中涵養三數年將來必為國家用乃奏召舊子弟散居四方者王梓韓思永蘇郁耶律有尚孫安髙凝姚燧及其弟燉劉季偉吕端善劉安中白棟皆馹致館下為伴讀欲其夾輔匡弼薰陶浸潤而自得之也或謂先生何不博選時俊而獨用其門生曰吾但教人而已非用人也方以我之拙學教人它人從否未可知也國學事迹先生欲以蒙古生習學算術遂自唐堯戊辰距至元壬申凡三千六百五年編其世代歷年為一書令諸生誦其年數而加減之國學事迹先生教諸生習字必以顔魯公為法嘗曰古者民無所知聖人御世有以教之然聖人不可久生於世故為文字以記其言文字之始義取記言而已後世習字書者多少説話書固六藝之一程先生謂一向好著亦自喪志然其作字時甚敬謂只此是學此為可法國學事迹諸生讀書之暇先生令蒙古生年長者習拜友受宣拜詔儀釋奠冠禮時亦習之小學生有倦意令習跪拜揖讓進退應對之節或投壺習射負者罰讀書若干遍國學事迹先生説書章數不務多唯懇欵周折若未甚領解則引證設譬必使通曉而後已嘗問諸生此章書義若推之身自今日之事有可用否大凡欲其踐行而不貴徒説也先生嘗曰世謂能作文者可以驕人至於能説書者亦可以驕人諸生講書但使之省解可也何必要他會説及見學者能有疑問先生喜氣溢於眉宇嘗謂書中無疑看得有疑有疑却看得無疑方是有功國學事迹先生嘗曰敬敷五教在寬君子以教思無窮容保民無疆則是為教者當以寬字存心也今日學中大體雖要嚴密然就中節目須且寬緩大槩人品不一有夙成者有晚成者有可成其大者有可成其小者且一事有所長必一事有所短千萬不同遽難以強之也學記自一年離經辨志至九年知類通達強立而不反其始終節次幾多積纍必不可以茍且致之故教人不止各因其材又當使隨其學之所至而漸進也蓋教人與用人正相反用人當用其所長教人當教其所短國學事迹先生之教人也恩同父子義若君臣因其所明開其所蔽而納諸善時其動息而張弛之慎其萌蘖而防範之其日漸月漬不知其變也日新月盛不自知其化也其言談舉止望而知其為先生弟子卒皆為世用也考歲略先生嘗言為學者治生最為先務茍生理不足則於為學之道有所妨彼旁求妄進及作宦嗜利者殆亦窘於生理之所致也諸葛孔明身都將相死之日廩無餘粟庫無餘財其廉所以能如此者以成都桑土子弟衣食自有餘饒爾治生者農工商賈而已士君子多以農務為生商賈雖為逐末亦有可為者果處之不失義理或以姑濟一時亦無不可若以教學與作官規圖生計恐非古人之意也國學事迹先又云歲時諸伴讀以酒禮至先生家生辭曰所以奏取諸生者蓋為國家為吾道為學校為後進非為供備我也夫為官守學所當得者俸祿也俸祿之外復於諸生有取焉欲師嚴道尊難矣國學之置肇自許文正公文正以篤實之資得朱子數書於南北未通之日讀立領會起敬起畏及被遇世祖純乎儒者之道諸公所不及也世祖聖明天縱深知儒術之大思有以變化其人而用之以為學成於下而後進於上或疏逺未即自達莫若先取侍御貴近之特異者使受教焉則效用立見故文正自中書罷政為之師是時風氣渾厚人材朴茂文正故表章朱子小學一書以先之勤之以灑掃應對以折其外嚴之以出入遊息而養其中掇忠孝之大綱以立其本發禮義之微權以通其用於是數十年彬彬然號稱名卿才大夫者皆其門人矣嗚呼使國人知有聖賢之學而朱子之書得行於斯世者文正之功甚大也蜀郡虞公文集時又牧菴文集云文正微於大名於輝於秦於河南以倡明斯道為己任諄諄私淑少長不一其年也利鈍不齊其才也積多至數百人聞之天聰徴為成均俄拜左丞歲餘辭免復求成均後其子弟繼司鼎鉉者將十人卿曹風紀二千石吏棊錯中外者又十餘焉其於隆平之治豈不少贊乎得又靜菴筆録云許先生在燕中從學者頗多卒不見許子之學者然好學者固有之為托名干祿亦有之襄陽下上欲遂有江南先生以為不可其辭甚祕考歲略十年諸生廩餼不繼稍稍引去又權臣屢毁漢法四月召赴上都議事面請還鄉里上命衆議其去留雪齋云先生出處關時世之汚隆我輩不可強之先生自處審矣今日直當以聖賢待之遂合辭奏國學設立於今三年教尊嚴謹諸生學問進長許某所以告辭之意言為年老殘疾上世有數喪未葬欲歸了此一事其意甚哀此係人子孝道之事宜賜允從由是得告南歸先生至懷簡絶人事嘗居山下課童僕事耕墾考歲略十三年七月使者來召議改厯十七年二月測驗已周厯事告成自先生入院恩眷愈隆上每北還必問先生安否病則賜藥賜杖至是入見皆跪奏事上令先生起賜坐勞問久之六月疾益進八月得請還家就除師可懷孟路總管以便供養考歲略十八年春先生疾甚醫者診之曰損隂偏陽謂之疾今六脈皆平先生其少瘳乎先生曰久病而脈平者不治吾殆將不起矣遂不服藥頃之稍間適仲春祭祀先生曰吾一日未死可不有事於祖考乎遂力疾奠獻外禮既徹家人餕恬如也遂曳杖於門曰豫心抨抨然瞑目坐久之曰死生何異人精神能有幾世事何時窮遂發嘆歌子朱子睡起牀風瑟瑟覺來山月團團身心無纍久輕安况有清涼池館茍穩翻嫌白俗情髙却笑郊寒蘭膏元自少陵殘好處金章不換歌罷奄然而逝俄而雷電晦暝大風拔木城中老幼往哭其門征商過客相唁於途雖農夫里婦亦嘆息焉先生嘗語師可曰我平生虛名所纍竟不能辭官死後慎勿請諡立碑必不可也便書許某之墓四字使子孫識其處足矣賢耶不賢耶碑於人何有至是從其治命葬而無碑既葬四方學者有不逺數千里而來哭於墓者蒲人王楫年踰六十衰絰赴葬司賔者辭曰門人衰禮歟楫曰吾師也術藝之師歟賔主之司歟吾猶懼乎報之無從吾將以愧夫王通之門人耳先生去世朝野識與不識莫不哀傷以為斯道斯民之不幸考歲略先生居家勤儉強於自治公愛兼盡不嚴而整閨門之內若朝廷然與夫人敬氏相待如賔而夫人謙順自牧周旋道義先生亦賴其內助焉考歲略先生天資𢎞毅卓然有守其恭儉正直出於天性雖艱危窮厄之際所守益堅好學不倦聞一善言見一善行不啻飢渴於利名紛華畏若探湯誠心自然天下信之建元以來十被召旨未嘗不起然卒不肯枉尺直尋而去每入奏對以格君心為己任氣質雍客誠敬交孚言雖切直而卒無忤也衛士或舉手加額曰是欲澤被生民堯舜其君者也至於進退出處之際勇於就義凛然不可以勢利誘而威武屈也逮其晚年義精仁熟身被四時之和道出羣物之表四方聞之知敬望之知畏親之知愛逺之知慕蓋其胸中浩大無一毫人欲之私純乎天理之正故其動靜語默之際周旋出入之頃無往而非斯道之流行矣考歲略先生著述曰小學大義乃甲寅歲在京兆教學者讀小學口授之語曰讀易私言是先生五十後所作曰孟子標題嘗以教其子師可曰四針説中庸説語録等書皆雜出於衆手非完書也考歲略先生嘗戒其學者姚燧曰弓矢為物以待盜也使盜得之亦將待人文章一道本士子之利器然不能自出手筆將何以應人之見役哉非其人而與之與非其人而拒之鈞罪皆非明察者之所為也牧菴文集翰林承旨鹿菴王公磐襟宇蓋世少所許可獨敬禮先生每相語則曰先生神明也磐老矣徒增愧縮爾及先生訃音至則曰設若朝廷賜諡先生非文正不可後世有知先生者不易磐之言矣考歲略先生居鄉里凡喪葬一遵古制不用二氏懷州士夫家因以為俗四方聞風亦有效之者每遇其徒未嘗面詆其非但從容欵話其人已不覺內愧或涕出悔其陷溺之深也近舍有德公者年百餘歲嘗謂先生曰老僧苦行百年亦不能作佛徒為不孝之人羞見祖宗於地下但願勸小僧輩曷若還俗以延汝祖宗之嗣比死不度一人考歲略鹿菴讚先生之像曰氣和而志剛外圓而內方隨時屈伸與道翺翔或躬耕太行之麓或判事中書之堂布衣蓬茅不為荒涼圭組軒裳不為輝光虛舟江湖晴雲捲舒尚友千載誰與為徒管幼安王彥方元魯山陽道州蓋異世而同符者也自關洛大儒倡絶學於數千載之後門人傳誦之未能遍江左也伊川殁二十餘年而文公生焉繼程氏之學集厥大成未能遍中州也文公殁百十年魯齋先生生焉聖朝道學一脈乃自先生發之至今學術正人心一不為邪論曲學所勝先生力也所以繼往聖開來學功不在文公下元臣事略卷八
