body:
  text: 元名臣事畧卷九元蘇天爵撰太史王文肅公公名恂字敬甫中山安喜人初事潛邸命為太子伴讀中統元年授太子贊善至元十三年奉詔修授時厯十六年拜太史令明年厯成又明年卒年四十七公生三歲家人示之書帙輒指丁字及風字能道之母夫人授千文於膝下一再過即盡識郷先生以詩來賀六歲就外學十三年凡授性理數術輒造其極濟陽楊公撰行狀歲己酉太保劉公自邢北上取道中山方求一時之俊召公與語賢其才欲為大就之逮其南轅載之來邢復居磁之紫金山勸為性理之學公感太保之意振迅奮厲所業大進太保上其學行尋䝉召見即以為太子伴讀楊公撰墓誌中統辛酉陞太子贊善明年太子封燕王守中書令領樞密使勅兩府大臣凡有啟禀必以王恂與聞初中書左丞許公輯唐虞以來嘉言善政為一編書以進上嘗召公講因之咨詢太子典學之功又璽書命公於太子起居之際飲食衣服之節皆悉意調䕶非所宜接之人勿令侍行狀公上牋言太子天下本付託之重當延名德與之居處及領中書樞密之政聖上詔條所當編覧庶務之本亦當屢省官吏以罪免者毋使僥倖更進軍官害人尤甚改用之際尤不可非其人民至愚而神應或變化之餘吾亦不之疑則反側化為忠厚國勢增重矣墓誌公早以筭術妙天下它日太子以問公公對曰筭數藝之一耳定國家安人民乃大事也每侍講讀發明三綱五常之㫖大學本末先後之次第及歴代治亂興亡之所以公以正道經術輔翊裕宗有古師傳之誼裕宗嘗問歴代治亂公以遼金事近接耳目即為區别善惡論著得失上之家傳裕宗嘗從容語公宜言心所守公對曰臣聞許衡嘗言人心猶印板然板本不差雖摹千萬紙皆不差本既差矣摹之於紙無不差者裕宗深以為然家傳世祖擇勲戚子弟學於公師道卓然及公從裕宗撫軍青海始以諸生屬許文正公名臣自是多學者而國學之制興矣家傳國朝承用金大明厯歲乆寢疎上常思釐正公既以筭術冠一時故以委之公奏必得明厯理者乃可帝問其人公以左丞相許衡對許公時歸覃懷詔乘驛詣闕既至命參預改厯事本院屬官悉聽公辟十七年公與許公奏臣等合朔南司厯官徧攷厯書四十餘家晝夜測騐創立新法參以古制推筭辛巳歲厯日成雖或未至精密而所差計亦微妙此之前代厯家附㑹厯元更立日法者自謂無愧伏惟陛下敬天時頒正朔授民事不可不致精密以為後代程式必須每歲測騐修改積二三十年庶盡其法可使如三代日官世守其職永無改易雖百世後亦不復有先後時之弊矣凡舊厯承訛踵陋不可不革者條具别狀以聞制曰可仍賜名曰授時厯以其年冬至頒行中外行狀十八年公奔堯封府君喪晝夜悲號食憔勺飲卧不能寐治喪一據禮經前此母夫人劉氏兄憚弟恒姪其相繼下世未殯方將從府君以事於先兆親營冡壙有司遺力相其役公固辭不受哀毁中凡舉五喪用是屬疾日侵皇太子屢遣醫胗治及葬贈楮幣二千緡及厯成論賞而公已殁復追賜之太子因論大政首思及公顧左右稱惜良乆行狀公資簡重不妄言笑不樂靡麗不喜音樂其與人少許可雖權貴未賞假以辭色剛稜疾惡至負髙氣以忤之既與許公同太史院謂人曰先賢吾不得而見之今得許公可矣漸磨之乆德宇為之一變亦以其子姪受業焉墓誌自歲直辰已當代賢公卿如昭文竇公平章亷公左丞許公樞密董公相繼捐館舎中外聞之同發天不憗遺之嘆而甚於公公得年僅四十七重為哀惜云墓誌太史郭公公名守敬字若㤀順德邢臺人至元二年由提舉諸路河渠遷都水少監八年遷都水監十三年都水監併入工部遂除工部郎中是年改治新厯十六年遷同知太史院事厯成拜太史令二十九年修㑹通河命提調通惠河漕運事三十一年拜昭文館大學士知太史院事累請致仕不許延祐三年卒年八十六公生有異操不為嬉戲事祖榮號鴛水翁通五經精於筭數水利時太保劉文貞公左丞張忠宣公樞密張公易贊善王公恂同學於州西紫金山而文貞公復與鴛水翁為同志友以故俾公就學於文貞所先是順德城北有石橋通達活泉水兵後橋為泥潦汙没失其所在公甫冠為之審視地形按指其處而得之河東元公裕之文其事於石其曰里人郭生者即公是也太史齊公撰行狀中統三年張忠宣公薦公習知水利且巧思絶人䝉賜見上都便殿公面陳水利六事其一中都舊漕河東至通州灌以玉泉水引入行舟歲可省僦車錢六萬緡通州以南于藺檢河口徑直開引由䝉村跳梁務至楊村運河以避白浮鸛澤盤淺風浪逺轉之患其二順德達活泉開入城中分為三渠引出城東灌溉其地其三順德澧河東至古任城失其故道没民田一千三百餘頃此水開修成河其田即可耕種其河自小王村經滹沱合入御河通行舟檝其四磁州東北滏漳二水合流處開引由滏陽邯鄲洺州永年下經鸛澤合入澧河其間可溉田三千餘頃其五懷孟沁河雖已澆溉尚有漏堰餘水東與丹河餘水相合開引東流至東陟縣北合入御河其間亦可溉田一千餘頃其六黄河自孟州西開引少分一梁經由新舊孟州口間順河古岸下至溫縣南復入大河其間亦可溉田二千餘頃毎奏一事上輒曰當務哉此人真不為素食矣即受提舉諸路河渠四年加授銀符副河渠使行狀至元改元從忠宣公行省西夏興復瀕河諸渠先是西夏瀕河五州皆有古渠其在中興州者一名唐來長袤四百里一名漢延長袤二百五十里其餘四州又有正渠十長袤各二百里支渠大小共六十八計溉田九萬餘頃兵亂以來廢壞淤淺公為之因舊謀新更立閘堰役不踰時而渠皆通利夏人共為立生祠於渠上行狀二年授都水少監公言嚮自中興還特命舟順河而下四晝夜至東勝可通漕運及見查泊兀郎海古渠甚多可為修理又言金時自燕京之西麻峪村分引瀘溝一支東流穿西山而出是謂金口其水自金口以東燕京以北溉田若干頃其利不可勝計兵興以來典守者懼有所失因以大石塞之今若按視故迹使水得通流上可以致西山之利下可以廣京畿之漕上納其議公又言當於金口西預開減水口西南還大河令其深廣以防漲水突入之患衆皆服其能行狀十二年丞相巴延公南征議立水站命公行視所便自陵州至大名又自濟州至沛縣又南至吕梁又自東平至綱城又自東平清河逾黄河故道至與御河相接又自衞州御河至東平又自東平西南水泊至御河乃得濟州大名東平泗汶與御河相通形勢為圖奏之行狀十三年立局改治新厯先時太保劉公以大明厯自遼金承用二百餘年寖以後天議欲修改而薨至是江左既平上思用其言遂以公與贊善王公率南北日官分掌測騐推步於下而忠宣樞密二張公為之主領裁奏於上復共薦前中書左丞許公能推明厯理恒參預之公首言厯之本在於測騐而測騐之器莫先儀表今司天渾儀宋皇祐中汴京所造不與此處天度相符比量南北二儀約差四度表石年深亦復欹側公乃盡考其失而移置之既又别圖爽塏以木為重棚創作簡儀高表用相比覆又以為天樞附極而動昔人嘗展管望之未得其的作候極儀極辰既位天體斯正作渾天象象雖形似莫適所用作玲瓏儀以表之矩方測天之正圖莫若以圓求圓作仰儀古有經緯結而不動公則易之作立運儀日有中道月有九符公則一之作證理儀表髙景虚因象非真作景符月雖有明察景則難作闚凡厯法之驗在於交㑹作日食月食儀天有赤道翰以當之兩柘低昻標以指之作星晷定時儀以上凡十三等又作正方儀景裏表儀懸正儀座正儀凡四等為四方行測者所用又作仰規覆矩圖異方渾葢圖日出入永短圖凡五等與上諸儀互相參考行狀十六年改局為太史院以贊善公為太史令公為同知太史院事給印章立官府是年奏進儀表式様公乃對御指陳理致一一周悉自朝至於日晏上不為倦公因奏唐一行開元間令厯官赴天下測景書中見者凡十三處今疆宇比唐尤大南北逺方測驗日月交食分數時刻不同晝夜長短不同日月星辰去天髙下不同即目測騐人少可先南北立表取直測景上可其奏遂設監候官一十四員分道相繼而出先測得南海北極出地一十五度夏至景在表南長一尺一十六分晝五十四刻夜四十六刻衡岳北極出地一十五度夏至日在表端無景晝五十六刻夜四十四刻天台北極出地三十五度夏至景長一尺四寸八分晝六十刻夜四十刻和林北極出地四十五度夏至景長三尺二寸四分晝六十四刻夜三十六刻鐵勒北極出地五十五度夏至景長五尺一分晝七十刻夜三十刻北海北極出地六十五度故景至長六尺七寸八分晝八十二刻夜一十八刻繼又測得上都北極出地四十三度少北京北極出地四十二度强益都北極出地二十七度少登州北極出地三十八度少髙麗北極出地三十八度少西京北極出地四十度少太原北極出地三十八度少安西府北極出地三十四度半强興元北極出地三十三度半强成都北極出地三十二度半强西凉州北極出地四十度强東平北極出地三十五度太大名北極出地三十六度南京此極出地三十四度太强陽城北極出地三十四度太弱揚州北極出地三十三度鄂州北極出地二十一度半吉州北極出地二十二度半雷州北極出地二十度太瓊州北極出地十九度太行狀十七年新厯告成公與太史諸公同上奏曰臣等竊聞帝王之治莫重於厯日黄帝迎日推䇿帝堯以閏月定四時成歲舜在璇璣玉衡以齊七政爰及三代厯無定法周秦之間閏餘乖次西漢造三統厯百三十年而後是非始定東漢造四分厯七十餘年而儀式方備又百二十一年劉洪造乾象厯始悟月行有遲疾又百八十年姜岌造三紀甲子厯始悟以月食衝驗日宿度所在又五十七年何承天造元嘉厯始悟以朔望及弦皆定大小餘又六十五年祖冲之造大明厯始悟太陽有歲差之數極星去不動處一度餘又五十二年張子信始悟日月交道有表裏五星有遲疾留逆又三十三年劉焯造皇極厯始悟日行有盈縮又三十五年傅仁均造戊寅元厯頗采舊儀始用定朔又四十缺年李淳風造麟德厯以古厯章蔀元首分度不齊始為總法用進朔以避晦晨月見又六十三年僧一行造大衍厯始以朔有四大三小定九服交食之異又九十四年徐昻造宣明厯始悟日食有氣刻時二差又二百三十六年姚舜輔造紀元厯始悟食甚泛餘差數以上計千一百八十二年厯經七十改其測法者十有三家自是又百七十四年欽惟聖朝統一六合肇造區夏專命臣等改治新厯臣等用創造簡儀髙表憑其測到實數所考正者凡七事一曰冬至自丙子年立冬後依毎日測到晷景逐日取對冬至前後日差同者為準得丁丑年冬至在戊戌日夜半後八刻又定丁丑夏至得在庚子日夜半後七十刻又定戊寅冬至在癸卯日夜半後三十三刻己卯冬至在戊申日夜半後五十七刻半庚辰冬至在癸酉日夜半後八十一刻半各減大明厯十八刻逺近相符前後應準二曰歲餘自劉宋大明厯以來凡測景騐氣得冬至時刻真數者有六用以相距各得其時令用歲餘今考驗四年相符不差仍自宋大明壬寅年距至今日八百一十年每歲合得三百六十五日二十四刻二十五分其二十五分為今厯歲餘合用之數三曰日躔用至元丁丑四月癸酉望月食既推求日躔得冬至日躔赤道箕宿十度黄道箕九度有奇仍憑每日測到太陽躔度或憑星測月或憑月測日或徑憑星度測日立術推筭超自丁丑正月至己卯十二月凡三年共得一百三十四事皆躔於箕與月食相符四曰月推自丁丑以來至今憑每日測到逐時太隂行度推筭變從黄道求入轉極遲極疾并平行處前後凡十三轉計五十一事内除去不真的外有三十事得大明厯入轉後天又因考騐交食加大明厯三十刻與天道合五曰入交自丁丑五月以來憑每日測到太隂去極度數比擬黄道去極度得月道交於黄道共得八事仍依日食法度推求皆有食分得入交時刻與大明厯所差不多六曰二十八宿距度自漢太初厯以來距度不同互有損益大明厯則於度下餘分附以太平少皆私意牽就未嘗實測其數今新儀皆細刻周天度分毎度為三十六分以巨線代管窺宿度餘分並依實測不以私意牽就七曰日出入晝夜刻大明厯日出入晝夜刻者據汴京為準其刻數與大都不同今更以本方北極出地髙下黄道出入内外度立術推求每日日出入晝夜刻得夏至極長日出寅正二刻日入戌初二刻晝六十二刻夜三十八刻冬至極短日出辰初二刻日入申正二刻晝三十八刻夜六十二刻永為定式所創法者凡五事一曰太陽盈縮用四正定氣立為外限依限立招差取得每日行分初未極老積度比古為密二曰月行遲疾古厯皆用二十八限今以方分日之八百二十分為一限凡析為三百三十六限依限叠招差求得轉分進退其遲疾度數逐時不同葢前所未有三曰黄赤道著舊法以一百一度相減相乘今依筭術勾股弧矢方圓斜直所容求到度率積差差率與天道實為脗合四曰黄赤道内外度據累年實測内外極度二十三度九十分以圓容方直弧矢勾股為法求每日去極與所測合符五曰白道交周舊法黄道變推白道以斜求斜今用立渾比量得月與赤道正交距春秋二正黄赤道正交一十四度六十六分擬以為法推逐月毎交二十八宿度分於理為盡行狀十九年太史王公卒時厯雖頒然其推步之式與夫立成之數尚皆未有定槀公於是比次篇數整齊分秒裁為推步七巻立成二卷厯擬槀三巻轉神選擇二巻上中下三厯注式十二卷二十三年繼為太史令遂上表奏進又有時候箋注二巻修改源流一巻其測騐書有儀象法式二巻二至晷景考三十巻五星錯行考五十巻古今交食考一卷新測二十八舎雜座諸星入宿去極一巻新測無名諸星一卷月離考一巻並藏之官行狀二十八年有言漕事便利者一謂灣河自永平挽舟踰而上可至上都一謂瀘溝自麻峪可至尋麻朝廷令各試所説其謂灣河者至中道自知不可行而罷其謂瀘溝者命公與徃亦為峭石所阻舟不得通而止公因至上都别陳水利十有一事其一大都運粮河不用一畝泉舊源别引北山白浮泉水西折而南經瓮山泊自西水門入城環滙於積水潭復東折而南出南水門合入舊運粮河每十里一置閘皆至通州凡為閘七距閘里許上重置斗門時為提閉以通舟止水上覧奏喜曰當速行之於是復置都水監俾公領之首事於二十九年之春告成於三十年之秋賜名曰通惠役興之日上命丞相以下皆親操畚鍤為之倡咸待公指授而後行事置閘之處徃徃於地中偶值舊時塼木時人為之感服船既通行公私省便先時通州至大都陸運官粮歲若干萬石方秋霖雨騾畜死者不可勝計至是皆罷是秋車駕還自上都過積水潭見其舳艫蔽水天顔為之開懌特賜公錢一萬二千五百緡仍以舊職兼提調通惠河漕運事公又欲於澄清閘稍東引水與北運河接立閘麗正門西令舟楫得環城徃來志不就而罷行狀大德二年召公至上都議開鐵幡竿渠公奏山水頻年暴至茍非大為渠堰廣五七十步不可執政吝於工費以公言為過縮其廣二之一明年大雨山水注下渠不能容漂没人畜廬帳㡬犯行殿翌日天子北狩謂宰臣曰郭太史神人也可惜不用其言行狀七年詔内外官年及七十並聽致仕公以舊臣且朝廷賴所施為獨不許其請至今翰林太史司天官不致仕者咸自公始行狀公以純德實學為世師法然其不可及者有三一曰水利之學二曰厯數之學三曰儀象制度之學決金口以下西山之筏而京師材用是饒復唐來以溉瀕河之地而靈夏軍儲用足引汶泗以接江淮之派而燕吳漕運畢通建斗門以開白浮之源而公私陸賈由省又前後條奏便宜凡二十餘事相沿河渠泊堰大小數百餘所其在西夏嘗挽舟遡流而上究厥河源者又嘗自孟門以東循黄河故道縱廣數百里間皆為測量地平或可以分殺河勢或可以溉灌田土具有圖誌又嘗以海而較京師至汴梁地形髙下之殊謂汴梁之水去海甚逺其流峻急而京師之水去海至近其流且緩其言厯數儀象制度之學真不可及者也初公年十五六得石本蓮花漏圖已能盡究其理及隨張忠宣公奉使大名因大為鼓鑄即今靈臺所用銅壺又得尚書璇璣圗規行缺為儀積土為臺以望二十八宿及諸大星及見大用觀其規畫之簡便測望之精切智巧不能私其議羣衆無以參其功王太史剛見自用者也每至公所觀其匠制未嘗不為之心服魯齋先生言論為當代法因語及公以手加額曰天祐我元似此人世豈易得嗚呼其可謂度越千古矣行狀元名臣事畧巻九
