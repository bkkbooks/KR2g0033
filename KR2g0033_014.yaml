body:
  text: 元名臣事略卷十四元蘇天爵撰左丞董忠獻公公名文炳字彥明真定稿城人少為稿城令入事潛邸中統元年宣慰燕南諸道二年授山東東路宣撫使未幾召為侍御親軍都指揮使三年授山東經略使至元三年授鄧州光州行軍萬户河南統軍副使七年改山東統軍副使九年遷樞密院判官行院淮西十一年拜參知政事遂與丞相巴延合行取宋宋亡拜中書左丞十四年還朝拜僉書樞密院事是嵗薨年六十二龍虎公薨時公年始十六率諸稚弟事母李夫人李夫人有賢行治家嚴篤于教子公學侍其先生警敏善記誦自幼儼如成人清河元公撰家傳又季野齋撰墓志云云公岐嶷舉動如成人嘗率羣兒嬉戲部分左右習為行陳之事指揮號令無敢違者嵗乙未以父任為稿城令同列皆父時人少公吏亦不之憚居半嵗明于聽斷以恩濟威同列束手下之吏抱案求署不敢仰看里人亦化服縣貧重以旱蝗洊飢而府徴日暴民殆不能生公以榖數千石豫縣縣得以少寬前令乏軍興貸于人而貸家息入嵗倍率取償民之蠶麥公曰民困矣頭會箕斂不足已責我為令義不忍我代償乃以田廬若干畝所計直豫貸家遂業貧民縣之間田教之敏藝而豪強不敢奪流離漸還數年間民食以饒初科民敢隱實者誅籍其家公務衆其力而寡其居衆危不可公曰為民獲罪亦所甘心由是豪民富完至今外縣民或銜負不直其縣而投牒求直于公嘗上計府外縣人衆觀之曰吾亟聞董令董令顧亦人耳何明能若神也有索無厭公抑不豫或讒之府府欲中公公曰吾終不能剜民規利即棄官去家傳世祖在藩邸癸丑秋奉憲宗命南征詔公率義士四十六人騎從世祖南征後世祖軍人馬道死亡北至吐蕃止西人能從西人翼公徒行顑頷蹢躅取死馬肉續食日不能三二十里期必達會東使過公至軍言狀世祖亟命公弟文忠解尚廄五馬載糗糧來遷既至世祖壯其忠閔其勞勞賜優渥用輒稱旨由是日親貴用事家傳巳未我師伐宋上駐蹕淮西之仙居山旁有臺山寨宋人行光山縣事于其上公受命往取之親抵寨下再四開諭守者不應公免胄示之曰以吾之兵威視舉一寨如拉朽耳所以不急取者正欲活汝等故也守者感悟遂降墓志秋九月師次羊羅洑羊羅洑宋之要害也築堡于岸陳船江中軍容甚盛公請于世祖曰長江天險宋所恃以為固勢必死守不奪之氣不可臣請嘗之與敢死士數十百人當其前軍弟文用文忠載艨衝鼓棹疾趨士叫呼畢奮鋒交公麾衆走岸搏戰宋師大敗文用帆船報捷世祖大喜戟手上指曰天也明日渡諸軍圍鄂州會上崩閏十一月班師家傳世祖即皇帝位于上都是為中統元年上命公宣慰燕南諸道還奏曰人久弛縱一旦遽束以法危疑者尚多與之更始宜赦天下制曰可反側者遂安家傳三年山東守將李璮反據濟南璮劇賊善用兵會諸軍圍之璮不得遁久之賊勢日衄公曰窮冦可以計擒乃抵城下呼璮將田都帥者曰反者璮耳餘來即吾人毋昧取誅死也田縋城降田璮愛將既降衆亂遂擒璮璮勝兵有浙漣兩軍可二萬餘人勇而善戰主帥怒其與賊配諸軍隂殺之公當殺二千許人公言主帥曰賊由璮脅從者何罪殺之徒膏蔓土耳良乖陛下仁聖陛下往伐南詔或妄殺人雖大吏亦罪之是宜勿殺帥從之大悔巳殺者而殺之者亦自恨失計家傳璮伏誅山東賊未靖山東搖以公為山東東路經略使率親軍以行出金銀牌五十有功者聽豫閏九月公次益都留兵于外從數騎衣裳而入至府不設警衛召璮故將吏立之庭曰璮狂賊詿誤若曺璮誅死若曹為吾民陛下至仁聖遣經略使撫汝相安毋恐經略使不敢格上命不豫有功所部大悅山東安家傳至元三年上懲李璮潛弭方鎮之橫以公代史氏兩萬户為鄧州光州行軍萬户河南等路統軍副使造戰艦數百艘肄水戰預講取宋方略凡厄塞要害盡諸禦備列柵築堡深為吾利上召公密謀欲大發河北民丁公曰河南密邇宋境久藉江淮地利河北耕以供需河南戰以啓土宋平則河北長𨽻兵籍河南削籍為民便又將校素無俸稍連年用兵至有身為大校出無馬乘者臣即所部千户私役兵士四人百户二人聽其顧役稍食其力上皆從之始頒將校俸錢以秩為差家傳七年改山東路統軍副使治沂州沂與宋人接壤鎮兵仰給內郡餉餽有詔和糴本部公亟命收州縣所移文衆皆爭以違詔公曰第止之乃遣使入奏略曰敵人接壤知吾虛實一不可邉民供頓甚勞重若此役二不可困吾民以懼來者三不可上大悟仍舊和糴內郡家傳九年遷樞密院判官行院事淮西築正陽兩城兩城夾淮相望以綴襄陽以搗宋腹家傳十年拜參知政事夏霖雨水漲宋淮西置使夏貴帥舟師十萬環攻我急矢石兩下公禦之城上夜貴去復來俄飛矢貫公左臂著脅公援矢授左右發四十矢許房矢絶索矢左右又十餘發矢不繼而不能張滿遂悶絶幾殆明日水浸淫入壘麾士卻避貴乘之壓吾軍而陳公病劇子士選請代戰壯而遣之公飲痛束創手劔督戰士選與貴將搏斬貴將以戈貴將仆不死獲之以獻貴去不敢復來家傳王師大舉入宋丞相禎行中書省自襄陽東下及宋人戰于羊邏洑公以九月發正陽十一年正月會丞相于安慶安慶守將范文虎以城降公請于丞相曰行省兵既勞于羊邏洑行院兵當前行均勞宋都督賈似道禦師陳于蕪湖似道棄師走次當塗公言丞相曰采石當江之南和州對峙不取慮有後顧請先取和州許之遂降知州事王喜家傳三月有詔時向暑師宜持重行中書省駐劄建康行樞密院駐劄鎮江時真州揚州堅守不下常州蘇州既降復叛久之張世傑孫虎臣誓真揚兵先期敗不敢出世傑等陳大艦萬艘徙之焦山下江中徑卒前左公身犯前左戰士選别船而弟子士表請從公顧曰吾弟僅汝一息脫吾與士選不返士元士秀猶足殺敵吾不汝忍也士表固請乃許公乘輪船建大將旗鼓翼二子船大呼突陳諸將從之飛矢蔽日戰酣短兵相接宋人亦殊死戰聲動天地橫尸委伏江水為之不流自寅至午宋之師大敗世傑走公追及夾淮世傑收潰卒復戰又破之世傑走海公船小不可海夜乃還俘萬餘人悉縱不殺獲戰艦七百艘宋力自此窮矣家傳云又王文忠公撰墓碑淮東之役士元陳兵揚子自出搗營士元身受十七戳而卒右右祕而而不聞缺文直許至乘其表發之問其疾苦之故公一慟而止曰真吾子也冬十月王師分三道而左公由江並海趨臨安先是江隂軍僉判李世修乞降奪于勢不能來城復為宋公與之檄世修以城來令權本軍安撫使所過民不知兵凡所獲生口悉縱遣之無敢匿者以故威信前布望旗自靡張瑄者有衆數千自宋時負海陸梁公命招討使王世維及士選往降瑄士選單舸至瑄所諭以威德瑄降得海舶五百瑄後至大官家傳十三年春正月次鹽官鹽官臨安劇縣俟收不下招之一再及將佐請屠縣公曰縣去臨安不百里逺聲勢相及臨安降有成約吾殺一人將誤大計況屠縣乎于是遣人入城諭意縣降家傳公會丞相于臨安北兆張世傑欲以其主逃之海上繞出臨安城南戌浙江亭世傑計右行竊家主弟吉王是廣王顯南走而宋王顯出降丞相命公入城罷宋官府散其諸軍封庫藏收禮樂器及諸圖籍取皇帝諸璽符上之丞相丞相以宋主凱還有詔留事一委公禁戢豪猾撫慰士女宋人不知易主也時翰林直學士李槃奉詔招致宋主至臨安公謂之曰國可滅史不可滅宋十餘主有天下三百餘年其太史所記悉在史館宜悉收入以備典禮乃得宋史諸注記凡五千餘册歸之于國史院典籍氏家傳宋宗室福王與苪赴京師遍以重寶致諸貴人公峻却不取及官録與苪家具籍所致貴人重寶獨無公名丞相朝奏曰臣等奉天威平宋宋既以平懷徠安集之功臣董文炳實最諸將留事謹奉詔矣上曰文炳吾舊臣忠勤朕所素知家傳拜中書左丞時張世傑奉主弟吉王昱據台州閩中尚為宋守敕公進兵所過禁士馬無敢履踐田麥曰在庾者吾既食之在野者汝又蹂之新命何以續命是以南人不忍以兵鄉公次台世傑遁諸將先俘州民公下令曰台人首效順我不暇有而世傑據之民何罪敢有不縱所俘者以軍法論得免者口數萬薄溫州溫州未下令曰毋取子女毋掠民財皆曰諾守將火城中逃公亟令撲滅火追擒守將數其殘民之罪斬以徇逾嶺閩人扶老歡迎漳泉建寧邵武諸郡皆遞欵來凡得州若干縣若干户口若干閩人感公德最深至今廟而祀之水旱疾病禱焉家傳十四年北圉有警上將北狩正月亟召公四月公至自臨安比至上日問來期及至即召入公拜稽首曰今南方巳平臣無所效請北圉上曰所亟召卿意不在此豎子盜兵朕自撫定山以南國之根本也盡以託卿卒有不虞便宜處置以聞中書省樞密院事無大小咨卿而行巳敇主者卿其勉之公踧踖避謝不許因奏曰臣在臨安時阿里布奉詔撿括宋諸藏貨寶追索藏匿甚細人實苦之宋人未洽吾德遽苦之以財恐非安懷之道即詔罷之又曰臣有専擅之罪初泉州滿夀庚以城降夀庚素主市舶謂宜重其事權俾為我招海冦誘諸蠻臣解所佩金虎符佩夀庚矣惟陛下鑒裁上大嘉之更賜金虎符勞畢即聽陛辭家傳公凡在上都三日至大都更日至中書樞密不署中書案平章阿哈瑪特怙寵用事生殺任情惟嚴憚公姦狀為之少斂執筆起請曰相公官為左丞當署省案請至再四不肯署後或私問其故公曰主上所付託者在根本之重非文移之細且吾少徇則濟姦不徇則致讒讒行則身危而深失付託本意吾是以預其大政而略其細務也家傳十五年夏公有疾奏令解機務詔曰大都暑熾非病者冝卿可此來固當愈公至上都奏曰臣病不足領機務西北髙寒筋骸暢逸當復自愈請畢力北役上曰卿固忠孝是不足行樞密事重以卿僉書樞密院事中書左丞如故公辭不許遂拜家傳八月上生日禮成賜宴掌禮者奏公坐坐公上坐每尚食上食輟賜公是夜疾復作敇諸御醫日診視九月十二日夜疾革洗浴而坐召文用等曰吾以先人死事恨不為國死邉今至此命也願董氏世有男能騎馬者勉報國吾死瞑目言畢就枕薨上聞哀悼之良久家傳公忠實似其父人主益信之嘗曰朕心文炳所知文炳心朕所知故讒間不行而功立在軍或與長官爭事長官國人持巳見不公是公曰第上兩奏得可事乃行長官輒不敢上卒公是蓋上嘗誡長官者曰董文炳老成練事汝父行也事事聽之文炳不我負也家傳公平居不妄笑語有毅然不可犯之色立朝諤諤有古大臣風故上每論漢人功臣謂可任大事者必首公而追惜其夀止于六十二也家傳公孝友天生居母喪哀毁骨立奉祀事一遵其父而有嚴教諸弟如嚴師諸弟事之如嚴君雖貴顯如文用文忠歸休沐不敢先私室侍立終日夜不敢坐不問不敢對裘馬金帛公未嘗先御有即盡賜諸弟閨門之間肅然而諸或以過被笞皆服欵受之以改及喪公皆毁瘠踰禮而思其諸弟深賴賢兄以成之也世之言家法者比為萬石君奮家云公好讀書延禮儒士士雖賤必接以禮若金翰林學士滹南王若虛先生真定提學侍其先生軸存則師尊之沒則恤其孤而侍其提學家子孫與之婚姻至今雖在兵馬間教諸子不暫廢公退日一再至孰程其學與儒者講明聖人之道評品史事夜分乃休居官清慎家無餘財其子孫化之亦能清慎世其家家傳公薨後十餘年姦臣僧格事敗有詔董文炳子名士選者速召入上曰汝知汝父事朕否士選拜謝曰臣愚不足以知上曰若父忠勤不欺能成吾大事汝士選不必逺學學爾父足矣又嘗問士選曰汝知曹彬如何士選謹對曰曹彬云云上曰曹彬不殺降一事較之而父未足為多必欲盡書而父竹帛有幾也家傳內翰董忠穆公公名文用字彥林忠獻公之弟也初事潛邸中統初大名宣撫司奏為左右司郎中歷兵部及西夏行省郎中至元七年除山東道勸農使改工部侍郎出為衛輝路總管十九年召為兵部尚書明年除禮部尚書遷翰林集賢學士知祕書監二十三年拜江淮行省參知政事二十五年拜御史中丞明年除大司農又明年除翰林學士承旨大德元年歸老于家薨年七十四公生十年元帥公死王事于歸德母李夫人治家嚴兄忠獻公文炳教諸弟有法公內承家訓而外受學侍其先生軸故學問早成弱冠以詞賦試中真定時稿城奉莊聖太后湯沐庚戌太后使擇邑中子弟來公始從忠獻公謁太后和林城世祖在潛藩命公主文書講説帳中常見許重癸丑世祖以憲宗命自河南征雲南大理忠獻公在行公與弟正獻公文忠先在軍中督糧且贊軍務丁巳世祖令授皇子經是為北平王雲南王也又使為使召遺老于四方而內翰竇公默左丞姚公樞鶴鳴李公俊民敬齋李公治玊峰魏公璠偕至于是王府得人為盛巳未世祖以憲宗命取宋公發沿邉蒙古漢人理軍需將攻鄂州宋以賈似道吕文德將兵抗我水陸軍容甚備九月世祖臨江閲戰忠獻公請曰宋恃江為險兵力厚法當先之奪其氣臣請先公與正獻公固請偕行世祖親料甲胄擇大艦授之乃率敢死士數十百人鼓棹疾呼奮進直薄南岸諸軍亦爭進宋軍來赴戰三合三敗之公乘小舟歸報世祖世祖方駐香爐峯因䇿馬下山問戰勝狀則扶鞍起立豎鞭仰指曰天也且命傳令它師曰令各毋解甲明日將圍城既渡江會憲宗崩閏十一月師還蜀郡虞公撰行狀又遺事云公從于世祖圍鄂聞憲宗登遐猶欲待城破公一日三諫以神器不可久曠宜俟登位後以一偏師來即了江南事遂班師世祖即位建元中統公持詔宣諭邊郡且擇諸軍充衛侍七月還朝中書左丞張文謙宣撫大名等路奏為左右司郎中二年八月以兵部郎中參議都元帥府事三年山東守臣李璮叛據濟南從元帥庫庫岱統兵伐之五月而克其城璮既誅山東平元帥公率還都元帥阿珠奉詔取宋召公為屬吏辭曰新制諸侯總兵者其子弟勿復任兵事今怕兄以經略使總重兵鎮山東我不當行帥曰潛邸舊臣不得引此為説公病不行行狀至元改元召為西夏中興等路行省郎中中興百渾都海之亂甫定民間相恐動逃匿山谷而省臣方入奏同僚不知所為公曰宜鎮以靜乃為書置道諭之然後粗安始開唐來漢延秦家等渠墾中興西涼甘州瓜沙等州之土為水田若干于是民之歸者户四五萬悉授田種頒農具更造舟置黃河中受諸部落及潰叛之來降者時近屬貴人曰哲伯特穆爾者鎮西方其下縱橫需索旁午不可會計省臣不能支公坐幕府輒靣折以國法其徒積忿譖公貴人怒召使左右雜訊之意叵測公曰我天子命吏請得與天子所遣傅貴人者辨天子所遣傅貴人者中朝舊臣嘗事莊聖太后來詰問公不承貴人旨意狀公曰我漢人生死不足計我所恨者仁慈寬裕如貴人以重威鎮逺方而其下毒虐百姓凌暴官府傷貴人威名於事體不便因縷指其不法者數十事詰問者驚起白貴人即召公謝之曰非若郎中我殆不知郎中持此心事朝廷宜勿怠自是譛不行而省府事粗立二年入奏經略事宜還以上旨行之中興遂定行狀八年立司農司授公山東東西道巡行勸農使山東民吏叛亂多曠土公巡行勸勵無間幽僻入登州境見其墾闢有方公為詩表異其守移刺某於是列郡咸勸地利畢興五年之間政績為天下勸農使之最行狀十二年丞相安圗公奏公為工部侍郎代赫舍哩赫舍哩阿哈瑪特私人也其徒間安圗公罷政即使鷹監奏曰自赫舍哩去工部侍郎不給鷹食鷹且瘦死矣上怒趣召治之因急逮公入見上望見曰董某顧為爾治鷹食者耶置不問財令取給有司行狀十三年出公為衛輝路總管佩金虎符郡當要衝民為兵者十九餘皆單弱疲病不任力役會初得江南圖籍金玉財帛之運日夜不絶于道警衛絡繹日役數千夫公爽然憂之曰吾民弊矣而又重妨穡事殆不可乃從轉運主者言郡邑胥校足備用不必重煩吾民也主者曰公言誠然即行公言事萬一有不虞罪將誰歸公即為手書具官職姓名保任之民得以時耕而運事亦稍有具者諸郡運江淮粟于京帥衛當運十五萬公曰民籍可役者無幾且江淮舟行風水不時至而先疲吾民以期會是未運而民已憊矣乃為集旁郡通議立法驛置民力以紓十四年以職事詣汴河司方議通沁水北東合流御河以便漕者公曰衛為郡地最下大雨時行沁輒溢出百十里開而更甚水不得逹于河即浸淫及衛今又道之使來豈惟無衛將無大名長蘆矣會朝廷遣使相地形上言衛州城中浮屠最高者才與沁水平勢不可開也事得寢不行為郡多善政民有去思碑行狀十六年受代歸田里茅茨數椽僅避風日讀書賦詩怡然燕居裕宗在東官數為臺臣言董某勳舊忠良何以不見用也十八年臺臣奏起公為山北連東道提刑按察使不赴行狀十九年朝廷選用舊臣召公為兵部尚書自是朝廷有大議未嘗不與聞二十年江淮省臣有欲專擅而忌亷察官者建議行臺𨽻行省狀上集議公議曰不可御史臺譬之卧虎雖未噬人人猶畏其為虎也今司憲僅在紀綱猶不振一旦摧折之則風采暗然無可復望者矣又曰前阿哈瑪特用事時商賈賤役皆行賄入官及事敗欲盡去其人廷議以為不可使阿哈瑪特售私恩而朝廷驟斂怨也乃使按察司劾去其不可者然後吏有所憚民有所赴訴則是按察司者當飭勵之不可摧抑也乃悉從公議行狀轉禮部尚書遷翰林集賢學士知祕書監時中書右丞盧世榮本以貨利得幸權要為貴官陰結貪刻之黨將錙銖掊斂為公乃建議曰我立法治財視常嵗當倍增而民不擾也詔下會議人無敢言者公陽問曰此錢取諸右丞家耶將取之民取諸右丞家則不敢知若取諸民則有説矣牧羊者嵗嘗兩剪其毛今牧人日剪其毛而獻之則主者固恱其得毛之多矣然而羊無以避熱即死且盡毛又可得哉民財亦有限取之以時猶懼其傷殘也今又刻剝無遺毳猶有百姓乎世榮不能對丞相安圗公從坐中謂君曰董尚書真不虛食俸祿者議者出皆謝公曰公以一言折聚斂之臣而厚邦本仁人之言其利溥哉豈不信然世榮竟以是得罪行狀二十二年拜江淮行中書省參知政事公力辭上曰卿家世非它人比朕所以任卿者不在錢穀細務也卿當察其大者事有不便第言之公遂行行省長官者素貴倨多傲同列莫敢仰視跪起稟白如小吏事上官公則坐堂上侃侃語論是非可否無所遷就雖數忤之不顧也有以上命建浮屠于亡宋故宮者有司奉行迫急天大雨雪入山伐木死者數百人而猶日督迫不休公坐中謂其人曰非時役民民不堪矣少徐之如何長官曰參政奈何格上命公曰非格上命也今日重困民力矣民心豈上意耶然竟得少紓其程二十三年將用兵海東徴斂益急有司為姦日益甚公曰吾力不足以口語勝矣乃請入奏事大略言疲國家可寶之民力取僻陋無用之小邦其條目甚悉言上事亦罷行狀二十五年拜御史中丞公曰中丞不當理細務吾當先舉按察使乃舉胡公祗遹王公惲雷公膺荆幼紀許揖孔從道十餘人為按察使又舉徐公琰魏公初為行臺中丞當時以為極選方是時僧格當國用事寵舉方熾自近戚貴臣見僧格皆屏息遜避無可誰何公以舊臣任御史號不易為僧格令人風公贊巳功于上前公不答又自謂公曰百司皆具食丞相府獨御史臺未具食丞相府公又不答屬朔方軍興糧糗粗備而誅責愈急公謂之曰民急矣外難未解而內戕其根本丞相宜思之于是逺近盜賊蜂起公持外郡所上盜賊之目謂之曰百姓豈不欲生飬安樂哉急法苛斂使至此耳又謂之曰御史臺所以救政事之不及丞相當助之不當抑之也御史臺不得行則民無所赴訴而政日亂將不止臺事不行也浸忤其意益深乃托拾臺事百端公日與辨論不為屈於是具奏僧格姦狀詔報公語密外人不知也僧格日譛于上曰在朝惟董中丞戅傲不聽令沮撓尚書省請痛治其罪上曰彼御史職也何罪且董某端謹朕所素知汝善視之行狀遷大司農時欲奪民田為公田公固執不可則又遷公為翰林學士承旨二十七年隆福太后在東宫以公耆舊欲使公授皇孫經具奏上以上命命之每講説經旨必傅以國朝故實叮寧譬喻反覆開悟故皇孫亦特加崇禮焉行狀三十一年上命公以其諸子入見公曰臣蒙國厚恩死無以報臣之子何能為命至再三終不以見是嵗世祖升遐成宗將即位于上都太后命公從行既即位巡狩賽音布拉克奏曰先帝新棄天下陛下逺狩不以時還無以慰安元元宜趣還京師且臣聞人君猶北辰然居其所而衆星拱之不在勤逺略也上悟即日可其奏是行也上每召入帳中問先朝故事公亦盛言先帝虛心納賢開國經世之務談説至夜半公自先帝時每侍燕與蒙古大臣間列裕宗嘗就榻上賜酒使毋下拜跪飲皆異數也上在東宫時正旦受賀于衆中見公召使前曰吾鄉見至尊其憐汝輒親取酒飲之至是眷賚至渥賜鈔三百錠行狀是年詔修世祖實録公於祖宗世系功德戚近將相家世勳績皆記憶貫穿史館有所考證質問公應之無所遺失行狀公性孝友四時祭祖禰輒思慕感愴如將見之事伯父如事父教子弟嚴而有禮為學以誠實為主本故其文章議論皆質直忠厚不為華靡其從政寬裕慈愛簡于細務至于謀大事決大議則剛毅正直磊落可觀歷事三朝每以忠言正論為己任故言事上前必引古證今從容盡達其藴而後已平居聞朝政有一未善輒終夜不寐倚壁歎恨不置曰祖宗艱難成立之天下豈可使賊臣壞之故每與朝議即奮言不顧危禍以片言折權姦定國是者不可勝紀朝廷賴之在御史臺行中書省時所遭皆大姦劇惡每恨公不順己計萬方欲殺之公一不以為意曰人臣在位豈愛身茍容而上負國家下負生民乎公仕宦三十餘年凡一拜命䘵俸之餘盡以買書而家無饘粥之資卒賣其京城之宅以償債貸逮薨之日惟有祭器書册而巳其好賢樂善尤出天性雖待下士必盡禮至老且貴終不倦人有善必舉之而名公大人聞公所薦亦必曰出董公門佳士也故天下之士爭歸之與人謀主忠欵故國人有為使逺方若出而領兵治民者必來受教而後行公為開導訓誨足以歆動其意故有欣然聽之終日而忘去者蒙古大臣見之必曰此故老也皆改容待之嗚呼可謂忠厚誠實君子者矣行狀樞密董正獻公公名文忠字彥誠忠穆公之弟也初事潛邸中統元年置符寶局除符寶郎至元十八年升局為典瑞監遂除典瑞監卿未幾拜僉書樞密院是嵗薨年五十二憲宗即位明年壬子公年二十有二始入侍世祖潛藩承旨王文康公鶚言詩教問公能乎對曰臣少讀書唯知入則竭力以事父母出則致身事君而已詩非所學姚公牧庵撰墓碑癸丑從征南詔己未伐宋王師臨江與兄忠獻公文炳故翰林承旨文用率勇士乘小舟求先濟教遣他將舟帥繼之與戰三捷得駁艨百艘遂進圍鄂墓碑上正宸位置符寶局以公為郎居益近密上嘗不名唯第呼董八亦異數也而不為容悅隨事獻納墓碑至元二年安圗以右丞相入領中書建陳十事言忤天聽公曰丞相由勳閥王孫夙以賢聞今其始政人方延佇傾耳而所請若是後何以法乃為從旁代對懇悃委曲如自條疏者始得聞可墓碑八年侍講徒單公履欲行貢舉知上于釋崇教抑禪乘是隙言儒亦有是科書生類教道學類禪上怒已詔先少師文憲公司徒許文正公與左右相廷辨公自外入上曰汝日誦四書亦道學者公曰陛下每言士不治經究心孔孟之道而為賦詩何關修身何益治國由是海內之士稍知從事實學臣今所誦皆孔孟言焉知所謂道學哉而俗儒守亡國餘習求售巳能欲錮其説恐非陛下上建皇極下修人紀之賴也事為之止君子以為善于羽翼斯文墓碑十一年以太師南伐民困供億奏蠲常嵗他名之征後燕見降將明宋所由以亡皆因賈似道當國薄武人而唯文儒之崇武人怨之後太師至外而疆埸內而京師莫有鬬志釋甲投戈歸命恐後王問公此言何如公曰似道薄汝而君上則爵以貴汝祿以富汝未嘗汝薄也而以有憾而相移怨而君不戰而坐視亡國如臣莭何似道薄汝豈亦逆知汝曹不足恃為一旦用乎上深善之墓碑公嘗進言以崇本抑末所以劭農今治官四列以求贏利至鋤鎛之屬亦皆市鬻于耕者非便詔遂罷之又言職虞者將盡徙獵户無慮數千戍郢中往往質妻賣子哭聲震路或自經死實單弱不中徙徒紛擾無益詔止之涿郡盧公撰墓志時患多盜勑茍犯皆殺無赦在在繫纍充行獄公乃言今殺人于貨與竊取一錢以上鈞死一斷不屬􅉃默莫甚恐于陛下致祥之氣好生之德多所干傷敕革之墓碑或告漢人毆國人傷或告太府監屬盧摯盜斷監布上命殺以懲衆公言今刑曹于囚罪入死者巳有服辭猶必詳讞是事未可因人一言遽置重刑宜付有司簿責閲實以俟後命乃遣近臣秉公核毆傷公核監布告毆得誣杖遣之監布蓋太府始受端外皆有羡尺適尚方上官有需其入潛毁成端斷羡以給非身利而為也降旨原之責侍臣曰方朕怒際卿曹皆結喙非董八啓沃朕心則殺是非辜必竊取議中外矣賜金尊曰用旌卿直儲皇亦曉宫臣曰方壓以雷霆而容止話言暇不失次卒矯以正真人所難能者太府屬摯而謝曰鄙人腰領賴公以全公曰吾雅非知子其必拯諸阽危者蓋為國平刑實非期子見德也其返而摯墓碑自安圗北伐阿哈瑪特獨相盜弄威福衆立親黨懼平章亷希憲復相必妨其私表以右丞行省江陵者踰年公奏希憲昭代名臣今端揆虛席不可久使居外以孤人望冝早賜環從之墓志十六年十月還自萬夀宫祝釐所奏曰陛下始以燕王為中書令樞密使才一至中書復册儲皇纍使明習軍國事者十有餘年終守謙抑非不奉明詔也亦朝廷處之未極其道夫事已奏裁而始啓白為人臣子惟有唯默避任不敢以令可否制勑而已以臣所知曷令有司啓而後聞其有未安斷以制敕則理順而分不踰必不敢辭責元良矣其日盡前省院臺臣將百人上面諭曰自今庶務聽皇太子臨決而後入聞墓碑禮部謝昌元請立門下省封駁制敕以絶中書風曉近習奏請之源上鋭欲行之詔廷臣雜議怒承旨王公磐曰如是益事汝不入告而使南宫後至之臣言之用學何為必今日開是省廷臣三日始奏公為侍中兼其屬多至數十人其臣勿便也入言陛下將别置省斯誠其時得人則可寬聖心以新民聽今聞盜詐之臣與居其間言多目公公急辨曰上每稱臣不盜不詐今汝顧臣而言意實在臣其顯言盜詐何事上出奏者公猶訴不止且攻其賊國之姦上曰朕自知之彼不汝言也然終忌公得君清慎無過莫可指以為報者乃以楮鏹萬緍為夀求交歡擯棄不取墓碑忠獻公卒官中書左丞故太傳巴延公表其可相上使嗣為公曰臣兄有戡定南土之勞位是則可臣給事居中宣何力焉而可嗣為墓碑十八年升局為典瑞監郎為卿俄僉書樞密院事卿如故而不從蹕留居大都凡宫禦城門直舍徼道環衛營屯禁兵太府少府軍器尚乘等監皆領焉兵馬舊𨽻中書併付公將權臣纍請奪還中書不報墓碑冬十月某日雞鳴將入朝忽蹎家庭氣息奄奄上遣中使持藥救之不及遂絶傷悼不已猶覬其息勑勿速斂五日乃匶且知公圖書外無他居積賻錢數千萬歸葬其鄉自始至終實三十年征伐搜田無地不從凡乘輿衣服鞶帶藥餌小大無慮百數十槖靡不司之中夜有需不以燭索可立至前風雨寒暑飢渴駿奔心無怠萌口絶勩語屬屬乎惟以執事不恪獲譴為懼故能滋久眷寵彌深為臣則然其在家出門弟弟敦宗賢賢信友淵毅而明炳遜恭而易直倫理之間人文燦然元臣故老奉朝請者上所存問及有欲崇皆由公傳逹權臣不敢讒危之及是則皆出涕几筵曰哀哉若人曽未中夀而不淑自兹君側失正人矣一貴戚獨曰天乎世無吾曹一人誠不加少而奪公歸耶即至庸人販夫亦失聲投業墓碑公于誅賞大政往往預聞是非豫奪毅然不回要歸公論晦顯略詳常簡宸衷其見幾慮遠時然後作使天下被澤無遺衆所未及知而上獨知之者此亦不得而論也故上嘗語皇太子曰竭誠許國能于大事多所建明者惟董文忠為然墓志元名臣事略卷十四
