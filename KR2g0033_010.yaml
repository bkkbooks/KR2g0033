body:
  text: 元名臣事略卷十元蘇天爵撰尚書劉文獻公公名肅字才卿汴州洺水人金興定中登進士第國初為東平嚴侯幕官歲壬子應召北上授邢州安撫使中統元年拜真定宣撫使明年召為右三部尚書兼議中書省事四年致仕仍議中書省事是歲卒年六十公幼氣孱年十六始舉屬句缺稿借抄年許便能從諸生習為程文下筆皆有理致中興定二年詞賦進士第辟新蔡令始入其境彌望皆蒿萊問其故則曰近歲征賦率以牛力為差民多匿牛於它所而不得耕至縣適賦夏稅乃平其輕重以為定額揭榜境內曰有能種樹牧養創運興造續有增置者更不加賦行之再稔荒田耕墾殆盡畜牧遍野比秩滿入為尚書省推掾屬刑禁會內藏庫吏告本庫官屬盜羅者復有盜入宫竊內藏珠者金主怒敕令窮治有司捕盜不能獲推訊京市買珠者但指前庫吏盜珠貨已久願代償他珠而原盜羅又不獲二事逮及十一人刑部大理皆欲處次極刑宰相以下莫敢異同公獨執而不報以為本捕之賊物非正贓而欲置人於死恐涉寃枉皆當駁出辨論月餘咸釋出之平章宋公撰墓志汴梁下公挈家入東平嚴武惠公招致幕下署行尚書省事外即改行軍萬戶府經歷東平歲賦丁絲包銀而復輸蛾繭十餘萬兩色絹萬匹民不堪重公白武惠奏而罷之諸路復綿絹自此始漕渠決河間散水口役夫萬人東平獨膺十之四主役者且築且穴工無已時公白武惠曰此我之劇疾也數其慢不時塞請於朝即減其役尋罷之軍儲糧歲輸新衛東平水運萬石至舊衛再輦而南五十里公具圖言於朝乞立衛州倉朝議從之公在東平二十年贊畫為多高文定公撰墓碑聖上初在潛邸以介弟之親輔政先朝鋭意太平徴聘四方宿儒俊造賔接柄用以更張治具立安撫司于邢爬疏蕪穢立經略司于汴開斥邊徼立宣撫司于秦保釐封國公首膺邢州之選自金干戈擾攘土豪崛起惟知聚斂孰為法度程式公到郡公私闕乏日不能給遂興鐵冶以足公用造楮幣以通民貨車編甲乙受領而傳馬給圉戶恆奉而馹官舍既修賔館得所川梁倉庾簿書期會羣吏涖守惟謹四方傳其新政焉墓碑上即位勵精為治置十路宣撫司以總天下之政公治真定真定行用銀鈔奉太后旨交通燕趙以及唐鄧之間數計八千餘中統新鈔將行銀鈔之價頓虧公私囂然不知措手公言救之之術有三舊鈔不行下損民財上廢天子仁孝之名依舊用行一也新舊兼用二也必欲全行新鈔直須如數收換庶幾小民不致虛損三也省議是之從其第三䇿城西南有隄堰歲久缺壞公行視急修之撤洳易土植栁其上秋果大雨滹沱水至無害郡人德之墓碑二年公被召議立省部首拜右三部尚書一時典憲多出公手尋有旨兼議中書省事是年以年老求退上曰卿耆年宿德飽諳政事宜立範模使後人易於遵守朕之意也可無辭明旦復上章請老始許以本官致仕仍給半俸終身議中書省事如故墓碑公喜論天下事軍國之大計米鹽之細務罔不周知辭間理順未嘗疾言遽色惟善是欲不滯於一已之私自中統以來右曹之任以通方得名者獨公一人焉墓碑平章宋公公名子貞字周臣潞州長子人國初為東平行臺幕官中統元年拜益都宣撫使召為右三部尚書王師圍濟南參議行中書省事至元二年拜翰林學士參議中書省事未幾拜平章政事三年以年老辭位詔中書大事即其家議之是年薨年八十公貌清竒耳聳逼眉一寸許相者以為必壽且貴資敏悟學如夙習弱冠工文賦隨薦書試禮部同族兄缺柔補太學齊名一時有大小宋之名太常徐公撰墓志集又東平吳公疏堂公未為進士時嘗試禮部出與二舉子過相者李茂而問焉茂謂二人者皆擢甲科一人無官一不過為縣主簿徐指公謂曰不及第官一品壽八十後皆加其言貞祐板蕩公避地河南居無何復還鄉里潞州亂東走趙魏間宋將彭義斌據大名召為安撫司計議義斌殁偕衆歸國朝東平行臺嚴魯公聞其名招置幕府置詳議官兼提舉學校相嚴行臺上計間度多經由近侍奏決至與丞相耶律公有違言公勸行臺致禮道時好每事咨稟一不敢專耶律公喜亦深相接納中外交歡諸權鎮重行臺因是益倚信公墓志歲壬辰行臺戍黃陵金兵悉力來攻我師不利敵勢鴟張曹濮以南皆震懾有自敵中逃歸者敵且至人情洶洶公請行臺斬橫議者首以令諸城境內復安繼而汴梁潰飢民北徙殍殣相望公議作廣厦糜粥以食之復以羣聚多疫人給米一斛俾散居近境所全活無慮萬計及士之流寓者悉引見行臺用惠尤厚薦名儒張特立劉肅李昶輩十餘人皆自羈旅援之同行與參謀議四方聞義而來依者館無虛日故東平人物視他鎮為多墓志乙未受朝命遷右司郎中行臺所轄五十餘城仍有堡寨諸戶自守令以下皆大偏小校崛起田畝不間禮法其從政官吏相與為囊槖以病民是時天下略定庶事草創征斂之繁營屯之擾法度未立民不安生公謂十羊九牧民窮而無告乃倣前代設觀察采訪之比分三道按刷文檢均科賦稅糾舉官吏公居中主其事於是初立程式與為期會黜私奬勤視其後者而鞭之吏民始知有官府之政撫治之道焉東平一道二十餘萬戶生口不啻百萬所以安居暇食得享有生之樂者公之功也尚書李公撰神道碑時諸將校例有部曲戶謂腳寨幾四百所各擅賦役公請罷歸州縣行臺初難之既而改令歸一人以為便墓志行臺薨子忠濟襲爵以公耆德宿望表於朝授參議東平路事兼提舉太常禮樂公倡新廟學敦命前進士康曄王磐為教官自先聖顔孟子孫至生徒幾百人咸繼庖廩俾肄藝業春秋釋奠隨季程試必親臨之齊魯儒風為之一變墓志建又高唐閻公文集云國初嚴侯忠濟首郡學延康先生曄為之師四方來學者甚衆先生家髙唐歲歸拜掃先塋學生王伯祥者一夕夢與諸生郊迎先生於北郭外陳家橋同輩方聚立橋南遙望先過橋北者皆衣金紫夢中殊駭異覺即語同舍其後十餘年罷侯置守始定朝儀右官華服凡夢中所見衣金紫者果至通顯如翰林徐公李公謙總管丞孟侯褀尚書張公孔孫瓜爾佳公之奇右丞馬公紹中吳公衍凡十餘人其立橋南者皆泯沒無聞焉己未夏上南伐遣使聘至濮虛已以問公對曰本朝威武有餘仁恩未洽天下之民嗷嗷失依所以拒命者特畏死爾若投降者不殺脅從者勿治則宋之百城馳檄而下太平之業可指日而待也上善其言禮遇甚厚神道碑中統建元授益都等路宣撫使未幾入覲拜右三部尚書會創立省部一時典章制度多公裁定奪上以公知兵詔參議軍前行中書省事公單車至戰壘觀形便遂以䇿上丞相史公自今璮賊擁衆東來送死孤墉此天與我也宜急增築外城俾不得走突則勢日窘食盡援絶不攻而自潰矣議與史公合遂擒璮墓志凱還公上便宜十事大略謂官爵人主之柄當自朝廷出一命以上並付吏部以為永選律令國之紀綱今民所犯各由所司輕重其罪宜卒刋定明頒天下使官知所守民知所避且監司總統一路之政所用猥雜不厭人望乞選公廉有才德者俾居其職臨民官皆相傳以世非法賦斂困苦無告亦宜遷轉以革久弊又立國學教胄子敕州郡提學課試諸生凡三年一闢貢舉中第者入仕則人材輩出矣詔命中書施行之墓志至元二年罷世襲官初行遷轉法詔公同左丞相耶律公按行山東調選所部長次官墓志還朝改翰林學士參議中書省事復奏乞頒吏祿定職田以養廉勤而戒貪惰從之墓志拜平章政事因陳切於時務者十三䇿上皆嘉納焉悔用公晚公以年老懇辭上曰卿精力未衰勉為朕留措置大事毋苦引年第令百司有倫序即聽卿自便墓志三年十一月乃得請特敕中書凡有大事即其家訪問公居私第每聞公家事有不宜於民者猶削牘封奏之其拳拳愛君之心老而彌篤始得寒疾汗之不解家人將進劑公曰死生有命將餌藥何為疾革諸子請遺言公曰汝輩皆長立平昔教之者為不少尚何言耶墓志參政楊文獻公公名果字正卿祁州蒲隂人金正大初登進士第國初為河南課稅及經略司幕官中統元年拜北京宣撫使明年入拜參知政事至元六年出為懷孟路總管其年薨年七十三公性聰敏為文無所不能尤長於樂府幼失怙恃從人南渡嶇﨑轗軻十餘年自宋遷亳自亳遷許昌以教讀為正大甲申擢進士第會參政李蹊行大司農於許公以詩送之李大嗟賞歸言於朝舉偃師令到官數月以廉幹稱改令蒲城陜縣皆號繁劇而公優為之方將書考上上而陵谷變遷矣歲己丑楊公奐徵收河南課稅起公為經歷官繼而萬戶史侯經略河南復為參議公於革創之際俱稱辦事未幾朝廷設十道宣撫以公使北京中書省立拜參知政事公外若沈默內藏諸用其所裨益為多及例罷猶詔與左丞姚公日赴省議事至元己巳出守懷州公時年七十有三矣王文康公文集又楊升能事言狀云楊正卿為人美風姿工詞翰避亂河南草娶於羈旅中爾後登科歷職遂與之偕老當此之時一人無罪出數妻必欲富貴而又有貌者嗚呼君子哉正卿中統初無斥其名某相當國自洛陽起西菴楊公宣撫遼西既至任事公為喻云回婦越商相為室家言説不能道盡也為圖令以意求之十才得其一二每夕回婦焚香祝天雪泣而言越商亦不知也鄰有曉回語者潛聽釋之云注祿神官獨不能逺以從近也耶傳至廟堂諸公笑之數日齒冷其明年公入大參牧菴文集尚書祝部會驗舊例內外自行移親王宰相不署姓執政署姓解亦不書名實古禮尊賢嚴德之義照得懷孟路總管楊少中係前執政官見申部文解書名似或於禮未宜乞依舊例止書姓不書名尚書省依至元七年十月國朝典章公判河內嘆廟學卑陋創為禮殿五楹塑先聖先師洎十哲像事之未幾公請老而去野齋李公文集宣慰張公公名德輝字耀卿冀寧交城人國初為丞相史忠武王幕官尋召居潛邸中統元年拜河東宣撫使入拜翰林學士參議中書省事出為東平宣慰使出僉山東行省復召參議中書省事表乞致仕未幾起為侍御史遂致仕歸至元十一年卒年八十公資頴悟自童孺便覺凝然如成人弱冠有聲場屋間四赴廷試貞祐兵興家業蕩盡以世故試補御史臺掾時有盜殺卜者有司蹤迹之獲僧匿一婦人畏搒掠誣服云嘗以私謀質問故殺以塞口獄具待報公疑其寃其後果得賊趙禮部秉文楊户部慥器其材交口薦譽其所遊者雷李元白皆當世名士汲郡王公撰行狀汴都下北渡僑居成安縣故相史公開府真定聞其名聘充經歷官乙未從開府南征凡籌畫調度倚公為重軍士多避役亡去獲必戮以厲餘者公極言其不可後配之守城而已光州下蓽山農民團結為固開府令攻之公曰鄉民為自保計當以禍福開諭如或旅拒加兵未晚從之皆相繼來降全活者不可勝計師還兼提領真定府事板蕩後民耗弱不任差役官從胡商貸子錢以充貢賦謂之羊羔利歲久商來責所負例配徴民伍有破産不能償者公言於開府請於朝止一本息付之又料民定其等第賦稅之輸豪富者先之而貧窮者得比末減升真定府參議興滯補弊多所裨益由是聲望隆於諸鎮而上達於闕庭矣行狀上在王邸歲丁未遣使來召既見王從容問曰孔子沒已久今其性安在對曰聖人與天地終始無所往而不在王能行聖人之道即為聖人性固在此帳殿中矣王曰或云遼以釋廢金以儒亡有諸對曰遼事臣未周知金季乃所親見宰執中雖用一二儒臣餘則武辨世爵若論軍國大計又皆不預其內外雜職以儒進者三十之一不過閲簿書聽訟理財而已國之存亡自有任其責者儒何咎焉王悅乃詢以祖宗法度具在而未施設者甚多將若之何公指御前銀槃曰創業之主如制此器精選白金良匠規而成之畀付後人傳之無窮今當求謹厚者司掌乃永為寶用否則不惟缺壞恐有竊之而去者王良久曰此正吾心所不忘也又訪中國人材公因舉魏璠元好問李治等二十餘人王屈指數之間有能道其姓名者王問農家亦勞何衣食之不贍對曰農桑天下之本衣食所從出男耕女織終歲勤苦擇其精美者輸之官餘粗惡者將以仰事俯畜而親民之吏復橫斂以盡之民則鮮有不凍餒者矣戊申公釋奠致胙於王王曰孔子廟食之禮何居對曰孔子萬代王者師有國者尊之則嚴其廟貌修其時祀其崇與否於聖人無所損益但以見時君尊師重道之心何如耳王曰自今而後此禮不廢王又問曰今之典兵與宰民者為害孰甚公曰典兵者軍無紀律專事殘暴所得不償其失宰固為重若司民者頭會箕斂以毒天下使祖宗之民如蹈水火蠧亦非細王默然良久曰然則奈何公曰漠若更選族人之賢如今昆布哈者使主兵柄勳舊如實都爾古者使主民政則天下皆受其賜矣其年夏公得告將還因薦白文舉缺之趙元德李進之髙鳴李槃李濤數人陛辭又陳缺擇人材察下情貴兼聽親君子信賞罰節用度規戒於王公在朔庭期年每進見延訪聖人道德之旨修身治國之方古今治亂之由詳明切直多所開悟故呼字賜坐賚賜之禮殊渥行狀公奉旨教胄子博囉瑪勒及修理鎮之學宫內外焕然一新會生徒行祀禮衣冠濟濟有承平之舊郡邑化之文風翕然為振行狀壬子公與元好問北覲奉啓請王為儒教大宗師王悅而受之繼啓纍朝有旨蠲免儒户兵賦乞令有司遵行王為降旨仍命公提舉真定學校行狀王即皇帝位起公為河南北路宣撫使汾晉地廣物衆官世守吏結為朋黨侵漁貪賄以豪強相軋其視官府紀綱及民疾苦殆土苴然而貧弱寃抑終莫得伸公下車逮其姦賊之甚者若太原石林氏平陽段李河中呼察和斯等數十人械庭下數其罪惡杖而出之于是搜剔吏弊遴選官屬庶政一新所部肅然訟牒日以百數胥吏疲於傳命公隨見隨決剖析以理折衷於法皆情得而去吏但受成而已耆耋不逺數百里來觀至以手加額云六十年不期復見此太平官府吏民戴之若神明焉歲歉民乏食請于朝發常平粟貸之及減其租稅有差河東賦役素無適從官吏囊槖為姦賦一征十民不勝其困苦故多流亡公閲實户遍均其等第出納有法數十年之弊一旦革去西川元帥耨埓重取兵一千一百人守吏畏其威莫敢申理𨽻鳯翔屯田者八百餘人屯罷兵不歸籍會僉防戍兵河中浮梁故有守卒不以充數公皆條奏之上可其請兵後貧民多依庇豪右及有以身傭藉衣食歷年滋久掩為家人驗籍質券悉出之為民文水白氏婦嘗鬻二子以償長男徒罪之贓公至翻異之究其情以鬻子故取公使錢贖還之行狀二年春考績於京師為十路最陛見上勞之命疏時所急務具四事以奏一曰嚴保舉以取人所以絶請託而得可用之才二曰給俸祿以養亷能所以禁贓濫不使侵漁子民三曰易世官而遷都邑所以考治績革舊弊而攄民之寃四曰止刑罰而勿屢赦所以絶幸民息盜賊而期於無刑皆深切時事上嘉納焉拜東平路宣慰使東平巨鎮也其政賦獄訟之繁視河東為倍蓰如李祐之缺劉蒙格楊竒􅚕之贓姦皆窮其根株不少貸方春旱種不下祈於泰山一夕甘澍沾足宣慰使巴拉同知保赫鼎其下崔彥等數十人假其權勢干擾庶政公廉知繫之獄彼力為營救公怒曰君欲黨姦人而違制令乎竟抵之罪每一字必與同署周折三數乃得施行彼雖有後言中心自畏服焉巴拉以盜賊充斥獲者欲處以死公曰吾豈敢曲從加妄殺乎巴拉密以聞有旨張耀卿所言準合條例可從之奏免逺輸豆粟二十萬斛和糴粟十萬斛保赫鼎議欲官賦繭絲令民稅之而後輸公曰是無上以毒下也且輸納後期之責孰任之遂罷其事有寡婦馬氏將鬻其女以償逋賦分已俸代之奏蠲其額行狀至元三年秩參政中書省事宰相傳旨令坐都堂議事凡軍國大政必咨訪而後行有旨令趙彛使日本命都堂議敕髙麗詔以進公曰趙彛本宋人萬一所言不實恐妄生邊釁貽笑逺邦明日同宰執奏之遂止行狀五年春起公待御史同平章塔齊爾行御史臺辭不拜有言沿邊將校冒功軍士虛耗廩弊者上怒敕使按治仍以其事諭公陳奏公奏在昔將校備嘗艱阻與士卒同甘苦今年少子弟襲爵或以微勞進用豈知軍旅之事乎致朝廷敕使覆按此省院素失約束耳若悉痛繩以法則人不自安今但易其部署選武毅有才略者任之則軍政自新時委風憲官體察量革其弊宰執傳旨命公議御史臺條例公奏曰御史執法官今法令未明何據而行此事行之不易又難久陛下宜慎思之後數日復召公曰朕慮之已熟卿當力行對曰若必欲行之乞立宗正府以正皇族外戚得以糾彈女謁無令妄奏諸局承應人皆得究治上良久曰可徐行之公以衰老懇辭命舉可任風憲者公手疏烏庫哩貞張邦彥圗克坦公履張缺張肅李槃張昉曹椿年西方賔周正士逸民王博文列郁孫汝楫王琿胡祗道周砥李謙魏初鄭扆等以聞又乞致仕許之行狀公天資剛直博學有經濟器容色毅然不可犯望之知為端人正士遇事風生果於斷決庭議剴切矯矯然有三代遺直其奬善良疾姦惡革弊政美風化常懷濟時行道盡忠所事以實惠及民成敗利鈍初不計恤其兩鎮巨藩再入中書雖權貴素以嚴厲稱者與之相往復論難不毫髮相假貸時或齟齬其耿耿自信氣終不下既為上所深知凡大政令必咨決焉論者謂省臺肇建進司儒學開太平之基公實為啓迪之先故譖毁不行才退復召終始眷顧之禮不少衰焉上問巴拉張耀卿曾受賂否曰若言其受賂豈不畏上蒼乎與人交重然諾不戲言笑在尊俎間亦以禮法自持故元遺山呼為畏友親舊不敢干以私恤患難周困乏至質衣與書無難色儒士宋子昭羈於豪權家言於上官出之蜀儒古生售於缺鳩銀贖缺仍給缺為良張新軒子琥已結婚無以成禮資俸以婚屢與遺老敬齋遊封龍山時人目為龍山三老云行狀元名臣事略卷十
