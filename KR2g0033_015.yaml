body:
  text: 元名臣事略卷十五元蘇天爵撰國信使郝文忠公公名經字伯常澤州陵川人召居潛邸嵗己未扈從濟江授江淮宣慰司副使中統元年拜翰林侍讀學士充國信使奉使于宋宋人留于真州凡十六年始得歸卒年五十三公幼不好㺯沈厚寡言金季亂離父母偕之河南偕衆避兵潛匿窟底兵士偵知燎煙于穴爝死者百餘人毋許亦預其禍公甫九嵗暗中索得寒遺一瓿按齒飲母良久乃蘇其卓異見於童稚若此髙唐嚴公撰墓志金亡北渡僑寓保定亂後生理狼狽晨給薪水晝理家務少隙則執書讀之父母欲成其志假館于鐡佛精舍俾専業于學坐達旦者凡五年蔡國張公聞其名延之家孰教諸子蔡國儲書萬卷付公管鑰恣其搜覽公才識超邁務為有用之學上泝洙泗下逮伊洛諸書經史子集靡不洞究掇其英華發為議論髙視前古慨然以羽翼斯文為己任自是聲名籍甚藩帥交辟皆不屑就墓志又撰保定苟公誦行狀云公嘗自誦曰下學是學干請非學蓋達必先天下之憂窮必全已之志豈取科第如韋如脂為碌碌之役而已耶故恆以興復斯文治天下為己任讀書則專治六經伊洛之學一以窮理盡性修已治人為本其餘皆視而不屑也世之為詞章學始則羣訕笑終亦拱視而服之矣江淮趙先生曰江左為學讀書如伯常者多然似伯常挺然一氣留天地之間者亦鮮矣世祖在潛邸羅致異􅖡挹其風遣使者一再起公既奉清問上稽唐虞下逮湯武所以仁義天下者緩頰以談粲若所陳也帝喜踰所聞凝聽忘倦且俾書所欲言者條數十餘事皆援據古義劘切時病及踐阼更化用公之言居多涿郡盧公撰墓碑嵗己未憲宗自將伐宋建益上流世祖總東師跨荆鄂公建議大槩以為彼無釁可乘未見其利唯修德以應天心發政以慰民望簡賢以尊將相惇族以壯基圖撫殊俗制列鎮以防窺竊結盟保境興文治飭武事育英才恤罷氓以培植元氣藏器于身俟時而動則宋可圖矣帝偉公所論以為江淮荆湖南北等路宣撫副使然勢不中立遂絶江圍鄂守將賈似道駴遽請和屬憲廟升遐王師言還世祖御極欲柔服宋人以公奉使告登寶位且徵前日請和之議或為公言宋人譎詐罔信盍以疾辭公曰自南北遘難江淮遺黎被俘略北者死原野兵連禍結斯亦久矣聖上一視同仁務通兩國之好雖似涉險蹈不測之淵茍能弭兵靖亂活百萬生靈于鋒鏑之下吾學為有用矣乃授翰林侍讀學士佩金虎符充國信使墓志往又行狀云陛辭公請與三蒙古人俱偕也詔不許曰只卿等往彼之君臣皆書生公方踰淮邊將李璮輒潛師侵宋兩淮制置使李庭芝寓書于公衊以欵兵館留真州藉為口實公答書弭兵息民通好兩國實出聖衷日諭邊將戢戍守圍以契和議衆所聞知今啓釁自璮一旦律以違詔將無所逃罪此何與使人事也公復上書宋主移文執政論辨古今南北戰和利害甚悉皆不報顧窮極變詐以撼公之志知其終不可怵于詭數也揵鑰館所塹垣栫棘驛吏訶閽夜士鳴柝防間挫抑獄犴之嚴不啻如此介佐而下久于囚羈戚嗟尤怨無復生意公語之曰卿顧望不前將命之責一入宋境死生進退聽其在彼守節不屈盡其在我者豈能不忠不義以辱中州士大夫乎但公等不幸須忍死以待揆之天時人事宋祚殆不逺矣衆服其言亦自振勵墓碑寧又行狀云公將入宋憂朝廷初治未使上封事言所以為國家舉維修明禮樂不能使如三代當致漢唐不宜苟且用人以襲弊政又極論風俗者天下之命脈方法度未立當速修理缺缺至元十一年丞相巴延奉辭南伐江漢名城望風鄉附世祖命禮部尚書亷希賢詰宋執行人之故遂以禮歸公聞嬰疾在途醫問絡繹既至錫宴路朝以張異數隱其瘁于王事也詔治病于家疾遂殆不起以聞天子悼焉命其子采麟起家知林州凡從公使宋者賜爵各有差墓碑初公之使宋也內則相王文統忌公重望排置異國隂屬邊將違詔侵宋沮撓使事欲以欵兵假手害公外則宋權臣似道竊却敵為功取宰相畏公露其丐盟幸免之迹遂主議羈留舉國皆知其非似道不恤也公拘儀真館十有六年去國未幾而文統伏誅甫歸國宋探誤國之罪似道殛宋隨以滅然則懷姦怙寵傾陷善良雖暫若得計機發禍敗曽不旋踵抑宋有亡徵公與厄會其患難不渝始終名節窮一時而享百世者初非不幸也墓碑公幼至孝撫諸弟極厚待宗族疏近如一篤親樂施德于己者雖細惠必報然執持方嚴風骨峭立衆不可攀薰良蕕姦題品無貸惜用世之志適際板蕩致墮竒窮既處幽所日以立言載道為務撰續後漢書絀經濟權還統章武以正夀史之失著春秋外傳易外傳太極演原古録通鑑書法玉衡貞觀刪三子一王雅行人志各數十卷公於辭以理為主雄渾有氣文集若干卷傳於世墓碑年又臨川吳公文集云昔公使宋留江淮間十有餘曽遺書宋之君相其言忠厚懇憫內為國計外為宋計其心平恕廣逺真古之仁人君子哉宋之柄臣似道掩遮不使上聞以自速滅亡悲夫公前時從世祖渡江取鄂作望黃鶴樓詞地人處此必謂乘方興之勞殄垂盡之命一舉而吞噬之也夫何難而公之詞乃曰問南國之士有何長䇿更休把蒼生誤則其忠厚懇惻之言平恕廣逺之心與從來貽書之意同真古之仁人君子哉靜修劉先生先生名因字夢吉雄州容城人隱居不仕至元二十年召為右贊善大夫未幾辭歸又召為集賢學士以疾辭三十年卒年四十五延祐中賜諡文靖公君天資卓軼早嵗讀書屬文落筆驚人既又涵浸義理究廣問學故聲名益大以肆裕宗方育德青宫聞其賢以右贊善大夫召至京師未幾辭以親老歸養居數嵗朝廷尊仰德誼拜集賢學士又以疾辭終年遂不起春秋四十有五縉紳惜之野齋李公撰文集序先生上宰相書曰因幼讀書接聞大人君子之餘論至如君臣之義自謂見之甚明姑以日月近事言之凡吾人所以得安居而暇食少遂其生聚之樂者君上之賜也是以或給力役或出智能各有以自效焉此理勢之必然亘萬古而不可易者也因生四十三年未嘗效尺寸之功以報國家養育生成之大德而恩命連至尚敢偃蹇不出貪髙尚之名以自媚而得罪于聖門中庸之教也哉且因自幼及長未嘗一日敢為崖岸卓絶甚髙難繼之行或者不求其實止于蹤迹近似者觀之是以有髙人隱士之目因未嘗以此自居也向者先儲皇以贊善之命來召即與使者俱行再奉旨令教學亦即時應命後以老母中風請還省視不幸彌留竟遭憂制遂不復出初豈有意不仕即今天子一新時政雖前日隱晦之人亦將出矣況因非隱者耶因素有羸疾自去年喪子憂患之餘繼以痁瘧今嵗五月瘧疾復作至七月增發舊積腹痛如刺下血不已自念旁無期功之親家無紀綱之僕恐一旦身先朝露必致纍人遂遣人于容城先人墓側修營一舍儻病勢不退當居處其中以待盡遣人之際未免感傷由是病勢益增飲食極減至八月使者持嚴命至因初聞之惶怖無地又慮若稍涉遲疑則不惟人臣之心有所不安而蹤迹髙峻已不近于人情矣是以即日拜受留使者候病勢稍退與之俱行遷延至今服療百至略無一效乃請使者先行惟閣下俯加矜憫曲為保全始終成就之靜修文集嗚呼金蹂宋踰南兩帝並立廢道德性命之説以辨博長雄為詞章發揚稱述率皆誕謬叢雜理偏而氣豪南北崇尚幾無所分别當是時伊洛之學傳絶至乾道淳煕士知道義之説闡明之朱文公統宗據會議論純備正學始崇又未幾偽學造謗咸諱其説以售于時金將亡各流離自保烏睹所謂經説哉有明其説者獨江漢趙氏私相筆録尊聞傳信稍自異流俗皇元平江南其書梱載以來保定劉先生因獨志獨行取文公書會稡而甄别之其文深而精其識端以正蓋隆平之興使夫道德同而風俗一不在于目接耳受而有嗣也會稽袁公文集伏見保定處士劉因隱居教授不求聞達屬裕宗在東宮由布衣起為贊善大夫旋以毋老辭去又以集賢學士召而不復起是其志趣髙尚有非時輩所敢望或者謂因矜已傲物索隱之流臣謂不然風俗之薄也久矣士之處世不自貴重聞一人之譽一章之薦喜見顔色惟恐或失不復知有亷耻等事何則私欲動于中利祿奪于外也而斯人也授以三品清要之官辭而不居非操守有素能如是乎當風俗澆薄之中忽得斯人庶幾息奪競厚風俗而士類亦知懲勸矣助教吳明進集翰林待制歐陽玄贊先生之像曰微點之狂而有沂上風雩之樂資由之勇而無北鄙鼓瑟之聲于裕宗之仁而見不可留之四皓以世祖之略而遇不能制之兩生嗚呼麒麟鳯凰固宇內之不常有也然而一鳴而六典作一出而春秋成則其志不欲遺世而獨逞也明矣亦將從周公孔子之後為往聖繼絶學為當世開太平者耶元名臣事略卷十五
