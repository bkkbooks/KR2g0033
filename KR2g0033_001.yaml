body:
  text: 元名臣事略卷一元蘇天爵撰太師魯國忠武王王名穆呼哩札喇爾氏以戚里從討幕北諸部有功嵗丙寅拜左萬户進兵討金丁丑封太師國王都行省承制行事癸未薨年五十四王生於鄂諾水之東生時白氣充帳有神巫見而異之曰此非常兒也及長身長七尺虎首虬須黑面多謀略雄勇冠一時與博爾珠博勒呼俱以忠勇佐太祖時號為掇里班曲律猶言四傑也太常元公撰世家太祖軍常失利會天大雪失牙帳所在卧草澤中王與博爾珠張氊蔽之自暮及曉竟不移足世家太祖一日從三十餘騎行溪谷間有羣賊出叢木中列射我矢下如雨衆皆恐王引滿向賊三發三殪徐解馬韀兩手張翳太祖麾餘騎射賊賊引去繇是太祖益重之世家克哷王可汗為乃曼氏集賽庫徹布喇所困王可汗之子伊喇哈詳衮繼為所傷求援於我太祖遣王暨博爾珠博勒呼齊拉衮引兵救之殱其衆於按臺之下獲甲仗輜重以還於是王可汗見太祖聖德日隆左右將士威聲益振患之乃合札木哈等潛襲我會有以其謀來告者太祖與王等簡精甲夜斬其壘大破之王可汗走死諸大人聞風相率款附諸部悉平世家嵗丙寅太祖即皇帝位是嵗宋開禧二年金泰和六年也上既即位從容謂王及博爾珠曰今國內平定多汝等之力我之與汝猶車之轅猶身之臂汝等宜體此意勿替初心乃立王及博爾珠為左右萬户各以其屬翊衛宸極儀位一如諸侯王世家金降者屢言其主璟殺戮宗親荒淫殊甚上曰朕興師有名矣辛未大舉南入擊雲中九原諸郡皆下之進圍撫州時金軍號四十萬陳於野狐嶺之北王抗言曰今敵衆我寡弗致死力未易破也即策馬橫戈大呼陷陳上麾諸軍齊進日未午大破之乘勝追至澮河殭尸百餘里金兵之精鋭者咸盡壬申薄德宣府遂克德興世家癸酉金赫舍哩執中弒其主允濟迎豐王珣立之是為宣宗是嵗我師至居庸關壁堅不得入以都伯統兵趨紫荆口金左監軍珠赫髙琪來拒不勝遂潰進逼中都圍之上與皇子槊赤等分三道徇略趙晉及齊魯既還軍於大口世家可又張匡衍撰行録云金人以山後諸郡不守即移兵山前是時太祖經略山後諸州皆平自紫荆關領兵直入攻涿州州兵殊死戰盡夜急攻四十餘日拔之又分兵自南而北取居庸關遂縱兵大掠自涿以南大河以北煙塵相望金鼓震天神州赤縣十陷八九中夏之民大為騷動甲戌二月太祖斂兵圍中都金主大懼獻公主請和太祖許納之又進金銀繒帛各萬餘兩匹王略地益都濵棣皆克之兵臨霸州史天倪蕭勃迭率衆來降王奏之各統萬户太祖北還其嵗夏五月金主知不能敵遂遷河南甲戌詔王統諸軍專征遼西諸郡王次髙州盧琮金朴率州民降進攻北京金守將伊木沁元帥率衆二十萬來拒我師遇於花道王逆擊敗走之伊木沁嬰城自守其禆將完顔實哷髙德玉殺伊木沁推烏庫哩伊都呼為帥俄伊都呼舉城降王怒欲坑之蕭愛新説王曰北京為遼西重鎮當撫摩以慰衆望今始降而即坑之後詎有降者乎王嘉納以伊都呼權北京留守復以烏頁爾權兵為帥府事以鎮之是嵗興中府民殺守將烏里布推石天應來降以為興中尹錦州張鯨殺節度使自立為臨海郡王至是來降世家乙亥詔王以鯨總北京十提領兵從多果朗徹爾巴勒南征王密察鯨有反側意令蕭愛新監其軍至平涼州鯨果稱病逗留復謀叛去愛新執鯨殺之鯨弟致憤兄死殺長史據錦州叛偽稱漢興改元興隆略平灤瑞利義懿廣寧等盡有之王率先降蒙古布哈權帥烏頁爾等軍討之州郡皆復應官軍遂擊紅羅山克之世家丙子致陷興中府權帥王珣遁王以致兵精且依嶮為阻欲設竒餌之乃遣烏頁爾耶律某等别攻溜石山堡且諭之曰汝等急攻溜石賊必遣兵往援我出其不意斷其歸路可以一戰擒也又令蒙古布哈别屯永德縣西十里以伺之賊聞溜石被圍急果以兵救之蒙古布哈遣騎扼其歸路且馳報王王夜半引軍疾馳比曙抵神水與賊遇而蒙古布哈兵亦會前後夾擊大破之賊遂崩潰斬其將張束平獲首虜萬三千遂由開義縣進圍錦州賊屢出戰不利乃閉門城守月餘偽監軍髙益縛致出降致伏誅世家丁丑以佐命功詔封王為太師國王都行省承制行事賜誓券子孫傳國世世無絶分鴻吉哩伊竒烈蘇烏嚕烏蒙爾等十軍及烏伊爾契丹蕃漢等軍𨽻麾下且諭旨曰太行之北朕自經略太行之南卿其勉之遂建行省於雲燕以圖中原王自中都南攻遂城及蠡州諸城皆下之蠡之役蕭阿先中流矢卒以其子察喇代領其衆是嵗東擊齊遂定臨淄登萊濰密等州而還世家菴又牧姚公撰招撫使王興秀碑云太祖始加兵中原圍燕不攻而坑中山蹂山東河北諸名城皆碎已䇿金不能國可必滅也自將征西太師國王徇河北未下城邑其年衛王弒宣宗南踰河都大梁兵興民既困征求之繁餽人畜雜死道路至不賴生有遲我元兵者曰敵乘甕來耶亦有不順吾令特誅渠魁賊望風畏之不敢至者公聞兵將至曰丈夫生三十年而勞苦耒耜屈壓極矣今又委身餌敵暴骨草野且吾君已棄民民尚誰死哉吾有自圖富貴耳乃以是撼三十餘村之民汝幸從我我能活汝乃將壯士數百輩出蠡疆迎兩大帥萬户劉伯林御史大夫蕭公降帥善其來與之幟曰張汝之鄉我兵自斂戢不汝侵也大兵及城下方繕完守具炮死蕭大夫兩軍奮厲一鼓屠其城無噍類遺而三十村無毫髮傷者又按察使趙瑨碑云蔚州飛狐趙氏金帥府評事崑二子圭瑨圭將萬夫戍蜚狐後遷刺蠡州留瑨在鄉守舍天髙南牧度形勢不支倡縣民以下城之旋太師國王徇地至蠡其刺猶城守炮殺王悍將蕭大夫王恚欲坑城公請以身贖母兄死王哀之併全蠡民二碑皆姚公撰所載蠡州事不同如此戊寅王自中都由西京擊鴈門定襄并晉髙平上黨等郡悉平之世家下又行録云初攻太原御史大夫蕭察喇麾有僧格者渤海人雄勇過人身嘗陷陳太原遂拔王惜其勇授僧格河東北路兵馬都元帥乙酉嵗武仙陷太原僧格戰死燕京行省舒穆嚕咸達布遣使來告曰今燕南信安賊張甫等出沒劫掠屢為民害請一名將拒鎮水泊王命蕭伯特為霸州元帥統精兵五百往拒之行録己卯以蕭神特穆爾為左司郎中狼川張瑜為右司郎中是嵗攻石州隰州克之擊絳凡二十日乃下遂至河東金守臣棄城遁以按察爾為前鋒元帥統蒙古軍屯平陽以備金兵以義州監軍李廷植弟李守忠權河東西路帥府事世家庚辰由中都徇趙至滿城金真定府主武仙舉城降以史天倪權知河北西路兵馬事仙副之天倪説王曰今中原已粗定而所過猶縱抄掠非王者弔民伐罪意也且王為天下除暴豈復效其所為乎王曰善下令敢有擅剽掠者以軍法從事所得老幼咸歸遣之軍中肅然吏民大悅至滏陽先是邢州節度使武貴聞大軍至棄城遁繼聞王仁厚不殺乃詣軍門降復其職平鄴郡至林州遂輕騎入濟南嚴實上謁以實權濟南等路都總管時金兵聚黃陵岡號二十萬聞王在濟南衆未集遣步卒二萬襲之王以輕兵五百擊走之俄大軍繼至遂薄黃龍金兵盛列城北崖王麾蒙古漢軍下馬短兵接金兵大敗入河溺死者不可勝數遂克黃龍至楚丘楚丘城小而四面皆水王令諸軍以草木填塹為道直抵城下總管嚴實先登破之由單州趨魯圍東平遣蒙古巴哈引兵徇河北懷孟衛州之地王以東平久不下召嚴實囑之曰我料東平糧盡必棄城走若然汝即入城綏輯安慰之勿苦郡縣以敗乃事也乃留索嚕呼圗以蒙古軍屯守之以實權山東西路行省王北還世家辛巳夏四月東平糧絶卒飢守將果棄城遁索嚕呼圗邀擊之斬首七千級嚴實遂入城建行省於府治王弟岱遜别攻洺至是克之五月王在野狐嶺北宋漣水尉石圭持方物入見貺以繡衣腰帶遣之山東張琳蓨縣鄭遵各以所部詣軍自歸又行録云益都張琳遣其弟張石圭齎方物來降王以琳為山東北路益都府滄景濵棣等州行都元帥府事蓨縣鄭遵以棗鄉二縣率兵民降以遵為節度使行元帥府事改蓨縣為完州八月王至天德監國公主遣其臣錫哩濟蘇勞王且饗將士由東勝州涉河引兵而西夏主李王聞之懼遣塔海監府汪努格監府遺方物且以兵五萬屬焉冬十月復東遂由雲中歷太和寨入葭州以石天應權行臺於葭州復擊綏德破馬蹄寨遂至延安距延安三十里止舍金行省完顔合逹出兵三萬陳於城東又行録云合達初以平州推官來降其後復歸于金蒙古巴哈先以騎士三千趣之約半夜伏發王乃令軍士銜枚潛進伏於城東兩答間明日蒙古巴哈望見金軍佯棄旗鼓走金人追之王出伏乘其後鼓鼙震天敵遂亂追斬七千級獲馬八百匹合達退走延安堅壁不動圍之十餘日不下乃南徇洛川鄜州北京權帥烏伊爾擒金梟將張鐵槍送王所王誚讓之鐡槍厲聲曰我受金朝厚恩二十餘年今事至此死實甘心王義之欲釋徽纆諸將怒其不屈殺之過坊州大饗士卒復由丹州濟河時金已復隰州以軒成為經略使王引兵圍之二日而克斬軒成留合丑統蒙古軍屯石隰之間以田雄權帥府事世家壬午秋七月令蒙古巴哈引遊騎出秦隴以為聲勢且視山川夷險強弱處王率大軍回雲中又行録云王率兵回雲中道出太原府孟州四蹄寨寨王劉某金孟州太守也王以兵圍之遂率山民來降即日復其職遷百姓于州秋毫無犯先是王弟帶孫駙馬按齊納共擊義和寨不拔王至攻之二日而下過西河南擊三清巖入霍邑山堡遷其民趙城縣薄青龍堡金平陽公胡天祚拒守其裨將蒲察定住監軍王和開壁門降遷天祚于平陽又行録云王薨定住譖天祚于郡王帶孫殺之其後王子鈸里攻西夏定住稱疾不行復歸于金及鈞州軍敗為大兵所殺冬十月過晉至絳下金榮州汾東諸堡邑往往從風歸附王皆撫慰之蒲郡久為金有至是復歸于我王召天應謂之曰蒲為河東要害郡我欲選一首領顧勿能得君才略絶衆乃以天應權河東南北路陜右關西行臺以平陽太原吉隰等郡帥府皆受天應節制王引兵渡河西攻同州下蒲城入關徑至長安長安城堅不得入乃分麾下烏呼鼐台哈巴哈統軍六千屯守之留按齊銀納斷潼關遂西擊鳯翔月餘不克乃軍於渭水之南遣蒙古巴哈南渡牛嶺關徇宋鳯州而還是嵗羣盜陷河中府殺權行臺石天應未幾賊燒居民府舍遁以天應子幹可襲領其衆世家侯又行録云初天應聞中條山賊侯七八欲夜攻襲其城即遣部將吳權甫領兵出東門潛伏道左兩谷間若賊過半即邀擊之我出其前爾攻其後賊可勝也其半夜吳權甫酬酒失期過故城陷天應遇害癸未春三月王至聞喜縣疾篤召弟岱遜謂之曰我為國家助成大業事干戈垂四十年東征西討無復遺恨所恨者汴京未下耳汝等勉之言訖薨世家庚寅冬帝親攻鳯翔對諸將數王之功因曰使穆呼哩在不令朕至此也世家丞相東平忠憲王王名安圖太師忠武王四世孫至元二年由宿衛官拜中書右丞相十二年從皇子行邊二十一年還朝復拜中書右丞相二十六年罷相三十年薨年四十九世祖皇帝追録元勳召入拜宿衛官置位在百僚上時太夫人特穆倫以椒房之故嘗入宫中一日上從容問及公夫人對曰安圖年雖幼公輔器也上曰何以知其然夫人曰每朝退與前輩老成人語未嘗一親年少輕浮子以是知之上默然太常元公撰世家中統四年阿里布格平執其黨千餘人將有所裁上猶豫未決適公侍側上問曰朕欲盡置此屬死地何如公時年十六對曰人各為其主爾陛下甫定大難而以私憾殺人何以懷未附上驚曰卿年少何從得此言卿意適與朕合繇是大器之世家至元二年秋八月制曰安圖可光祿大夫中書右丞相增食邑至四千户公辭曰今三方雖少定江南猶未納款臣以少年謬叨大任恐四方有輕朝廷心上動容有間曰朕思之熟矣卿勿辭冬十月召儒臣許衡至後二月都堂傳旨令衡入議事省衡以疾辭公素聞其德義就訪于行館與語既還念念不釋者纍日世家三年上特召衡入諭之曰安圖尚幼苦未更事謹輔導之汝有嘉謨先告安圖以達於我我將擇焉衡對曰安圖聰悟且有執持告以古人言語悉能領解臣不敢不罄愚衷但慮中有人間之則難行外用勢力納入其中則難行且臣入省之日淺所見如此世家四年春三月公奏凡內外官員宜委任老成人如姚樞等一二員可省中議事上曰此人輩雖間猶當優養其令入議事世家五年廷臣密議立尚書省欲以阿哈瑪特領之乃先奏公宜進為三公事下諸儒議樞密商挺倡言曰安圖國之柱石若然則是與虛名而奪實權甚不可衆以為然事遂已世家七年夏四月公奏臣近言尚書省樞密院宣奏並如常制其宏綱大務從臣等議定然後上聞已有旨俞允今尚書衆務一切徑聞似違前旨上曰豈阿哈瑪特以朕頗信用故爾擅耶不與卿議非是敕如卿所言世家八年陜西行省伊蘇岱爾建言比由飢饉盜賊滋多若不顯戮一二無以示警敕下中書詳議公奏曰強竊盜賊一皆處死恐非所宜罪至死者冝仍舊待報從之世家十年奏以玉册玉寶上皇后鴻吉哩氏以玉册金寶立燕王為皇太子兼中書令判樞密院清河元公撰勳德碑中書省斷死囚五十人公言臣等閲實其狀內有十三人因鬬毆殺人者餘皆無可疑上曰十三人可免死從軍其餘再三審覆以聞世家十一年公奏阿哈瑪特蠧國害民數事又以四部及大都路總管府官皆非材乞遷汰從之世家十二年敕公行中書省樞密院事從皇子北平王行邊公在邊凡十年世家二十一年春三月北平王歸公亦繼至待罪南門下上遽召見勞之曰卿在外勞瘁公頓首謝曰臣奉使無狀有塵聖德遂留卧內語至四鼓而罷冬十一月丞相和爾哈遜罷公復拜右丞相加金紫光祿大夫詔天下世家二十二年監察御史陳天祥劾奏右丞盧世榮其略曰人思至元初年之治至今莫能忘也去春丞相安圖自邊還天下聞之室家相慶咸望復膺柄用再整宏綱思仰治期謂可立待十一月二十八日丞相果承恩命復領中書貴賤老幼喜動京師今丞相亦國之名賢也時政治與不治民心安與不安係丞相用與不用之間耳又如伊蘇特穆爾大夫巴延丞相皆天下之所敬仰海內之所瞻依者朝廷果專任此三名相事無大小必取決而後行無使餘人有所阻撓三相博采衆議於內外耆舊之中取其聲望素著衆所推尊者為之參贊則天下之才悉展效用能者各得進其能善者皆得行其善誠厚天下之大本理天下之大策為今致治之方莫有過於此者又安用掊克在位倚以為治哉其年世榮敗詔公與諸儒條世榮所為事悉章罷之世家二十三年夏四月中書列上所擬漕司官姓名上謂公曰如平章右丞等職朕當親選擇之餘皆卿等責也公因奏言臣比聞聖意欲倚近侍諸人為耳目者今臣猥承任使或所行非法從其舉奏罪之輕重惟上裁處今近臣伺隙援引非類曰某居某官某為某職以所署奏自付中書施行臣謂銓選之法自有定制其或無事例者臣嘗廢格不行慮有短臣于上者幸陛下察之上曰卿言是也今後若此者勿行其妄奏者即入言之世家初李昶為吏部尚書宰相素重之凡集議必延置上座傾聽言論會制府有異議李遂謝病去至是公奏徵之不起復奏賜田千畝世家宋王納延反上親討平之他宗室詿誤者敕公按問多所平反一日朝退出自左掖門諸免死者爭前迎謝至有執轡扶公上馬者公毅然不顧或乘間言於上曰宗室雖有罪皆太祖子孫陛下昆弟丞相雖尊人臣也奈何悖慢如此上良久曰汝等誠小人烏知安圖之所為彼特辱之使改過遷善耳二十四年上決意立尚書省奏曰臣力不能回天乞不用僧格别相賢者猶或不至虐民誤國不聽勳德碑李又野齋公文集云先是王子北安王嘗遣使將香祠嶽瀆時僧格領功德使使者時參政吕公和拉以王教諭之邃給驛傳北往其後僧格平章尚書省事所忌者丞相安圖將惎害之誣言北安王以皇子僭祭嶽瀆安圖明知而不以聞指吕公為徵世祖召問吕公對曰時僧格主祠祭北安王使者實同臣往來驛傳安圖未嘗知也僧格不能對二十五年見天下大務一入尚書省屢上中書印不許明年罷相止掌環衛勳德碑三十年正月十九日以疾薨于京師樂安里第既殯樹介者三日上震悼曰人言丞相病朕固勿信今果喪我賢弼詔大臣監護喪事世家公生十八登庸在相位前後二十年視事之初勵精輔政革前日苛政代以寬平抑奢淫薄稅斂舉賢任能常若不及如丞相史天澤左丞許衡姚樞參政商挺皆引置左右同輔庶政由是至元之初朝廷無事民物日以繁息倉廩之積盈衍於外海內翕然號為極治天子嘉之嘗曰安圖在朕得髙枕而卧無所事矣世家公天性厚重人莫能測每當艱難清晏之時夷險榮辱之際守正不移恬然自處公退之餘即引諸儒講論道義孜孜忘倦聖君賢臣之事義夫孝子之行善之當勸惡之當懲與夫治亂成敗之由死生憂樂之説靡不悉究殆二十年未嘗一日少廢所居堂宇朴陋廳厨之外餘無所構或請建東西室者公曰屋可以蔽風雨足矣我聞人辛苦置田宅適以資不肖子之用耳吾不為也世家忠憲王襲纍葉之勳抱絶倫之德膺世祖紹統之初際聖代建極之盛天度夙成英猷大肆逺徵近禮廣詢博採鴻儒獻其所獲智士竭其所知治化油然以隆風俗淡焉以厚至元之初何減漢文之世俾得展能專理期之敉寧功效所書蓋不止此然房喬杜晦顯烈寡傳第功挈德為唐宗臣若忠憲王者有立于前或承于後論相歸賢固當稱首古所謂社稷之臣也嗟夫其始出鎮也誰歟其再罷相也誰歟議者不能不歸罪阿哈瑪特僧格也之二罪魁相與並立良相之去朝也宜矣世之公道正如青天白日雲煙有時蒙蔽真風元氣蕩滌斡旋廓乎清明可跂而睹忠憲王之表表在天下是也勳德碑元名臣事略卷一
