body:
  text: 元名臣事略卷十一元蘇天爵撰左丞李忠宣公公名德輝字仲實通州潞縣人初事潛邸中統元年授燕京宣撫使歷山西宣慰使太原路總管至元五年召為右三部尚書八年拜北京行省參知政事十一年遷安西王相明年以王相撫蜀又明年拜西川樞密副使十七年拜安西行省左丞命未下而薨年六十三吏部君且卒指公謂宋夫人曰吾為吏治獄不任悍鷙刻削人䝉吾力脫罪罟齒平民者衆天或報施善人是兒其大我門者公方三歲哭之如成人家才儲五升菽夫人舂蓬稗為糧芼藜莧為苴活之荒歲既就外傅嗜讀書束於貧無以自資輟業十六監酒豐州祿食充足甘㫖有餘則市筆札録書夜誦不休已乃厭糟麴歎曰志士顧安此也耶仕不足以匡君福民隱不足以歡親善身兩大之間人壽幾何烏可無或有聞同腐草木也絶少年輩不游交其所親與率一時名公碩儒牧菴姚公撰行狀歲丁未用故太保劉公薦徴至潛藩俾侍皇太子講讀薦故翰林侍讀學士竇默宣撫司參議智廷賢皆就徴行狀癸丑先朝封周親割京兆𨽻潛藩擇庭臣可理賦者俾調軍食實出公從宜使時汪忠烈公始宿兵利州扼四川路咽喉規進取數萬之師待哺於公乃幕民入粟綿竹散幣之或給鹽劵使歸京兆受直陸挽興元水漕嘉陵二年而錢粟充棟於軍中宋臣余玠議棄平土即雲頂運山大獲得漢白帝釣魚青居苦竹築壘移成都蓬閬洋夔合順慶隆八府州治其地號為八柱不戰而自守矣蹙蜀之本實張於斯行狀中統改元為燕京宣撫使燕多劇賊造私幣雜真行民間隂結死友相誓復仇怨殺人公悉捕誅之雖中省開府在燕令行禁止多不上白由是忤時相意以誣去位行狀三年惡相以反誅以為山西宣慰使罪權勢之籍民為奴免而良者將千人行狀至元改元罷宣慰司授公太原路總管至是潛藩故臣相無有出為二千石吏者上以太原難治故留居此公愈益勤勵崇學校以明人倫表孝節以善風俗逐姦賊以别民庶裁婚葬俾師簡儉敦耕桑以富民生理之出立社倉以虞水旱之歉一權度以絶欺詐之攘嚴鼓柝以警奇袤之覬凡與民漸磨仁義者無弛不張嘉禾瑞麥六出其境行狀五年徴入為右三部尚書人有訟財而失其兄子者公曰何疑焉叔殺之也深竟其獄公所信厚及權貴言可撼公者莫不請求保為衣冠之族無有是也漫不為應懸巳俸為賞購之其家人果上變告情狀呈露言者慚服叔竟以是論死行狀七年上以蝗旱為憂俾録山西河東囚行至懷仁民有魏氏發得木偶持告其妻挾左道厭勝謀殺已經數獄服詞皆具自以為不寃公燭其誣召鞫其妾搒掠一加服不移晷蓋妬其女君謂獨陷以是罪可必殺也因直其妻而杖其夫之溺愛受欺當妾死罪觀者神之行狀皇子安西王有土關中奏求公輔已以故官改安西王相至則視瀕涇營牧故地可得數千頃起廬舍疏溝澮其中假牛種田具賦豫貧民二千家屯田缺歲入得粟麥數十萬芻藁粟百萬行狀十二年詔以王相撫蜀其年重慶猶城守東西川各開樞府合兵數萬人圍之公至成都兩府爭遣使咨受兵食方略公危動之曰宋今既亡重慶以巨擘之地不降何歸正以公輩利其剽殺不得有子女懼而不來耳不然他日兵未嘗戰及招討畢某偕中使奉璽書來赦最宜正言明告嚴備止攻以須其至反購得軍吏杖之僞為得罪懷之入降水陸之師雷鼓繼進實堅其不下也中使不喻詐計竟以不奉明詔反命如是者皆公輩玩冦疆埸心迹之著白者况復軍政不一相訾紛紛朝夕敗矣豈能必成功為哉公出未至秦瀘州畔而重慶圍果潰再退守瀘州十三年秋也行狀十四年詔以布哈與公代為西川副樞公為王相大軍既發公留成都供億食才支半月賦粟繼之官船不足括商民船千艘日夜督運其年復瀘州行狀十五年重慶之圍再發踰月即下紹興南平夔施思播諸山壁水栅隨之皆下而東相府猶故將也懲前與西川相觀望致敗惡相屬願獨軍圍合州初公撫蜀經東川歸以為重慶帥閫受圍必徵諸屬州兵盡鋭拒守合州空虛誠使諜人持書曉之兵隨其後亦制合一奇也即出合俘繫順慶獄者縱之使歸語州將張珏以天子盛德逺著宋室淪亡三宫皆北又頌聖量含𢎞録功忘過能早自歸必取將相與夏吕比又為書反覆禮義禍福譬解其言以為均為臣也不親於其子孫合之為州不大於宋之天下子孫舉天下而歸我其臣顧偃然負阻窮山而曰吾忠於所事不亦甚惑者耶此州人不自為謀求去就者以國有主寧死不欲身被不義之名故爾得制其死命主今亡猶欲以是行之則戲下以盜賊遇君竊君首以徼福一旦不難也又約書言為檄刋木於山浮板於江珏未及報而公還王邸至是合遣李興張卻十二人者詗事成都皆獲之當斬復為書縱歸使喻其將王立其言如喻珏者而益剴切興至立亦計夙與東府有深怨懼誅使興等導帥幹楊獬懷蠟書間至成都降公從兵才數百人赴之東府害其來爭有言前歲公為招珏誠極寬矣竟不見降無功而返今立珏牙校也習狂詐不信特以計致公來使與吾爭垂成之功延命晷刻耳未必定降公曰前歲合以重慶存故力可以同惡今也孤絶窮而來歸亦其勢然然我非攘君功者誠恐汝憤其後服誣以嘗抗蹕先朝利其剽奪快心於屠城也吾為國活此民豈計以嫌怨為哉即單舸濟江薄城下呼立出降安集其民而罷置其吏合人自立而下家繪事之川蜀平復以王相還邸行狀十七年西南夷羅施鬼國既降復叛詔雲南湖南四川合兵三萬人討之兵且壓境公適被命在播亟遣使止兵勿進别遣人趨鬼國使降酋長熟公名曰是活合李公耶其言明信可恃即身至播州泣且告曰我屬百萬人微公來死且不降今得所歸蔑有二矣公以其言來上聖意開允改鬼國為順元路以其酋為宣撫使及公薨蠻夷聞訃哭之甚哀其私親為位而祭者動輒數百千人合州安撫使立衰絰率吏民拜哭聲震山谷為發百人護喪興元僉播州安撫使何彥清順民欲立廟以祀之夫邊徼逺夷之人未易懷服公之所以能得其心者顧豈以聲音笑貌為哉語曰言忠信行篤敬雖蠻貊之邦行矣若公之言動出乎身加乎民發乎邇見乎逺彼西南之人被生死骨肉之賜者無慮億萬計其為忠信篤敬不既大矣乎野齊李公撰神道碑公天性孝悌事太夫人深愛和氣愈色婉容自幼至貴能養志順色未嘗少失推意於兄姊友愛彌篤凡有俸賜必均及之資禀雅重與人交疏淡寡合不為詡詡熊久而後知其居官清慎非義一毫不取羅施鬼國之入附也有以受賄數譖於朝者上曰是人朕所素知雖一羊不妄受寧有是事神道碑公為王相七年及事先王五年言必切於臣職子道請聞斯行以絶專嫌簡約侍衛以裁浮費無急土木殫匱民力為中外所厭服凡人賢而有聞滿調將東歸必薦汲之王升秩留之故關輔得士為多行狀初權臣阿哈瑪特與公偕侍潛邸及當國用事公未始一至其門彼常卑恭求好拒之愈力其所守類此神道碑參政商文定公公名挺字孟卿曹州濟隂人其先本姓殷氏避宋諱改焉國初為東平行臺幕官入事潛邸為京兆宣撫司郎中就遷副使中統元年改宣撫司為行中書省遂僉行省事明年進參知政事坐言者罷起為四川行樞院事至元元年入拜參知政事六年同僉樞密院事纍遷副使十年出為安西王相十五年王薨十七年王相亦罷坐事得免二十年復為樞密副使尋以疾辭二十五年薨年八十公生於大安己巳至少保沒年二十有四汴京陷北走依冦氏趙帥天錫與元好問楊缺游東平嚴武惠公統屬齊魯魏五十四城號行省招徠名士以禮聘公俾教諸子經學武惠卒嫡先死遺命以子忠濟嗣時朝命未下公教忠濟為喪主哀而中禮弔者敬悅輔之見大臣奏其克嗣制可忠濟辟公為經歷官凡五年出倅曹州未幾歸東平日與魯諸賢為琴詠㑹後官經歷贊忠濟大興學校聘康曄說書李昶說春秋李禎說大學學生百餘人養之優厚督於課試後皆通顯東州多士公實作之墓碑憲宗朝缺世祖以貴介弟鎮撫中夏得專征誅聞公有經濟略左官諸侯遣使徵至鹽州召對稱㫖字而不名間陪燕語因曰挺來時李璮城朐山東平當餽米萬石東平至朐山十石致一石且車淖於雨必後期後期罪死請輸沂州使璮軍取食便世祖曰愛民如此忍不敬從墓碑詔以京兆分世祖教楊惟中宣撫關中公為郎中焚斬之餘八州十二縣户不滿萬皆驚憂無聊賴公佐惟中進賢良黜貪暴明尊卑出淹滯定規程主簿責印楮幣頒祿糈務農薄稅通其有無朞月秦民乃安誅一大猾羣吏咸懾明年惟中罷教廉希憲來使登公副之墓碑丙辰夏我師征南詔京兆布萬匹米三千石帛三千段械器稱是輸平凉為軍需軍期迫甚郡人大恐公曰此易集也運米千里妨我蠶麥郿州長王姓者雅為公所禮平凉人也公召與之謀王曰不煩公運僕有家粟積平凉盡以代輸公大喜有㫖割懷孟益世租教公往治既至一多金子酗酒殺人坐死取豪猾杖於市一郡懾伏乃濟之以恩懷人至今縷道其善墓碑丁巳丞相阿勒達爾㑹討陜西河南罷宣撫司公還東平陵周公撰墓志孟又牧菴文集云先是分封世祖以京兆戶益以懷且詔總天下之兵遂置經略司於河南宣撫司從宜所於關西行部於秦州漕運司於衛安撫司於邢召遣諸軍屯田戍邊首淮尾蜀以休秋春士馬往來之勞東西數千里道不拾遺中土諸侯民庶翕然歸心歲丁巳宗親間之遂解兵權已而遣阿勒逹爾至京兆大禁汴蜀兵民之官下及管庫征商之吏皆入計曲為條百四十二文致多方且曉衆曰惟劉萬戶史萬户兩人罪請於朝蓋謂忠順公丞相忠武公也自餘我則專殺虐焰薰天多迫於死明年世祖身至帝所命下而事始終猶缺皆民之官凡昔所置諸司廢己未憲宗親征蜀以圖宋世祖趨荆鄂軍於小濮召問軍事公對曰蜀道險逺瘴癘時作難必有功萬乘豈宜輕動世祖默然久之曰卿言正契我心墓碑憲宗崩於軍庚申世祖至自鄂道遣張公文謙過公公語張公曰殿下班師師屯江北脫有一介馳詐發之軍中留何符契張公驚駭追及言之世祖大寤罵曰無一人為我言此非商孟卿幾敗大計速遣使至軍立約不日額埒布格之使至軍中斬之墓碑公赴召開平初憲宗征蜀季弟額埒布格留守和林至是左右部諸王大人㑹開平額埒布格不至㑹者勸進曰殿下太祖嫡孫大行母弟以賢以長當有天下上謙遜未許公與亷公希憲參大議潛進言曰先發制人後發人制天命不敢辭人情不敢違事機一失萬巧莫追上頷之明日㑹者力請遂即位墓碑額埒布格起兵公奏曰南師可還備邊西師可軍便地從之以廉公及公宣撫陜蜀公等至關中六盤之兵已應和林公謂廉公曰為六盤䇿有三選鋒乘虛直搗京兆上也積財聚兵觀釁走利中也重裝北赴歸重和林下也廉公曰䇿彼何出公曰出下已而果如所䇿是時人持二志關隴日閉鞏昌汪帥兵號徑果其弟良臣適至公等承制佩良臣虎符出庫銀萬五千兩使歸發兵乃完城濬隍借兵於民拜巴崇為將公戒之曰公帥未練之卒出應勍敵揚聲借勢使賊不敢東椿違戒而衄敵兵懼而西去公命巴崇追至甘州汪良臣將兵來㑹咸聽諸侯王哈坦號令哈坦陳於北巴崇陳於南良臣陳於中大戰甘州東殺大將阿勒達爾琿塔噶斬首虜無算關隴平捷聞上報曰卿等古名將也臨機制變不遺朕憂遂改宣撫司為中書省進廉公為右丞公為僉行中書省事明年進公參知政事墓碑宋瀘州將劉整囚我降人數百及來歸附將論誅之公盡釋囚之聞邊將不和公輒手書開諭皆得其死力若蜀帥耨埒閬帥楊大淵青居山帥竒徹也墓碑興元倅費寅有罪懼誅以借兵完城事訟於朝上召入便殿曰使卿關中使卿懷孟而著治效今訟卿者還至卿豈有所掣耶亦驕而志隳耶公對曰臣在秦三年豈能事事當理上負聖恩下欺臣心有死不為巨冦滿野借兵完城事豈得已且有前㫖也功若自歸罪則分人非臣所事欲加之罪臣請就戮上顧侍臣數公大計屈伸手指凡十有七謂公曰卿無罪今委卿四川勉之行大用卿出金虎符佩公行四川行樞密院事墓碑至元元年入中書上欲知經學公與姚左丞樞竇學士默王承㫖鶚楊參政果纂五經要語凡二十八類以進墓碑初中統三年立領部以阿哈瑪特總錢穀至是革去公與太保劉公等奏於王為中書令入省聽政罷世官行遷轉法併州縣戶耗者墓志二年平章趙璧奏立諸路行省丞相耶律鑄行省河東公為之二旋召還六年同僉樞密院事連年遷僉書遷副使數軍實差萬戶千戶等三給軍吏俸使四千人屯田給牛種農器墾田三萬畝收其獲以餉親軍汰不勝軍者戶三萬戶一丁者亦汰酌于丁業多寡業多丁寡者財力相資合出一軍墓碑十年封皇子莽噶拉木為安西王立王相府以公為王相上曰王年少河之西盡以委卿公進十䇿於王曰睦親鄰安人心敬民時備不虞厚民生一事權清心源謹自治固本根察下情王為置酒嘉納墓碑元又牧菴文集云至九年立皇子為安西王明年至長安營於素滻之西毳殿中侍衛士環列車間容車輾間容帳包原絡野周四十里中為牙門譏其出入其時西河之外秦固內地教令之加于隴于凉于蜀于羌諸侯王郡牧蕃酋星羅棊錯于是間者靡不輿金篚帛效馬獻琛輻輳庭缺刑之寬如恐缺行其大如軍旅之振治爵賞之豫奪威猛承制之自餘商賈之征農畝之賦山澤之産鹽鐵之制不入王府缺邸自有又明年詔益封秦王缺二舍邸易在長安者為安西六盤者為開成皆聽為官邸用不足取之缺歲或多至楮幣貫計者三十萬裁七年而棄其國王薨王妃使公請嗣於天子未允明年又入請賜允猶未遣也公病於京兆其年王妃殺王相趙昞於六盤辭連公子瓛逮至行在所下公吏久之得免墓碑至又墓志云元十五年冬王薨王子哈達當嗣王妃命公請於上上曰齒弱祖宗之訓未習也卿姑行王相府事以俟初運使郭琮郎中令郭叔雲與王相趙昞搆隙相破人或告趙昞不法王妃令囚之六盤獄以死朝廷疑擅殺之取二郭鞫問伏辜事無一毫及公惟王府女奚察察爾以預二郭謀將刑規以求王始有曖昧語罥公及其子亦知之上怒拘公於趙氏子獄上命趙氏子曰商孟卿老書生可與諸儒缺其罪宋儒青陽缺以義缺為奏曰臣宋儒不知商孟卿向來之功可補今日之過乎上不懌曰是同類相助之辭也僉樞密事董之忠奏曰宋儒不知商孟卿何如人臣以曩時推戴之功語之矣上良久曰其事果何如對曰臣目未見耳固聞之殺人之謀商孟卿不預也上默然不答十六年春有㫖商孟卿不可全以無罪釋之籍其家是冬始釋公及瓛十年復樞密副使尋以病免二十一年趙氏子復訟公死公又被逮百餘日乃得釋公嘆曰蘇端明貶黃州作雪堂於東坡貶惠州築室於白鶴觀若將終身善處變矣我有慕焉遂葺小圃於都城之南以居淡然與造物者遊朝士及僧道日造門問遺不絶益為世所重墓志曹有阜曰左山公自號左山老人著詩千餘篇尤善𨽻書時人銘其先世者以不得公書為未孝墓碑公具文武才缺公亮慷慨有大志遭際世祖聖神之主道同氣合獲展宏略功在社稷德洽黎元慶流子孫可謂一代英傑者矣雖罥安西之獄事旋昭雪克終令名蓋有以也墓碑樞密趙文正公公名良弼字輔之趙州贊皇人國初舉進士教授趙州歲辛亥召居王邸歷邢州陜西幕官己未王師伐宋參議元帥府事中統元年拜陜西西川宣撫使至元七年授髙麗經略使奉使日本還朝改四川經略使十年拜同僉樞密院事居官九年以疾辭歸二十二年薨年七十二公女真人避遼章帝宗真諱易真為直以部族珠嘉著姓佐金相平遼宋功世長千夫戍真定贊皇人不能金言者訛為趙家其曾大父鎮國上將軍諱祚者因易姓趙牧庵撰廟碑公少聰警負膽膂機數其父元帥右都監節死諡忠憫公官公奉職義宗播歸德上黨公部將防提控崔立移守相降而自王猶譏城門妄出入者殺積骸狼籍公侍母夫人懷其家牒及忠憫以上世遺繪曰非是無以知吾生族倣佛儀形雜薪丐人竊出將歸趙及河已集將北之民數千惟七艘濟舟兵病民之爭挺刃亂投及夫人首公臂受之幾折兵顧見哀手援以登廟碑公輦母夫人北渡河至鄉奉事之外日從名儒講論文藝尤致意司馬氏通鑑歷代典章制度兵馬强弱地理扼塞有關國家興衰治亂者無不記憶戊戌朝命試諸道進士公中缺選教授趙州野齊李公撰墓碑上居潛邸用薦者召公北上召對稱㫖㑹立邢州安撫司擢公為幕長邢久不得善吏積弊日深公區畫有方事或掣肘則請諸王府再閲歲凡六往返所請率賜俞允邢賴以治升陜西宣撫司郎中墓碑己未王師伐宋大臣巴圗爾為元帥公參議帥府事兼江淮安撫使五戰皆捷渡江至鄂分道趨湖南攻下嶽州抵潭州而還用兵有紀律未嘗妄戮一人墓碑大駕北幸陳時務十二事言皆有徴上深嘉歎至衛驛遣如京兆訪察秦蜀人情事宜不踰月具得其實還報日列十事上聞多見采用墓碑公言髙麗雖名小國依阻山海國家用兵二十餘年尚未臣附前歲世子王倎來朝適鑾輅西征留滯者二年矣供張疏薄無以懷輯其心一旦得歸將不復來宜厚其館穀待以藩王之禮今聞其父已死誠立之為王遣送還國世子必感恩戴德願修臣職是不勞一卒得一國也上是其言即日改館世子顧遇有加尋賜封船遣還髙麗遂一意內附皆自公發之上即位首立陜西宣撫司廉公希憲為使商公挺為副使公參議司事時甫罹大變衆心未一事機少忽變生意外公受命即就道先二公至知事不可緩乘機決䇿前事而發廉商二公繼至同心協謀卒平大亂安反側公贊畫之力居多九月改宣撫司為行中書省拜公陜西四川宣撫使兼參議行省事屬用武之際調兵馬給糧餉所統九路缺城受事日不暇給心計口授物來則應卒贊成秦蜀之功墓碑二年冬省諸侯宣撫司公遂不出居無何費寅以九事訟諸朝誣亷公商公有異志指公為徵寅成都人初我師取四川十六年李梓發盜居南安公慮他將往則為暴堅其不下請身往平才提兵千營於城北為檄推誠招懷梓發度其猖獗日久勢不敢歸以其徒知公有素必不為用乃閉妻子一室自焚死皆散還其鄉不戮一人平南安歸江東饒之屬縣都昌杜薦一挾左道媚人有衆數萬狂僭置相公曰都昌與我南康只限彭蠡此冦不馘將亂南康乃調國兵戍遏彭蠡西缺别遣方招討將其軍仗伏舟中僞為商農經造缺生擒薦一與其相曹者以歸磔龍興市其徒駭散復其民居後有列巨室姓名百數來上云與賊連公曰大慝誅矣延求何為免之神道碑十七年詔再征日本賦江浙江西湖廣三省再造海艦公極言如是將亂江南欲身任入聞陳其過舉他相以為不可廢閣詔令異同之間公薨於豫章而始成戰艦遣宣慰某者總致於軍東征丞相憤失軍興將以是日斬使忽詔下既江西海艦後期罷兵君子謂公薨猶利國猶古尸諌云神道碑公家房事妣夫人曲盡孝敬逮薨移是以養寡姊視政之休未嘗廢從戎亦槖駝負書以行延師私孰育德諸子日或一至其舍事世祖二十有一年其居中當睿聖大有為之時與二三元臣上以毗贊其經國下以燮煕其子民者十有三年出而經理南紀謀猷大軍於襄陽於湖廣於江西新造之邦嚮化未淳安而集之煦而濡之如恐一夫不獲其所缺海隅之難盜賊附起禍譬而賞勸德綏而威撻徐革其面而法其心俾方內數千里之氓一喙同辭稱其仁人求能推守大帝諭忠武王以曹彬取南唐不殺之訓者無其亞匹神道碑元名臣事略卷十一
