body:
  text: 元名臣事畧巻四元蘇天爵撰丞相興元忠獻王王名諤勒哲圖卜布延氏中統三年以大臣子選侍東宫詹事至元二十八年尚書省罷拜中書右丞相加太傅録軍國重事居相位十三年大徳七年薨年五十八中統三年封皇子為燕王領中書省是為裕宗詔選王府僚屬聞公之賢即以應選乆之署東宫詹事入籌帷幄出掌環衛小心畏慎夙夜在公裕皇甚器重之一日重宴宗室指公語衆曰先正有言為人上者當務親善逺惡善如諤勒哲豈易得哉髙唐閻公撰勲徳碑昧又云公祖錫錫乘時草從太祖起朔方平諸部嵗壬辰太宗大舉伐金六師趨汴先期命睿宗由陜右進以錫錫為前鋒取道金房絶漢上流畧襄陽方城而北破金卒二十萬于陽翟金亡有事于蜀襲武休興元閬利諸州拜都元帥辛丑取成都誅宋將陳隆之西蜀以平父錫津早潜邸中統元年天戈北舉捍禦不虞率身先之還拜宣徽使四年進中書右丞相時朝制草創登政府者多宿儒耆徳相與訏謨廟堂皆經國永圖鶴馭上賔仍主東宫衛兵成宗以皇孫伐叛北方詔公總治軍旅輔行者凡再勲徳碑至元末奸臣竊㺯威福事敗伏辜端揆難其人博選於衆無以踰公乃拜中書右丞相登進善良湔除弊法朝政涣然一新方權姦之熾分遣使者乘傳諸道以㑹計為名肆為掊克公私騤然公為奏請自中統初積嵗逋懸一切釋而勿論迄今人賴其利勲徳碑公承玉几末命參定大策内禀皇太后睿謀外合宗親大臣之議居冢宰統百官者踰三月古之所謂不動聲氣措天下於泰山之安惟公足以當之勲徳碑成宗纂承大統首議加上祖考尊諡致隆福長樂之養分寳展親大賚四海之治一以倚公公在相位上體淵衷勤卹民隠數下寛大之詔散鉅萬計宣布皇仁斯亦至矣勲徳碑大徳四年加太傅錄軍國重事内秉鈞衡外綜邊務位極尊崇股肱心膂之寄益重勲徳碑天祐皇元宗臣碩輔禀靈河嶽者不為不衆若夫忠藎傳家薦履上台績用著於累朝處中書十有二考惟公一人當其四罪咸服治底雍熙既彰世祖知人之明至于運佐重光元貞載造偃革以宅南交睦族以協萬邦拯災救患博施濟衆克廣聖朝安民之惠致君唐虞之效昭然在人耳目矣勲徳碑丞相順徳忠獻王王名哈喇哈斯威喇諾爾氏至元九年朝廷録勲臣後拜宿衛官襲號達爾罕二十二年拜大宗正二十八年拜湖廣行省平章政事大徳二年拜江浙行省左丞相是年入拜中書左丞相七年拜右丞相十一年夏陞和林宣慰司為行省王以太傅行省事至大元年薨年五十有缺王甫及嵗而識悟異凡兒目不視戲稍長善騎射毎聞儒者談輒喜中菴劉公撰勲徳碑至元壬申世祖錄勲臣後一見異之命襲達爾罕曽祖竒爾實勒遇太祖于飛龍見躍之際托果琳將襲帝趣告帝為備果至我兵縱擊大破之尋併其衆以功擢千户錫號達爾罕時官至左右萬户次千户非勲戚不與達爾罕譯言一國之長帝謂侍臣彼家不識天意故來相害是人告我殆天所使我許為自佐達爾罕矣祖考巴哩察使從睿皇取汴蔡滅金丙申分邑順徳考囊嘉特從憲宗伐蜀戊午薨于軍長宿衛百人夙夜共職惟謹嘗從獵馬躓傷面上直如常帝命醫視眷益重勲徳碑甲戌冬十月帝獵賽音布拉克語皇太子曰達爾罕非常人比可善遇之江左平賜亷欽二州益其邑勲徳碑乙酉拜大宗正時郡縣囚盗詐者上宗正决屬當遣使决死囚諸道王重按獄詞小不具悉令覆勘奏决者僅六十人耳尋赦免所活數百人大同民羣鬭毆鷹房三人死近臣以變聞帝怒亟遣王治止坐其首鬭者京師有以偽造禇幣連富民百餘家盡釋之保定諸郡旱民當輸米京師多以輕資就糴有司摭為姦欲没其産賞告者王得其情皆縱去曰舍貴就賤民便事集又何罪為勲徳碑柄臣擅威福益横知王惡已忌之數曲為邀致竟不一徃其家僮冒禁殺牛有司莫敢詰王置以法益忌謀撓王以多事奏請江南囚亦𨽻大宗正涖决王曰彼民間敎令未孚若一切繩之恐生亂帝是之而止勲徳碑辛卯帝念湖廣失治欲遣近臣徃莫宜王臺臣奏達爾罕在宗正决獄平即去恐難其人帝曰彼地朕嘗駐蹕治非斯人不可王遂行授湖廣省平章政事勲徳碑湖廣南陬交趾占城西南按南詔東連吳㑹境壤且萬里而八畨兩江蠻獠布溪洞間虺蛇起伏跳踉小戾則相讎殺攻剽無時故治視他省劇甚王至審利病度先後簡僚佐撫兵民威行徳流善遂頑革錢粟刑獄井井有條勲徳碑自宋時有巨盜嘯黨出没湖湘殆二十年不可制王選士付以方畧悉擒誅之江州𨽻江西省有猾民餌官府恣虐凡剽船江中羣盗皆與為根穴交通王知狀徑縛以來百救莫聴卒寘于死逺近震悚勲徳碑壬辰置行省樞密院兵民政分勢不相營奸冦伺發溪洞以王入覲列其不便罷之帝問王人言亷訪官反撓吏治朕已令視之卿謂若何王曰憲司職糾姦弊貪吏所疾妄為謗耳帝以為然勲徳碑邊將征交趾出其境王戒曰無擾吾民有奪民魚菜者杖其千夫長一軍肅然乃上奏曰徃年逺征無功民瘡痏未蘇乃復有事非國善謀也又發湖湘屯田廣西為圖交趾計王以徙民瘴鄉事固難成必且怨叛遣使密奏吏抱券請署不答俄使還報罷民大悦已而廣西元帥府請募南丹户五千屯田襟要謂士不死瘴癘餽餉有餘蓄實空荒之地為邕管之蔽制諸蠻控交趾其利有六王喜與之牛種農器置長統焉聞諸朝到于今便之勲徳碑湖廣舊無夏税柄臣援唐宋末世為徵王曰衰弊之政聖朝可行耶竟奏罷常澧辰等州大水漂民廬多死者王亟發廩為之賑慰凡災皆如之勲徳碑甲午春正月世皇登遐王謹斥侯戒不虞境内寧肅勲徳碑大徳戊戌九月朝于上都帝嘉其績授光禄大夫左丞相行省江浙視政凡七日綱舉七十餘事民風吏習翕然為變入為中書左丞相杭之耆庶伏地攀泣馬不得前勲徳碑王既當鈞軸益以天下自任每退㑹延見四方賔使訪以物情得失吏治否臧人材顯晦年糓豐歉採可行行之凡論議先以國典參以古制揆以時宜必當而後已其可否事猶化之運順無留滯惟不言利不喜變更一以節用愛民重名爵為務勲徳碑京都未有孔子廟而國學寓他署王喟然曰首善之地風化攸出不可怠乃奏營廟學嘗躬為臨視既成朝野瞻聳選名儒為學官奏遣近臣子弟入學而四方來學者益衆又郊祀乆未遑王總羣議奏行之勲徳碑辛丑同列以劉深議倡言世祖以神武開一統功盖萬世陛下未有伐國拓地之舉以彰休烈西南夷八百媳婦國弗率可命將徃征王謂山嶠小夷去中國遼絶第可善諭向化茍將非其人未見所利勿聽竟奏發湖廣兵二萬人丁壯役餽輓數十萬將失紀律果無功而還諸蠻要擊飢疫相仍比至將士存者纔十一二㑹赦有司議釋將罪王曰儌名首釁陷失士馬非常罪比不誅無以謝天下奏誅之勲徳碑癸卯秋拜中書右丞相王常言治道先守令至是選掄益詳時號得人定官吏贓罪十二章及丁憂婚聘盗賊等制禁獸户及山澤之利每嵗春大駕幸上都王必留守其重可知時帝疾連嵗權移中宫羣邪交扇勢焰翕忽王以身匡之天下晏然以無撓勲徳碑丙午加開府儀同三司監修國史置僚屬奏修功臣傳勲徳碑冬十有一月帝弗豫王入侍醫藥出總宿衛且理幾務諸藩王欲入侍疾王拒之勲徳碑丁未春正月宸御晚駕時武宗撫兵居北王封府庫稱疾卧闕下理幾務如故中闈以奸臣謀絶北道驛欲行祔廟禮王格其事密託授使問走踰兩驛始得傳馳報武宗諸懷詐者數欲害王王不為動内外懔懔視王以安㑹仁宗擒滅其黨發使迎武宗四月仁宗及皇太后如上都繼徃五月武宗即位加太保錄軍國重事勲徳碑和林控北邊始置宣慰時諸部落降者百餘萬口乃罷宣慰詔王以太傅為左丞相行省事賜禇幣十五萬黄金贏十二鎰白金三千五百兩帛四百端乳馬六十匹至和林獲盗米商衣者即斬以徇攘竊屏息行旅為便分遣使發廩賑降口復奏請錢七千三百萬緡帛稱是易牛羊給之又給網數千令取魚食逺者厄大雪金山命諸部置𫝊車相去二三百里凡十傳餽米數萬石牛羊稱之又度地立兩倉積米以待來者全活不可勝紀有飢乏不能達和林徃徃以其男女弟姪易米以活皆贖歸之和林嵗糴軍餉恒數十萬主吏視利繆出納囊槖滋弊乆矣立法遏其源稱海屯田廢弛重為經理嵗得米二十餘萬斛益購工冶器擇軍中曉耕稼者雜教部落又浚古渠溉田數千頃糓以恒賤邊政大治勲徳碑至大改元帝賜大帳如親王制諸藩禀命戎事則宴之仍賜酒米百斛天下傾耳以俟復召是冬十一月遘疾召其屬曰吾不起矣不得報國矣汝曹各自勉此間金糓勿遺朝廷慮其屬以聞帝驚愕命醫偕其子托歡行以閏月某日薨于和林天雨木冰連日帝大傷悼敇大興尹買葬地于平陽山南原曰使天下後世知吾賢相爾勲徳碑王神宇靖偉簡重寡言不見喜愠望之儼然知其為公輔器其在宗正也從世皇北廵平宗王亂初入叛境王率三百騎猝與敵遇徐整騎突出敵背連彀矢殪數人敵披靡帝壯之其在中書也引儒生討論墳典至堯舜禹湯文武之為君臯陶稷契伊傅周召之為臣歎曰人生不知書可乎擇儒士教其子學由是而觀王之文武志畧本乎天性奮身逢時發于真誠故其功業之見于世剛明正大巋巍煒曄如此嗚呼古之所謂大臣者王無愧矣勲徳碑皇元聖聖相承天祐生賢相將臣炳烈相望人才於斯為盛若夫懷逺圖而畧近功先大網而後小數藴江海之量負山嶽之重不威而令行不言而人服處難而無所惑履變而不可奪端委雍容而朝廷尊安天下受其賜惟忠獻王其人乎勲徳碑平章魯國文貞公公名博果宻喀喇氏由國學生擢利用少監出為燕南提刑按察使召為參議中書省事歴吏工刑三部尚書拜翰林學士承㫖至元二十八年拜中書平章政事三十一年出為陜西行省平章政事將行留為昭文館大學士平章軍國事大徳二年加行御史中丞領侍議司事四年薨年四十六喀喇則漢髙車其國屬質貴族子十人雅克章最少世祖時猶王也莊聖太后遣之入侍嘗同卧起寒暑飢渇曽不告勞公其元子㓜事裕廟於東宫後因簡拔衛士子廩以官帑俾師賛善王恂公在其間恂從北征太傅魏國許文正公辭中書左揆拜集賢大學士國子祭酒敇冑子與嘗游恂門者皆從之學公年十二頴慧强敏志力兼人太𫝊非旬休不至家恐妨授徒每令諸生直日以謝客至公則持書崇朝永夕坐中門不移否則擁篲掃灑褰簾操杖出必乘馬導前無馬徒從循循安之其敬以孝猶子事父唯恐斯須仁義之言不聞道徳光輝不接也太𫝊異之易其國言博果宻者為時用字用固已見於世矣他日誦説餘力纂記為帙上起唐虞下逮遼金帝王名諡統系嵗年在位乆近皆能闇誦帝嘗試之立應無滯牧菴姚公撰神道碑舉國學士驛致上都歴官中書慎密練達擢少利用監出燕南河北道提刑按察使尋真為使或訟静之守臣盗官帑廩静𨽻河東山西道彼自有使刺不遣俾公即按歸報合㫖賜白金千兩鈔五千貫神道碑二十年宣政使僧格方見隆寵茶漕盧世榮阿以進言臣能使天下賦入倍其舊十帝以問公對曰漢唐聚斂之臣如桑𢎞羊劉晏世主初亦賞其納忠及後富國病民怨歸於上而始加誅雖足少謝天下而亦貽議千古臣願陛下無納其謀帝勿善之以世榮為中書右丞俾公參議省事公辭以疾世榮纔一年敗誅帝前公曰朕甚負愧于卿神道碑河東山西道憲使貸母錢府約嵗輸羊為角如千千馬為蹄如千百至則悉賦所部州縣而抑其估為民所訟勑公鞫於大同入境嵗荒發廩而始治獄得其不法百餘事罪當死服辭皆具邇臣與有私者為之解脱顧讒公以問獄行不俟報可而擅發廪率代違制帝曰出使之臣身見嵗惡須請而發民殍死矣何罪唯移囚至京師公節陳款辭百無一遺制人覆問使搒掠汝乎對以未嘗曰未嘗則汝受其辜何枉遂尸之市神道碑戰將某有功北陲求欽察之奴入者皆令為兵頴已麾下制可乃多取編氓入籍中書遣僉行省臣王國用覈之為所釐正什七彼遂讒其專行不奉詔帝怒斬之刑曹受成命矣公入陳勑惟以欽察之奴入者出而為兵未聞以編氓隷欽察或西域河西諸人例此雜取編氓以益其軍則天下之户耗矣國用之忠宜旌何事而誅譬解數四而免神道碑北京地大震陷城郭壓死人民不可紀極勅遣一國人為平章振卹之即其地娶三妻歸公入言既失上遣大臣救災之㫖且觖民望其人庭辨不服至以詈婦人言者相加公曰汝妾事盜殺臣之子又為盜殺臣制服孰為非夫孰為非夫其人汗愧噎黙莫對㑹太官將牛舉皆趨出帝顧謂左右曰若人平時似不能言及其辨事吐詞鋒出人有不及嬰者神道碑二十四年僧格憤中書殺世榮奏立尚書省盡統中書六曹誣殺㕘政楊居寛郭佑中外為之不寒而凛大為勾考無遺利矣勢焰薫天求及門者如輻輳轂自平章而下省退則送歸其第一旦獨延公至堂貌敬而忌忮日深諷巨商為公訟寃入大珠貨公力拒不受伺其退食必欲罪其不坐刑曹闔省叩請而免遂疾帝還自上都輦其弟伊埓薩巴謂曰而兄必以某日來迎果以其日公立道周見其孱瘠曰卿躭苦于書致者顧當國臣問禄幾何對以滿病告者率不給帝曰其父童丱事朕恪勤至死是又朕所教育貧不能家何以告為其盡以給且厚賜之神道碑二十八年僧格伏誅帝畋漷北召至行殿廢是省還六曹中書欲用為丞相公辭丞相惟國人宜為曩籍盜殺臣獲黑簿賄既入悉其家主名東宫之臣唯無諤勒哲帝嘗譽曰佳兒我將賚汝如斯人者宜為乃以為中書丞相拜公平章政事恩眷日隆大政疑令動見諮諏引右丞何榮祖同平章屏棄凶邪崇拔善良飭為吏者皆親經術一蠲苛虣之法人心熙洽以為復見中統至元初治神道碑時方改提刑按察為肅政亷訪上都留守司茂巴爾斯不便之入言同知西京臣言河東山西亷副受賕楮帛為千者五十欲因以廢諸司帝召問公奏曰是事誠有彼何為不陳省臺上都留司何與而知此必告者得罪其司為此誣言緩其事耳設亷副受財罪止其身天下憲司何與而盡去之帝意乃釋神道碑中書平章敏珠爾丹請復立尚書省專領户工刑三部召公至上都議公詰曰阿哈瑪特嘗以領部分中書户工敗為制國用使又敗為尚書省又敗則併歸中書終以奸賦狼戾以取誅籍後僧格立尚書省盡奪六部其威虐貪墨益極亦就梟夷既廢復置將效尤兩人耶制是之神道碑達喇哈求徵考中書錢穀逋懸省臣請入止之公曰無庸急則宸衷必疑有所覆䕶宜聴其為若曹小人旋踵而敗未旬月果以賄誅神道碑或請征海國琉球與加包銀江南公曰吾元疆理天下四表之間横目窮髪何所不臣何資魚鰕之國始廣土衆民哉况冒至險航不測出萬有一安之途未必利也始包銀出於河朔永平真定守臣以公需數斂煩民㑹其嵗費徵之以紓急一時其後天下例之至憲廟定制户率賦銀四兩中統唯聴如數八寳鈔輕其舊之半今江之南履畆而税輸酒醋課及他鄉里門徭水馬驛遞又増包銀則重斂矣民將不堪為之止神道碑公每上直從容獻納疑者釋危者安誣者得以白上嘗諭為君之難以一身臨四境統萬機一或逸弛則民受其殃公對曰誠如聖諭向使在昔帝王咸知儆戒力行善政則羣生何患不遂哉又諭老臣有言天下事如圓枘方鑿能少見之無徃不可公曰人臣當以身徇國難易在所不計廢道違忠以求耦從則國家奚所賴耶上竒賞之瓠山王公撰墓誌癸巳冬彗出東北上夜坐齋宫延勲舊大臣問所以弭之之道既退公獨前奏臣聞之師天象垂儆代有之聖帝明王遇災者懼漢孝文二年日食詔求直言輔不逮辭切義正具在方冊乃誦其辭甫至天下治亂在予一人惟二三執政猶股肱也其悉思過失丐以啟告務省徭費以便民上拱坐以手加額曰朕誠意已萌卿其覼誦之諸大臣復進令再誦公奏曰聖人之心與天地通災不難弭若僧格者素㨗給特試用之纍纍姦惡肆毒吏民中書不敢詰臺察未嘗糾因一人之言即正其罪天下稱快臣知聖心與天地通而漢文亦所不及今星芒之儆咎在臣下詳論款接自四鼓逮翌早進膳輟盤珍手賜之其忠懇之志應事敷言類如此墓誌三十一年帝不豫故事非國人元勲子孫已極貴者不入侍惟公嘗藥以及彌留無頃刻不在側有少故出猶必求之其後格天發引成廟繼極其為升祔太室請諡南郊皆公領之上以先朝舊臣猷為倚毗禮遇益優詔令修行法制因革皆出其手神道碑大徳二年加行御史中丞乃力新風紀推擇士子有令望者皆置亷使為政不皎皎以干譽惟存大節一遵初立詔以行不繁其令一郡守子受賕迫使證父公曰持憲之臣職在宣化清俗所以厚人倫也今使證父何以興孝天下罪其子引父視人已靦面目有密臣取人玉帯惟奏入贓廢棄終身令史輕之則曉曰大臣貪墨古人唯曰簠簋不飭盖不忍著惡非茍私之所以勵亷恥也今而曰輕將與小夫賤𨽻同辱乎非刑不上大夫古人制律之本也人多其平恕神道碑四年徽仁裕靈太后崩公因過哀所苦増劇上使其弟實達爾圖偕尚醫視之知其無及但附奏謝而已乃申顧視索酒滿引數觴以薨天子震悼逺近士大夫撫几伏筵哭失聲曰縫掖方以扶掖聖道仰如喬嶽不謂今也無依徃矣哲輔亡矣朝固有位其相也非吾黨矣行矣將誰尚矣都城之民為之罷市神道碑公自為相左右兩朝位至軍國顯融極矣被服唯儒生公退未嘗廢書自號靜得得君而不恃得人而不滿居髙位自卑若不足天下視其身進退為廟堂重輕者十年神道碑公經徳迪慮明允篤誠動叶矩度而未嘗為近名之事至于故舊之義雖乆不踰奬拔士類寸長必録其行業表表當百世不冺墓誌平章武寧正憲王王名徹爾揚珠濟達氏由宿衛擢利用監卿至元二十八年拜御史中丞明年拜福建行省平章政事大徳元年拜江南諸道行御史大夫七年拜江浙行省平章政事九年入拜中書平章政事是年薨年四十七公生六嵗而孤母夫人蒲察君介介自持動以禮節親戚不干以非義教子讀書天質粹美不勤外傅六經二氏悉涉源委以故聰明開益日多才畧兼人恒以匡君經國自期牧庵姚公撰勲徳碑至元十有八年入見帝賜之問而竒其對進侍帷幄時詢民情細微敷告無隠神道碑一諸侯王稱兵東北帝自將征入其地矣軍中夜驚公出撫遏人識其言喧嘩一寂跳梁既平為奏兵餘之民艱窶剥膚不賑恤之將不生活賴賜穀帛牛馬脱寒飢者亡慮數十萬人神道碑擢利用監古武庫也匪簡在帝心者不以付之神道碑二十有三年詔求逸遺于江之南且省其俗時相方急治賦鬻民學田官有其直令既行矣公則止還諸學用為完廟養賢之須歸以事聞制甚嘉可神道碑二十有四年僧格分中書庶務立尚書省初為平章後為丞相凡昔盗殺臣為領部為制國用使為尚書省所逋錢粟併歸中書舉誣為中書失徵殺其二相大為計局鈎考毫釐諸省承風鄂省已極浙省尤酷延蔓以求失其主者逮及其親又失代輸其隣追繫收坐岸獄充牣榜掠百至或關夫三木責妻市酒以償民不堪命自經裁與瘐死者已數百人虐焰薰天諸王貴戚亦莫誰何無不下之獨公數其奸贓帝初未然益犯威顔言色俱厲帝以為醜詆大臣失幾諫禮怒遣左右批其頰辨為不止曰臣非有仇於彼而然直不忍其罔上自私敢因雷霆一擊遂爾結舌使明帝有不受言之名臣實憤恥帝意始釋命將衛士百人控鶴倍之入籍其家得金寳衍溢棟宇他物可資計者將半内帑罪既彰白始鈐其人諸繫計局者皆出之又命籍黨惡浙省諸臣平章左右丞參政烏瑪喇默埓實都王濟等家併僧格之姻鄂省約蘇穆爾皆醢以謝天下以成其獄凡四過徐不入其家為帝所忠怒御史臺臣不善肇惡坐觀致此其自當汝罪皆曰奪職追禄杖三者唯命江浙平章夙有怨于臺乘其慿怒自傍激之謂湖北亷使功臣諸孫盗燒鈔八百定堂帖二十下容姦數年賦終未入花案帝前示曰稽是可見悞裂巻為兩縫留半印公曰縫用印者以杜罔欺汝為宰相持半印案以訟人餘半烏在其人言塞帝顧罵而起臺辯始釋神道碑拜平章政事行省福建賜為兩金五十銀五千令行禁止民便安之惟河漳劇盗積未平公身傳諸戌之兵申明約束不貪勝不蹂禾稼不入民舍惟張皇武威過柵不攻示以整暇晝則合圍山中夜則税野偃旗仆鼓賊或偽降覘其何為乃豐酒肉飲食曉曰汝昔由不堪汙吏侵暴潛逃居此能棄險而還耕桑則平民矣吾安忍被汝反名而加誅夷寡人之妻孤人之子獨人父母而利其財悉縱歸之他柵聞者相率以出其渠歐徇日浸南犇大兵隨之偷生塢中其黨縛致于軍血鋒刃者纔是一馘自是方三千里枹鼓不鳴正席其堂畫諾而已神道碑帝不豫公歸京師嘗藥晨夕俄然賔天與諸侯王大臣定策禁中遣使逆成宗龍庭入踐天位神道碑大徳之元拜江南諸道行御史大夫一日召其都事賈鈞謂曰明詔責使肅清宣明風俗教化而刀筆流為御史者肆為苛虐惟急徵贓以多為功至迫子證父妻證夫弟證兄奴告其主敗風敎者我實行之汝宜以是出訓其屬帝聞之以為得職風紀大體微意栢臺神道碑七年改浙省平章政事其治如臺門無私謁以轉粟京師多資東南居天下什六七而松江填淤嵗乆富民利之當水出全築為圍田以故瀰漫浸灌沮洳曠逺民不可稻公發卒數萬浚决後乃堤之導水入海使復其故公身董役經時而成民得良田若干萬頃至今賴之神道碑松又吳松江記云嵗甲辰前海運千夫長任仁業以吳江故道陻塞使震澤之水失其就下性為浙西居民害垂二十年慨然上疏條其利病疏導之法中書省以聞特令平章薩哩公董其役公乃相其山川形勢之宜髙深廣狹之度工役之數錢穀之資畚鍤之用飲食之需令民索陶乘屋厚藳秸以防其卑濕為醫藥以防其疾疫時作勞者無倦怠上以誠感下下以誠應上民乃歡呼四集樂功謀始于大徳八年冬十二月望前二日西自上海缺缺舊江東抵嘉定石橋洪迤邐入海長三十八里一十步三尺深一丈五尺濶二十五丈役夫為數一萬缺月缺十有竒至九年二一百六十五萬一千六百七置閘竇啟閉諸務時無疵癘民無夭閼而事竟九年召入平章中書賛右丞相專力一心爕和庶政希致隆平纔一寒暑責異已相曰帝不豫而乃阿中專决吾誠不忍汝見敗國以喪元也遂疾不出以十月八日薨立朝之士在野之民齎咨咸曰古人有言昊天不弔殱我良人矧鉅臣哉盖棺之日稽其家褚緍不滿二百而債券積多至十萬大臣清貧無公比倫足昭炳白樂施為仁不富之實既貴顯矣妣夫人杖之受不敢逃其孝又何如也神道碑元名臣事畧卷四
