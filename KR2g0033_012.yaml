body:
  text: 元名臣事畧巻十二元蘇天爵撰内翰王文康公公名鶚字百一開州東明人金正大初中進士第累擢中書省右司員外郎金亡居保定嵗甲辰召居王邸中統元年拜翰林學士承㫖奏立翰林國史院詔從其請至元五年致仕卒年八十四公幼頴悟讀書日記千餘言終身不忘長工詞賦有聲場屋年十九由東平貢禮部再薦科名㑹河朔亂舉家南渡流離頓挫中身愈困而學愈力故其成就有過人者正大甲申登詞賦第一甲第一人始公之生有大鳥鳴于庭鄉張先生大淵號博物見之曰此鶚也因為制名字曰百一盖取鷙鳥累百不如一鶚之義且語人曰此子後有大名當居百人之一迨及第果魁百人矣釋褐賜緋受奉直大夫應奉翰林文字同知制誥兼國史院編修官再考改歸徳府判官兼城父令下車之後立教條正風俗未幾政成吏畏而民安之廉司以治聞遷同知申州事兼汝陽令政聲籍甚俄丁内艱金主遷蔡起復尚書省都事陞右司員外郎兼翰林修撰金主見公言事深中時病惜其柄用之晚太常徐公撰墓碑蔡䧟萬户張柔素聞公名輦之北渡館于保州者餘十年深自韜晦若將終身焉墓碑上之在潜邸也好訪問前代帝王事迹聞唐文皇為秦王時廣延文學四方之士講論治道終始太平喜而慕焉甲辰遣故平章政事趙璧今禮部尚書許國相首聘公于保州從人望也公自以亡國纍臣義不可再仕辭疾者久之已而就道既至上一見喜甚賜之坐呼狀元而不名朝夕接見問對非一凡聖經所謂修身齊家治國平天下之道無不陳于前上為聳動嘗諭公曰我今雖未能即行安知他日不行之耶墓碑公北行時故人馬雲漢以宣聖畫像為贈既至北庭適值秋仲奏行釋奠禮上恱即命辦其事公為祝文行三獻禮禮畢進胙于上上既飲福熟其胙上下均之其崇敬如此自是春秋二仲嵗以為常凡所以尊師重道者實公啟之李愷撰言行錄丙午春正月辛夘朔日有食之上問公應受賀否公以富弼故事對遂罷宴撤樂明日始受賀言行録上留公漠北二載恐年老不可再歴冬寒召公謂曰朕欲遣人送子歸南子何所欲公對曰臣本閒人誤䝉寵召待遇甚厚亦已幸矣復何欲之有但願吾王好賢樂善之心有加無替則臣之受賜豈有量耶言行録庚戌春憲宗遣故㕘知政事李舜咨以安車來徴公同玉峯魏璠應召訪及軍國大計稱㫖將任以政公力辭而上龍飛特授公翰林學士承㫖公遂舉李治李昶王磐徒車公履髙鳴徐世隆同為學士公視諸老學最博言最切直若政之美疵事之可否人之賢不肖皆極言正論無所顧忌至于主盟吾道奬進後學推轂人材布列閣臺紀綱法度文物典章焕然一新墓碑公奏言自古帝王得失興廢班班可考者以有史在我國家以威武定四方天戈所臨罔不臣属皆太祖廟謨雄斷所致若不乗時紀録竊恐嵗久漸至遺㤀金實録尚存善政頗多遼史散逸尤為未備寧可亡人之國不可亡人之史若史館不立後世亦不知有今日上甚重其言命國史附修遼金二史墓碑邸又言行録云初公侍潜屢以史事為言嘗舉楊奐元好問李治冝令秉筆至是公申説命立翰林國史院時元楊已物故又舉李治及李昶王磐徐世隆徒單公履郝經髙鳴為學士楊恕孟攀鱗為侍制王惲雷膺為修撰周砥胡祗道孟褀閻復劉元為應舉凡前金遺老及當時鴻儒捜括殆盡矣公又言學校久廢無以作成人材宜選博學洽聞之士提學各路學校嚴加訓誨以備他日選用上可其奏為立十路提學舉校官墓碑是時任賈覘以錢穀事夤緣為姦欲乗隙取相位求薦于公公奮然曰即欲舉此人為相吾不能插驢尾矣我以衰老之年無以報國忍肩此耶後數年竟用為相竊靈威神無所不至為王著刺而殺之商文定公撰先瑩碑至元五年春屢有微恙懇乞致仕詔允其請然有大事則遣中使就訪焉又勑有司嵗給廪禄迄其終身墓碑十年八月公薨上聞之嗟悼且問臨終語左右以不用釋老㝠錢為對公無恙時嘗謂世俗以緇黄之言為遺囑嘗思昏亂其言非復可從故自七十以來手書治命嵗一更之預為戒勑嗣子之綱庀治後事俾身後有所遵守如釋老㝠錢之弗用皆治命云墓碑十五年秋九月翰林承㫖和爾果斯前中書左丞張文謙奏請狀元藩邸舊人嘉言嘉猷于國多所禆益今已云亡在典禮宜有封諡詔特贈諡曰文康墓碑公愷悌樂易無城府崖岸愛交游喜施舎家釀法酒客至輒留飲談笑終日氣不少衰在翰林十餘年凡大誥命大典冊皆出公手以文章冠海内而未嘗談文章嘗謂門人曰分章稱句乃鯫生舉子之業求之于致知格物之理則懵如也為已之學當以窮理為先故一時學者翕然咸師尊之如中書左丞庫庫子清右三部尚書柴禎輩皆出公門墓碑公向侍王邸嘗請𦵏祭金主許之及達許陽求訪百至闕遺公可闕但具牛醴表誄為位以𦵏哀動蔡人其大節如此墓碑内翰王文忠公公名磐字文炳廣平永年人金正大中登進士第中統初擢益都等路宣撫副使王師圍濟南叅議行中書省事遷翰林直學士為真定宣慰使至元元年復召入翰林尋兼太常卿進拜承㫖居翰林一十年累乞致仕不許年八十二始遂所請又十年卒年九十二公自幼志趣不凡為學即知自勉金遷都汴舉家南渡河居汝之魯山既冠聞堰城府徴君九疇為時名儒裹糧往從之學勤苦百至擢正大四年經義進士第授歸徳府録事判官不赴自是為學益力涵泳經史漸浸百氏發為歌詩古文波瀾閎放浩無津涯邈乎其不可窮也嵗壬辰河南受兵避難南走襄陽宋制置司素知公名署議事官丙申襄陽難作公孑身北歸至洛西適楊中書惟中被命招集士流一見喜甚録其名授以告身惟所欲往遂北㳺河内居亡何值王榮之變去隠共山尋遷闕令東平總管嚴公興學養士虚師席迎致公師道尊嚴望之若莫可梯接及即之溫然和懌隨問隨答亹亹忘倦其辭約其義明學者于句讀抑揚之間已得之矣受業者常數十百人往往為名士居數年更游齊樂青社風土遂有定居之志野齋李公撰墓誌中統建元拜益都等路宣撫副使頃之以疾辭去二年春璮萌異志公覺之柴車載妻子潜出挺身走濟南遂乗馹至京師時王文統始伏誅朝士惴恐不安公至侍臣以聞上即日召見詢問再四嘉其誠節王師圍濟南上知公家在圍城中授㕘議行中書省事日圖軍務一語不及其私及亂平挈妻子來居東原墓碑拜真定順徳等路宣慰使禁戢奸邪援植善良民賴以安先是衡水監縣䝉古岱挾勢行私所為不法部民趙清發其奸訴諸有司既具伏矣監司之至也其妻懼謀盡去趙氏而滅其口賂家人醉以酒暮夜潜入清家清逃匿獲免其母及妻子殱焉清來訴權要不為申理且欲易其獄辭公曰誠若是死者何辜竟奏擬寘諸法籍其家資以其半付清真定賈胡有稱貸取息者不時償則逮繋私室榜掠桎梏恣為威虐人不勝酷目之曰閻羅王數干撓公府同僚畏葸惟所指麾公正色詰責呼伍伯捽抑以出撻之數十時治事西北城上命擠之投諸地郡人稱快迄公去不敢復然墓碑至元七年春復徴拜翰林學士入謁宰相首言方今害民之吏轉運司為甚至有稅人白骨使民間舉殯不得改𦵏者宜速罷去以蘓民困已而運司果罷墓碑權臣阿哈瑪特秉政諷大臣奏言尚書省當併入中書拜右丞相安圗為三公盖名示尊崇實奪之相權奉㫖㑹議公言兩省合而為一命右丞相總統之為便如其不然則兩省姑宜依舊三公既不與政不宜虚設權臣私論為之沮止墓碑兼太常少卿時官闕未立朝議未定凡遇稱賀臣庶無問貴賤皆集帳殿前執法者厭其多揮杖擊之逐去復來頃刻數次公慮為外國笑上奏曰按舊制天子宫門不應入而入者謂之䦨入由外及内罪輕重各有差宜令宣徽院籍兩省以下百司官姓名各依班序聴通事舎人𫝊呼贊列然後得進有敢越次者殿中司糾察罰俸不應入而入者宜准䦨入治罪庶望朝廷禮肅後遂定朝儀如公言又言曲阜宣聖鄉望財廟所在前代給百户以供洒掃國朝因仍皆蠲復百家嵗賦為鈔不過六百兩僅可比朝廷一六品小官之俸給聖朝疆宇無外嵗入財賦以億萬計詎肯惜一六品官俸不以待孔子哉于府庫所益無多于國體所損甚大初朝廷給林廟洒掃户百復其家至是尚書省臣括户悉収為民故公言及之墓碑九年上聞天下獄囚滋多勅諸路自死罪以下皆縱遣之期以秋七月來歸京師受刑及期皆至上惻然矜閔悉原其罪其後詔詞臣草詔將戒諭天下而不宣㫖意久之皆不稱㫖公乃以釋囚之意命辭進讀上喜曰此朕心也欲言而不能形之于口卿能為朕言之嘉奬不已墓誌十年再乞致仕詔不從仍舉宋衛雷膺魏初徐琰胡祗道孟祺李謙冝居翰苑墓誌國子祭酒許衡將吿歸上命中書左丞張公謙問公公言自古有國家者必與人材共治若無學校人材何從而得育許某教生徒有法數年之後皆可從政事體所繫至大某性亷介意其所以求退者得非生員數少坐縻廪禄有所不安而然耶宜増益生員使之進學庶幾人材有成某之受禄亦可以少安矣詔從之墓誌十一年秋患腰膝痛艱于行步家居養疾上遣使存問賜以名藥公嘗言前代用人四十從政七十致仕所以用其材力閔其衰老養其亷恥之心也今入仕者既不限年而衰老病患者或至扶舁抱負而登㕔堂其人既自不知恥朝廷亦不以為非甚不可也毎遇㑹集議政之際數數及之故自始得疾即自停俸月餘歴冬迄春屢乞致仕上遣使諭之曰卿年雖髙非任劇務第坐教人耳何以許為仍諭㫖右丞相王學士素著忠順之節禄之終身可也復詔有司盡給所停俸公不得已復出國有大政必咨訪而後行墓誌有詔集百司問鈔輕物重事學士王文炳對曰物貴則不足物賤則有餘要以節用而不妄費庶物貨可平玉堂嘉話時方伐宋當用吾全力庶可一舉殄滅若復分力于東夷恐曠日持久功卒難成俟宋滅徐圖之未晚也墓誌江南既下公言禁戢軍士選擇官吏賞功罰罪推廣恩信所以撫安新附消弭冦盜之策甚備皆畧施行之墓誌十三年冬朝議欲汰冗官權臣以不便按察司欲因之省去公奏䟽曰外路州郡去京師遙逺濫官汙吏侵害小民無所控告惟頼按察為與申理若指為冗官一例罷去則小民寃死而無所訴矣若曰京師有御史䑓足以糾察四方之事是大不然御史臺糾察朝廷百官京畿州縣尚有不及况能周徧外路千百城之事乎若欲以按察司併入運司今之運司専以營利増課為職與管民官恒分彼此豈暇顧細民之寃抑哉臣以為存之便按察司由是得不罷墓碑自江南撫定賞賜有功但遷加職位有至宰執者二十餘人因議更定官制公奏疏曰歴代制度有官品有爵號有職位爵號所以示榮寵職位所以委事權臣下有功有勞隨其大小酧以官爵有才有能稱其所堪處以職位此人君御下之術也臣以為有功之人冝加遷散官或賜以五等爵號如漢唐封侯之制可也不冝任以職位墓誌十九年王師將大舉伐日本公入諌曰日本島夷小國海道險逺勝之則不武不勝則損威不伐為便時軍行有日矣上以為非所宜言天威震怒謂公曰此在吾國法不當言者汝有他心而然耶公對曰臣赤心為國故敢有言若有他心向者何為從叛亂之地冒死歸國乎且臣以八十之年又無子息有他心欲何為耶遂出翌日上遣侍臣以温言慰撫使無憂懼墓誌二十一年公以年老願乞骸骨以歸丞相和爾果斯以聞詔允其請進資徳大夫致仕仍給半俸終身前行之一日公卿百官供張祖餞明日皇太子賜宴于聖安寺公卿百官送至麗澤門外仍命其婿仕于其府以便奉養大臣燕見上數問公起居狀公恬愉静黙家事不復闗白者凡十年墓誌公性剛方凡議國政必正言不諱雖上前奏對未始將順茍容上嘗以古直稱之夙有重名持文柄主盟吾道餘二十年天下學士大夫想望風采得被容接者終身為榮言論清簡義理精諳世之號辨博者方其辭語縱横援引徴據衆莫可屈公徐開一言即語塞不敢出聲為文冲粹典雅得體裁之正不取纎新以為竒不取隠僻以為髙詩則入事遣情閒逸豪邁不拘一律程朱性理之書日夕玩味手不釋巻老而彌篤燕居則瞑目端坐以義理養其心世俗紛華畧不寓目惟喜作書晚年益造精妙筆意簡逺神氣超邁自名一家持縑索書者繼踵于門應之不少拒世得遺墨争寳藏之墓碑尚書李公公名昶字士都東平項城人金興定中登進士第國初為東平嚴侯幕官中統元年召至京師明年以翰林侍讀學士行東平路總管同議官至元五年召拜吏禮部尚書七年除南京路總管不赴八年起為山東東西道提刑按察使遂致仕歸二十六年卒年八十七公㓜精敏六嵗知讀書性澹静講學之外一無所好年十二三為程文下筆為時輩所稱初教授君困躓場屋一夕夢在李彦榜下登第數名詢計偕之士無之因以命公年十六業成質幹清癯甫能勝衣將從教授君赴春闈儕輩或少君教授君不恤也及期肆筆數千言比亭午已脫藁典試者見其敏給大加賞異命下公中本經第一教授君果居其下且意義褒貶其所取各異人以比歆向父子釋褐調孟州溫縣丞未赴寓陳之項城聚書深讀務為無所不聞仍手自抄録為日課不輟野齋李公撰墓碑金亡公奉親還東平嚴武惠公一見待遇加禮授行䑓都事凡入覲出征不令去左右行臺罷改行軍萬户府知事武惠薨今中書右丞忠濟嗣改升公經歴東平大府民繁事殷公處贊襄之任圖慮深逺未始依違茍從平章宋公時居幕長議論率與不合若府政得失民生利病屢為嗣公言之居數嵗同列者趨向不同移疾求去㑹丁教授君憂即杜門不出服除嗣公不欲以幕僚相屈為公師席躬率僚屬問經傳多所開益魯諸生執經受業者前後非一墓碑己未上將伐宋次濮陽召公問治國用兵之要于治國則以用人立法賞罰君道務本清源為對用兵則以伐罪救民不嗜殺為對上嘉納之墓碑上即位建元中統馹召至京師時備諮訪凡國政可否知無不言其年冬車駕北征徴需煩索行中書省科取稅賦雖逋户不貸公移書諸相某畧曰百姓困于弊政乆矣聖上龍飛首頒明詔天下之人如獲再生拭目傾耳思見太平半年之間人漸失望良以渴仰之心太切興除之政未孚故也側聞欲據丁巳戸籍科徴租稅比之見戸誠加多賦六七且止驗見戸應輸猶恐不逮復令色補逃故必致艱難茍不以撫字安集為心惟是供億則諸人皆能之豈聖上擢賢更政之意哉省府為蠲遮戸之賦墓碑二年春内難平公上表稱賀因示諷諭曰患難之作上天所以存警戒願日新其徳雖休勿休雖勝不矜功成不有選官以脩政崇儉以養民恒以北征宵旰之勞永為南面佚豫之戒上為斂容擢用有期屬東平萬戸嚴忠範代其兄為本路總管奏請公偕行將師用其言詔授翰林侍讀學士行東平路總管同議官墓碑朝議令老疾輸賦公貽書省府曰聖人即位之初凡鰥寡廢疾之人命所在優恤去嵗省府常有榜諭俾給粮収養旬月之間一予一奪非所以示信于民也從之墓碑至元五年詔起公吏禮部尚書格品條式選舉禮文之事多出公裁定宰相素重公凡有集議必置之上座傾聴言論㑹制府有升省之議遂請老而歸墓碑八年拜山東東西道提刑按察司務持大體不事苛細一出按行則致仕不復出墓碑公資簡重後生小子望之若莫可梯接及前則睟見于面樂于誨誘有所問則叩竭終始無所隠或不可與言則未嘗妄交一語薄于世味毎以安恬退處故其居官日淺而未嘗作期月留也家居安坐一榻書史滿前窮日夕不少厭墓碑太常徐公公名世隆字威卿陳州西華人金正大中登進士第國初為東平行臺幕官中統元年拜燕京宣撫使三年除闕卿至元元年遷翰林侍講學士兼太常卿又兼戸部侍郎七年拜吏部尚書出為東昌路總管擢山東道提刑按察使十五年移江北淮東道十七年召為翰林學士又召為集賢學士皆以疾辭不行二十二年年八十公生而頴悟七嵗入小學應對進退輙異常兒年十五有賦聲二十二登正大四年進士第京朝官交章辟公為縣令朝請遣人辭焉且戒公曰汝年少學未至毋急仕進更當多讀書涉獵徃事以益智識候三十入官未晚也公奉教為學益刻厲經史諸子百家靡不研究壬辰之亂朝請殁癸巳河南破公輦太君北渡河嚴武惠公知公名招致東平幕府俾掌書記公勸武惠収養寒素一時名公多歸焉故東平人物之盛為諸道最武惠薨嗣侯襲職署公詳議雖贊佐侯實師之先帝即位之嵗置總六部于燕京以公充勾𣙜燕京路課稅官公謂理財非所能也力辭而歸墓誌大元受天命肇造區夏列聖相承未遑文治上在潜邸獨喜儒士凡天下鴻才碩學往往延聘以備顧問壬子嵗自漢北遣使來徴公見于日月山之帳殿上方治兵征雲南問此行如何公對曰昔梁襄王問孟子天下惡乎定孟子對曰定于一又曰不嗜殺人者能一之夫君人者不嗜殺人天下可定况蕞爾之西南夷乎上曰誠如威卿言吾事濟矣是嵗雲南諸處降上既登極毎有征伐必諭以不殺于是四方禀正朔之國願來臣屬者踵相躡于道十餘年間際天所覆咸為一家土宇之廣開闢以來未有也不嗜殺人之效其㨗若此然一言寤意皆自公發之墓碑東平自武惠公時得亡金太常登歌樂有㫖取觀公典領以行既見上欲留公公以母老辭遣尚書柴公送公還又明年令叅政商公用東平經歴赴召北上嚴侯遂令公代之公既正位幕長軍民之利害公事之得失知無不言其所救正者非一墓誌中原板蕩之後鄆學乆廢嚴侯修復以養生徒公慫惥之力居多又嵗署題考試等其甲乙屢入髙選者擢用之時自入學親為諸生講説其課試之文有不中程者輙自擬作與為楷式一時後進業精而行成人才輩出焉如翰林學士閻復太子諭徳李謙浙東按察使孟褀禮部侍郎張孔孫太子贊善瓜爾佳之竒等是也墓誌中統元年擢公燕京等路宣撫使京師久號難治下車以新民善俗為務車駕往還貴近迎送百色供億從容以辦中書省檄各路常養禁衛之贏馬數以千萬計芻秣與其什器前期咸備公曰國馬牧于北方往年無餉于南者上新臨天下京畿根本地煩擾之事必不為之馬將不來吏白此軍需也其責不輕公曰責當我坐遂弗為備馬果不至津滄鹽課前事改虧不及額公綜覈之得増羨若干勑賜白金三十笏以嘉其能墓誌二年移治順天嵗饑民乏食公發廪貸之所全活者甚衆墓誌三年宣撫司罷公還東平總管嚴公奏太常登歌樂向聖主觀于日月山既而發還今十餘年矣乞増宫懸大樂文武二舞令舊工教習以備大祀上可其請就除公太常卿以主之兼提舉本路學校事墓誌四年上問堯舜禹湯為君之道公取書所載帝王事以對上喜曰汝為朕直解進讀我將聴之書成上命翰林承㫖巴勒蔵布譯冩以進墓誌至元元年除翰林侍讀學士兼太常卿大政諮訪而後行詔命典冊多出公手公選前賢内外制可備館閣用者凡百巻曰瀛洲集至今用之墓誌六年作新大都于燕宗廟之制未有議者公奏曰陛下帝中國當行中國事事之大者首為祭祀祭祀必有寢廟因以圖上乞勑有司以時興建從之踰年而廟成公之所教太常禮樂亦備遂迎祖宗神御入藏太廟因奉安而大饗焉禮成上悦賞賜良渥墓誌公在翰林太常所薦僚屬多海内名士時號得人尋兼户部侍郎奉勑議立三省遂定内外官制上之墓誌時宮闕落成而朝儀未立公奏曰今四海一家萬國㑹同朝廷之禮不可不肅宜定百官朝㑹儀從之墓誌七年拜吏部尚書公以銓選無可守之法為撰選曹八議墓誌九年公乞補外除東昌路總管佩虎符至郡専務以徳率下不事鞭箠吏不忍欺民亦化服期年而政成乃修廟學起黌舎新公廨區處皆有條序力者功倍而民不知勞郡人徳之墓誌十四年起為山東提刑按察使某路有妖言之獄所司逮捕凡數百人公為剖析絓誤者十八九悉縱遣之墓誌十五年移公淮東道按察使淮安安撫使許瑱亡宋邊將家人有吿瑱匿官庫財者憲司繫其妻孥以徵之公謂同僚曰許所匿者亡宋之物也豈可與今盗官財者同論耶同僚不以為然公獨抗章辨明行臺是之釋不問墓銘詔徴南北兵徵日本逺近愁歎江浙尤甚公奏疏諫之語剴切當路者闕上竟寢其事墓誌二十二年丞相闕人共政奏公雖使之坐而策國事闕公老病辭不能行附奏便宜九事賜田十闕八十闕秋闕増劇作八十可老歌以自遣所以處闕歸焉易簀之際吟諷弗輟墓誌公儀觀魁闕人忤之無忮心與慍色與人交一以闕與賔客樂施與及好奬進士類人有善稱之惟恐不至和而不流羣而不黨清而能容仁而能斷時論推之為有國器墓碑公明習前代典故尤善斷無有所難獄有大疑使公决之不假閲成案立談之間剖析委曲情惬理順載法之文法外之意無不包舉雖専明闕之審至論事口吃悱然若黙者及秉筆而闕意到燦然成文人謂尚書說事乎闕公之奏議闕詳悉無闕明白無竒澁之偏歌詩則坦夷瀏亮無闕駢麗親切無牽就支離之弊雖然闕憂國之心既堅金石不以仕宦為汚不闕哀老疾病闕茍聞時政有所可否闕之在已惓惓不置死乃已合于古人闕元名臣事畧巻十二
