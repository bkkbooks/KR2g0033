body:
  text: 元名臣事略卷五元蘇天爵撰中書耶律文正王王名楚材字晉卿遼東丹王托雲八世孫金尚書右丞文獻公履之子為燕京行省員外郎歲乙亥城降遂屬國朝扈從征伐諸國辛卯拜中書令癸卯薨年五十五公以明昌元年六月二十日生文獻公通術數尤邃於太𤣥私謂所親曰此子吾家千里駒也他日必成偉器且當為異國用因取左氏之楚雖有材晉實用之以為名字平章宋公撰神道碑公生三歲而孤母夫人楊氏誨育備至稍長知力學十七書無所不讀為文有作者氣神道碑金制宰相子得試補省掾公不欲就章宗特敕就試則中甲科考滿授同知開州事貞佑甲戌宣宗南渡丞相完顔承暉留守燕京行尚書省事表公為左右司員外郎明年京城不守遂屬國朝神道碑太祖素有併吞天下之志嘗訪遼宗室近族至是徵詣行在入見上謂公曰遼與金為世讎吾與汝已報之矣公曰臣祖父以來皆嘗北面事之既為臣子豈敢復懷二心讎君父耶上重其言處之左右以備咨訪神道碑已卯夏六月大軍征西禡旗之際雨雪三尺上惡之公曰此克敵之象也神道碑庚辰上駐蹕於西域塔實干城時二月五月朔微月皆見於西南公因别造庚午元厯進之其進表云漢唐以來其書大備經元創法無啻百家其氣候之早晏朔望之疾徐二曜之盈衰五星之伏見疏密無定先後不同蓋建都立國之各殊或涉歷嵗年之漸逺不得不為差也唐厯八徙宋厯九更良以此夫金曰大明百年才經一改此去中原萬里以昔程今昔密今疏東微西著以地遙而歲久故時異而時同今以二月五月朔微月皆見于西南較之於厯悉為先天誠所未聞而未見也若夫漢唐以來厯算之書備矣俱無此說以法論之月惟至晦則一日不見是二十九日有月也豈聖人建月之意本諸此乎今以星厯考之是年正月四月雖皆為小盡蓋亦未有朔日見月者也張都燕居叢談是嵗冬大雷上問公公曰蘇勒坦當死中野已而果然蘇勒坦回鶻王稱也神道碑國初未有厯學而回鶻人奏五月望夕月蝕公言不蝕及期果不蝕明年公奏十月望夜月蝕回鶻人言不蝕其夜月蝕八分上大異之曰汝於天上事尚無不知况人間事乎神道碑望又叢談云庚辰嵗公在塔實干城當五月以大明厯考之大隂當虧二分食甚子正時在宵中是夜候之未盡初更而月已蝕矣蓋大明之子正中國之子正也西域之初更西域之初更也西域之初更未盡時焉知不為中國之子正乎隔幾萬里之逺僅逾一時復何疑哉此唐一行時有里差之說謂千里互差一時者是也二書所載不同壬午夏五月長星見西方上以問公公曰女直國當易主矣逾年而金主死于是每將出征必令公預卜吉凶上亦用羊髀骨以符之神道碑行次東印度國鐵門關侍衛者見一獸鹿形馬尾緑色而獨角能為人言汝軍宜早回上怪而問公公曰此獸名角端日行一萬八千里解四夷語是惡殺之象蓋上天遣之以告陛下願承天心宥此數國人命實陛下無疆之福即日下詔班師神道碑丙戌冬十一月靈武下諸將爭掠子女財幣公獨取書數部大黃兩駝而已既而軍士病疫唯得大黃可愈所活幾萬人神道碑燕京多盜至駕車行劫有司不能禁時睿宗監國命中使偕公馳傳往至分捕得之皆勢家子其家人輩行賂求免中使惑之欲為覆奏公執以為不可曰信安咫尺未下若不懲戒恐致大亂遂刑一十六人京城帖然神道碑己丑太宗即位公定冊立儀禮皇族尊長皆令就班列拜尊長之有拜禮蓋自此始諸國來朝者多以冒禁應死公言陛下新即位願無汚白道子從之蓋國俗尚白以白為吉故也神道碑立又李微撰墓志云己丑秋公奉遺詔太宗擇定八月二十二日尚猶豫不决公曰此社稷大計若不早定恐生大變睿宗曰再擇日如何公曰過此日皆不吉至日公與睿宗翼太宗登寶位時天下新定未有號令所在長吏皆得自專生殺少有忤意則刀鋸隨之至有全室被戮襁褓不遺者而彼州此郡動輒興兵相收公首以為言皆禁絶之神道碑自太祖西征之後倉廪府庫無斗粟尺帛而中使别迭等僉言雖得漢人亦無所用不若盡去之使草木暢茂以為牧地公即前曰夫以天下之廣四海之富何求而不得但不為耳何名無用哉因奏地稅商稅酒醋鹽鐵山澤之利周歲可得銀五十萬兩絹八萬匹粟四十萬石上曰誠如卿言則國有餘矣卿試為之乃奏立十路課稅所設使副二員皆以儒者為之如燕京陳時可宣德路劉中皆天下之選因時時進說周孔之教且謂天下雖得之馬上不可以馬上治上深以為然國朝之用文臣蓋自公發之神道碑先是諸路長吏兼領軍民錢穀往往恃其富强肆為不法公奏長吏專理民事萬户府總軍政課稅所掌錢穀各不相統攝遂為定制權貴不能平燕京路石林咸達布激怒皇族俾專使來奏謂公悉令南朝舊人且渠親屬在彼恐有異志不宜重用且以國朝所忌誣構百端必欲置之死地事連諸執政時鎮海天合重山實為同列為之股栗曰何必强為更張計必有今日事公曰自立朝廷以來每事皆我為之諸公何與焉若果獲罪我自當之上察其誣怒逐來使不數月㑹有以事告咸得不者上特命公鞫治公奏曰此人倨傲無禮狎近羣小易以招謗今方有事于南邦他日治之亦未晚也神道碑辛卯秋上至雲中諸路所貢課額銀幣及倉廩物斛文簿具陳于前悉符元奏之數上曰卿不離朕左右何使錢幣流入如此不審南國復有卿比者否公曰賢于臣者甚多以臣不才故留於燕上即日授中書省印俾領其事事無巨細一以委之神道碑宣德路長官太傅托噶失陷官糧萬餘石恃其勳舊密奏求免上問中書知否對曰不知上叱出使白中書省償之仍敕今後凡事先白中書然後奏聞神道碑中貴克斯布哈撥奏户一萬以為採鍊金銀栽種蒲萄等户公言太祖有㫖山後百姓與本朝人無異兵武所出緩急得用不若將河南殘弱貸而不誅可充此役且以實山後之地上曰卿言是也又奏諸路民户今已疲乏令土居䝉古回鶻河西人等與所在居民一體應輸賦役皆施行之神道碑壬辰春車駕至河南詔陕洛秦虢等州山林洞穴逃匿之人若迎軍來降與免殺戮或謂此輩急則來附緩則復資敵耳公奏給旗數百面悉令散歸已降之郡其活不可勝數神道碑國制凡敵人拒命矢石一發則殺無赦汴京垂陷首將蘇布特遣人來報且言此城相抗日久多殺傷士卒意欲屠之公馳入奏曰將士暴露凡數十年所爭者土地人民耳得地無民將焉用之上疑而未决復奏曰凡弓矢甲仗金玉等匠及官民富貴之家皆聚此城中殺之則一無所得是徒勞也上始然之詔除完顔氏一族外餘皆原免時避兵在汴者户一百四十七萬仍奏選工匠儒釋道醫卜之流散居河北官為給贍其後攻取淮漢諸城因為定例神道碑初汴京未下奏遣使入城索取孔子五十一代孫元措襲封衍聖公令收拾散亡禮樂人等及取名儒梁涉等數輩於燕京置編修所平陽置經籍所以開久治神道碑又按遺山元公上書云夫自漢唐以來言良相者在漢則有蕭曹丙魏在唐則有房杜姚宋數公者固有致太平之功而當時百執事之人毗助贊益者不為不多蓋天下之大器非一人之力可舉而國家所以成就人材者亦非一日之事也必藉學校教育父兄淵源師友講習三者備而後可譬如修明堂總章必得楩楠豫章之材預為儲蓄數十年之間乃能備一旦之用非若起尋丈之屋欂櫨椳楔雜出于榆栁槐柏可以朝求而暮至也竊見南中大夫士歸河朔者所在有之聖者之後如衍聖孔公耆舊如洪內翰叔獻梁都運斗南髙户部唐卿王延州從之時輩如平陽王狀元綱東明王狀元鶚濱人王賁臨淄人李浩秦人張徽楊奐李庭訓河中李獻卿武安樂夔固安李天翼沛縣劉汝翼齊人謝良弼鄭人李大鵬山西魏蟠潭人李恆簡李禹翌燕人張聖俞太原張緯李謙翌致君張德輝髙鳴孟津李尉真定李治相人胡德圭易州敬鈺雲中李微中山楊果東平李昶西華徐世隆濟陽張輔之燕人曹居一王鑄渾源劉祁及其弟郁李同平定賈庭揚楊恕濟南杜仁傑潞水張仲經虞鄉麻革東平商挺漁陽趙著平陽趙維道汝南楊鴻河中張肅河州句龍瀛東勝程思遇及其從弟思忠凡有諸人雖其學業行詣參差不齊要之皆天民之秀有用于世者也百年以束教育講習非不至而其所成就者無幾喪亂以來三十四人而止矣乃幸不死于兵造物挈而授之維新之朝豈無意乎誠以閣下之力使脫奔走之役而儲之它日求百執事之人唯左右采而取之獨不能少助閣下蕭曹丙魏房杜姚宋之功乎時河南新破被俘虜者不可勝計及聞大軍北還逃去者十八九有詔停留逃民及資給飲食者皆死無問城郭保社一家犯禁餘並連坐由是百姓惶駭雖父子兄弟一經俘虜不敢正視逃民無所得食踣死道路者踵相躡也公從容進說曰十餘年間存撫百姓以其有用故也若勝負未分慮涉攜二今敵國已破去將安往豈有因一俘囚罪數百人者乎上悟詔停其禁神道碑金國既亡唯秦鞏等二十餘州連歲不下公奏吾人之得罪逃入金國者皆萃於此其所以力戰者蓋懼死耳若許以不殺不攻而自下矣詔下皆開門出降期月之間山外悉平神道碑甲午詔括户口以大臣呼圖克領之其時方事進取所降下者因以與之自一社一民各有所主不相統屬至是始𨽻州縣朝臣共欲以丁為户公獨以為不可皆曰我朝及西域諸國莫不以丁為户豈可捨大朝之法而從亡國政耶公曰自古有中原者未嘗以丁為户若果行之可輸一年之賦隨即逃散矣卒從公議時諸王大臣及諸將校所得户口往往寄留諸郡幾居天下之半公因奏括户口皆籍為編民神道碑己未朝議以回鶻人征南漢人征西以為得計公極言其不可曰漢地西域相去數萬里比至敵境人馬疲乏不堪為用况水土異宜必生疾疫不若各就本土征進似為兩便爭論十餘日其議遂寢神道碑丙申秋七月呼圖克以户口來上議割分諸州郡分賜諸王貴族以為湯沐邑公曰尾大不掉易以生隙不如多與金帛足以為恩上曰業已許之公曰若樹置官吏必自朝命除恆賦外不令擅自徵斂差可久也從之是嵗始定天下賦稅每二户出絲一斤以供官用五户出絲一斤以與所賜之家上田每畝稅三升半中田三升下田二升半水田畝五升商稅三十分之一鹽每銀一兩四十斤已上以為永額朝臣皆謂太輕公曰將來必有以利進者則已為重矣神道碑國初盜賊充斥商賈不能行則下令凡有失盜去處周嵗不獲賊令本路民户代償其物前後積纍動以萬計及所在官吏取借回鶻債銀周年則倍之次年則并息又倍之謂之羊羔利積而不已往往破家散族至以妻子為質終不能償公請于上悉以官銀代還凡以七十萬定仍奏定今後不以歲月近逺子本相侔更不生息遂為定制神道碑侍臣托歡奏選室女敕中書省發詔行之公持之不下上怒召問其故公曰向所刷二十八人尚在燕京足備後宫使令而托歡傳㫖又欲遍行選刷臣恐重擾百姓欲覆奏陛下耳上良久曰可遂罷之又欲於漢地拘刷牝馬公言漢地所有布絲五穀耳非産馬之地若今日行之後必為例是徒擾天下也乃從其請神道碑丁酉汰三教僧道試經通者給牒受戒許居寺觀儒人中選者則復其家公初言僧道中避役者多合行選試至是始行之神道碑時諸王貴戚皆得自起驛馬而使臣猥多馬悉乏則豪奪民馬以乘之城郭道路騷動所至則需索百端供饋稍緩輒被箠撻館人不能堪公奏給牌劄及定飲食分例其弊始革神道碑諸路官府自為符印僭越無度公奏並仰中書依式鑄造由是名器始重趙衍撰行狀戊戌天下大旱蝗上問公以禦之之術公曰今年租賦乞權行倚閣上曰恐國用不足公曰倉庫見在可支十年許之國初籍天下户得一百四萬至是逃亡者十四五而賦仍舊天下病之公奏除逃民三十五萬民賴以安神道碑燕京呼圖克扎木隂結權貴以銀五十萬兩撲買天下差發涉獵發丁者以銀二十五萬兩撲買天下係官廊房地基水利猪雞劉廷玉者以銀五萬兩撲買燕京酒課又有回鶻以銀一百萬兩撲買天下鹽課至有撲買天下河泊橋梁渡口者公曰此皆奸人欺下罔上為害甚大咸奏罷之嘗曰興一利不若除一害生一事不若減一事人必為班超之言蓋平平耳千古之下自有定論神道碑公自庚寅年定課稅所額每歲銀一萬定及河南既下户口滋息增二萬二千定而回鶻溫都爾哈瑪爾撲買課稅增至四萬四千定公曰雖取四十四萬亦可得不過嚴設法禁隂奪民利耳民窮為盜非國之福而近侍左右皆為所啖上亦頗惑衆議欲求試行之公反復爭論力不能奪乃太息曰撲買之利既興必有躡跡而篡其後者民之窮困將自此始矣神道碑公正色立朝不為少屈欲以身徇天下每陳國家利病生民休戚辭色懇切上曰汝又欲為百姓哭耶神道碑上素嗜酒晚年尤甚公數諫不聼乃持酒槽之金口曰此鐵為酒所蝕尚致如此况人之五臟有不損耶上悅賜以金帛仍敕左右進酒三鍾而止神道碑辛丑春二月上疾篤脉絶諸藥不能療皇后不知所以召公問之時奸臣竊政鬻獄賣官專令回鶻控治諸國公對曰今朝廷用非其人天下罪囚必多寃枉故天變屢見宜赦天下因引宋景公熒惑退舍之事以為證后亟欲行之公對曰非君命不可頃之上少蘇后以為奏上不能言首肯而已赦發脉復生冬十二月上勿藥已久公以太乙數推之不宜畋獵奏之數四左右皆曰若不騎射何以為獵五日而崩行狀及汲郡王公文集云太宗仁厚有餘言詞極寡服御儉素不尚華飾委任大臣略無疑二性頗樂飲及御下聼政不易常度當時政歸臺閣朝野歡娛前後十年號稱無事壬寅春后以儲嗣問公曰此非外姓臣所敢知自有太宗遺詔在遵而行之社稷幸甚墓志溫都爾哈瑪爾方以貨取朝政執政者亦皆阿附唯憚公沮其事則以銀五萬兩賂公公不受事有不便於民者輒中止之時后已稱制則以御寶空紙付溫都爾哈瑪爾令從意書填公奏曰天下先帝之天下典章號令自先帝出必欲如此臣不敢奉詔尋復有㫖溫都爾哈瑪爾奏准事理令史若不書填則斷其手公曰軍國之事先帝悉委老臣令史何與焉事若合理自是遵行若不合理死且不避况斷手乎后以公先朝勳舊曲敬憚焉神道碑公天資英邁迥出人表雖案牘滿前左酬右答咸適其當平居不妄言笑及一被接納則和氣溫溫令人不能忘素不嗜酒間與賓僚宴集終日端坐平生不治生産及其薨也人有譖之者曰公為相二十年天下供奉皆入私門后使衛士視之庫藏惟名琴數十張古今書畫金石遺文數千卷而已篤于好學不舍晝夜嘗誡其諸子曰公務雖多晝則屬官夜則屬私亦可學也神道碑又陵川郝公文集云當太宗臨御之時耶律楚材為相定稅賦權宣課分郡縣籍户口理獄訟别軍民設科舉推恩肆赦方有志于天下而一二不逞之人投隙抵時相與排擯百計攻訐乘宫闈違豫之際恣為矯誣致使楚材憤惋以死國家承大亂之後天綱絶人理滅所謂更造夫婦肇有父子者信有之矣加以南北之政每每相戾其出入用事者又皆諸國之人言語之不通趣向之不同當是之時而公以一書生孤立于廟堂之上而欲行其所學戛戛乎其難哉幸賴明天子在上諫行言聼故奮袂直前力行而不顧然而其見於設施者十不能二三而天下之人固已均受其賜矣若此時非公則人之類又不知其何如耳神道碑中書楊忠肅公公名惟中字彥誠𢎞州人國初奉使西域歲乙未用兵任領軍前行中書省癸卯拜中書令壬子出為河南經略使遷陕右四川宣撫使已未王師伐宋拜江准宣撫使是歲薨年五十五金末公以孤童子事太宗自知讀書有膽略太宗器之弱冠銜命使西域三十餘國宣暢威靈擬布條要俾皆籍户屬吏數年而歸帝乃有大用意郝文忠公撰神道碑庫春太子伐宋命公于軍前行中書省克宋棗陽光化等軍光隋郢復等州及襄陽德安府得名士數十人收集伊洛諸書載送燕都立周子祠建太極書院俾師儒趙復等訓授公遂知性理學慨然欲以道濟天下神道碑又周子祠堂記天厯初國子祠祀之禮盛于江左而未至于河朔公領中書始嗜其學乃建太極書院于永郡立周子祠以二程朝楊遊朱六子配食歲時釋奠之刻太極圖通書西銘于祠壁請雲夢趙復為師儒右北平王令所在選俊秀之有器度者為學生耶律楚材罷遂以公為中書令太宗崩太后稱制公以一相負任天下神道碑定宗即位平陽道斷事官色辰橫恣不法詔公宣慰公按誅之出一府僚屬莫不健其决神道碑金亡恆山公武仙潰于鄧州其餘黨散入太原真定間據大明川用金開興年號衆至數萬出沒劫掠數千里詔㑹諸道兵討之不克公仗節開諭降其渠帥其黨悉平神道碑憲宗即位上以太弟鎮金蓮川開府承制封拜奏公為河南道經略使初滅金以監河橋萬户劉福為河南道總管盡有金源故地福貪鄙殘酷害虐遺民二十餘年公至召福聼約束福稱疾不至公命設大挺于坐復召之使謂福曰爾不奉詔吾以軍法行事福以數千人擁衛見公公即握大挺擊踣之數日福死百姓鼓舞稱快河南大治神道碑遷陜右四川宣撫使以諸軍帥橫侈病民郭千户者尤甚殺人之夫而奪其妻其子告公馘之以徇關中肅然公語人曰某非好殺國家紀綱不立致此輩賊虐良民無所控告不去不仁何以為仁乎神道碑歲已未上總統東師奏公為江淮京湖南北等路宣撫使俾建行臺以先啓行宣布恩信䝉古漢師並聼制節師還薨于蔡州公出入柄用者三十年天下畏其勇而懷其仁神道碑皇元誕膺天命奄奠區夏經略海外既一再傳始究內治用公為相與天下休息乃恢張規模維繫綱紀誅鉏凶渠愛養黎獻整頓衣冠收藏典籍斯民得以迓續遺命吾道賴以不忘天下復見中國之治繄公力焉神道碑元名臣事略卷五
